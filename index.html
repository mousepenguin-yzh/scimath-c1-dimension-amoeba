<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <!-- 行動端硬化：強制禁止雙擊縮放，確保觸控反應無延遲 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>空間維度與單位變形蟲 - 步驟一</title>
    <!-- 引入 Google Fonts 親和力開源日系圓體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    
    <style>
        /* 1. 馬卡龍與舒適對比風格 */
        :root {
            --bg-dark-plate: #1e272e; /* 外部深色底板，用以突顯遊戲 16:9 邊界 */
            --bg-game: #f5f6fa;       /* 遊戲本體乾淨背景 */
            --macaron-pink: #ffb8b8;  /* 粉紅馬卡龍 */
            --macaron-blue: #81ecec;  /* 湖水綠藍 */
            --macaron-yellow: #ffeaa7;/* 警示亮黃 */
            --text-main: #2d3436;     /* 深碳色文字（高對比度） */
            --text-muted: #4a5568;    /* 次要說明文字（提升行動端 legibility） */
            --panel-white: #ffffff;   /* 亮白控制卡片 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            /* 消除行動端點擊時出現的半透明藍色高亮背景 */
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            /* 使用 dvh (Dynamic Viewport Height) 解決行動端網址列擠壓與切邊問題 */
            height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-dark-plate);
            font-family: 'Kosugi Maru', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. 核心遊戲沙盒容器 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
        }

        /* 3. 嚴格鎖定 16:9 的視區 (Base Size: 1280x720) */
        #game-viewport {
            position: absolute;
            width: 1280px;
            height: 720px;
            background-color: var(--bg-game);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            transform-origin: center center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: opacity 0.2s ease;
        }

        /* 步驟一：展示排版骨架 */
        #viewport-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 35px;
        }

        /* 頂部標題（放大字型，提升手機閱讀舒適度） */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px dashed #dcdde1;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 {
            color: var(--text-main);
            font-size: 34px; /* 從 28px 調大至 34px */
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .level-badge {
            background-color: var(--macaron-pink);
            color: white;
            padding: 6px 16px;
            border-radius: 25px;
            font-size: 20px; /* 從 16px 調大至 20px */
            font-weight: bold;
        }

        /* 雙欄對比佈局 */
        .split-container {
            flex: 1;
            display: flex;
            gap: 30px;
        }

        .split-panel {
            flex: 1;
            background-color: var(--panel-white);
            border-radius: 28px;
            padding: 35px;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 均勻分配內部元素空間 */
            align-items: center;
            text-align: center;
        }

        .panel-top-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .panel-icon {
            font-size: 72px; /* 從 64px 放大 */
            margin-bottom: 10px;
        }

        .panel-title {
            font-size: 28px; /* 從 22px 調大至 28px */
            color: var(--text-main);
            font-weight: bold;
        }

        .panel-desc {
            font-size: 21px; /* 從 16px 調大至 21px，確保縮放後半折依然清晰 */
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 90%;
        }

        /* 增大行動端按鈕觸控範圍與字體 */
        .macaron-btn {
            width: 85%;
            padding: 16px 30px; /* 增大內襯墊 */
            font-size: 22px; /* 從 18px 調大至 22px */
            font-family: 'Kosugi Maru', sans-serif;
            font-weight: bold;
            color: var(--text-main);
            background-color: var(--macaron-blue);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #00ced1;
            transition: all 0.05s ease;
        }

        .macaron-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #00ced1;
        }

        /* 4. 將測試面板移入 16:9 Viewport 內部！
           這能確保它跟著遊戲主體一起做 transform 縮放，永遠不會游離或被手機系統導航條切掉 */
        #test-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: rgba(45, 52, 54, 0.95);
            color: #55efc4;
            padding: 12px 20px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 18px; /* 放大資訊面板字體 */
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid #55efc4;
            pointer-events: none;
        }

        /* 5. 直螢幕強制攔截層 */
        #orientation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background-color: var(--macaron-yellow);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 40px;
        }

        .phone-icon-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 35px;
        }

        /* 手機旋轉動畫 */
        .phone-icon {
            font-size: 100px;
            display: inline-block;
            animation: rotatePhone 2.5s infinite ease-in-out;
        }

        .warning-title {
            font-size: 32px;
            color: var(--text-main);
            font-weight: bold;
            margin-bottom: 20px;
        }

        .warning-sub {
            font-size: 22px;
            color: #636e72;
            line-height: 1.8;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            35% { transform: rotate(-90deg); }
            70% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 遊戲本體 -->
        <div id="game-viewport">
            <div id="viewport-content">
                <header>
                    <h1>空間維度與單位變形蟲 <span class="level-badge">LV.1 測試</span></h1>
                    <div style="font-size: 24px; color: var(--text-main); font-weight: bold;">分數：000</div>
                </header>

                <div class="split-container">
                    <!-- 左半部 -->
                    <div class="split-panel" style="border-top: 8px solid var(--macaron-pink);">
                        <div class="panel-top-info">
                            <div class="panel-icon">📐</div>
                            <div class="panel-title">原始二維面積</div>
                            <div class="panel-desc">長 1 公尺，寬 1 公尺。<br>我們將在此處繪製基本的 Canvas 立方。</div>
                        </div>
                        <button class="macaron-btn">點擊測試反饋</button>
                    </div>

                    <!-- 右半部 -->
                    <div class="split-panel" style="border-top: 8px solid var(--macaron-blue);">
                        <div class="panel-top-info">
                            <div class="panel-icon">💡</div>
                            <div class="panel-title">切分對比與提示</div>
                            <div class="panel-desc">點擊左側提示按鈕時，此處將同步載入切分網格。</div>
                        </div>
                        <button class="macaron-btn" style="background-color: var(--macaron-pink); box-shadow: 0 8px 0 #e84118; color: white;">提示按鈕測試</button>
                    </div>
                </div>
            </div>

            <!-- 修正：將調試標籤放進 Viewport 內部，與遊戲同步縮放，防止在手機上超出邊界 -->
            <div id="test-overlay">
                <span id="test-label">[偵測狀態：正在載入...]</span>
            </div>
        </div>
    </div>

    <!-- 直螢幕強制攔截層 -->
    <div id="orientation-overlay">
        <div class="phone-icon-wrapper">
            <span class="phone-icon">📱</span>
        </div>
        <div class="warning-title">請旋轉您的行動裝置</div>
        <div class="warning-sub">本數理挑戰專為【橫螢幕 16:9】設計，<br>請開啟螢幕自動旋轉，並將手機橫放以獲得最佳體驗！</div>
    </div>

    <script>
        // 設定基準解析度
        const BASE_WIDTH = 1280;
        const BASE_HEIGHT = 720;

        /**
         * 透過動態矩陣運算，維持完美的 16:9 比例與動態置中
         */
        function resizeGame() {
            const container = document.getElementById('game-container');
            const viewport = document.getElementById('game-viewport');
            const testLabel = document.getElementById('test-label');
            const overlay = document.getElementById('orientation-overlay');

            if (!container || !viewport) return;

            // 取得扣除瀏覽器網址列、導航條後的真實動態視區尺寸
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            // 1. 計算縮放比例
            const scaleX = windowWidth / BASE_WIDTH;
            const scaleY = windowHeight / BASE_HEIGHT;
            
            // 取最小縮放係數，確保畫面完整容納於瀏覽器中而不被切邊
            const scale = Math.min(scaleX, scaleY);

            // 2. 利用 translate 修正置中，並執行 scale 縮放
            viewport.style.transform = `translate(-50%, -50%) scale(${scale})`;

            // 3. 判斷直橫螢幕狀態
            const isPortrait = windowHeight > windowWidth;
            const statusText = isPortrait ? '直螢幕 (已封鎖)' : '橫螢幕 16:9';

            // 4. 更新測試 UI（現在由於位於 Viewport 內部，其字體也會完美跟著縮放，保證清晰不跑版）
            if (testLabel) {
                testLabel.textContent = `[狀態：${statusText} / 縮放比：${scale.toFixed(2)}]`;
            }

            // 5. 控制直螢幕遮罩的顯示與隱藏
            if (overlay) {
                if (isPortrait) {
                    overlay.style.display = 'flex';
                    viewport.style.opacity = '0';
                    viewport.style.pointerEvents = 'none';
                } else {
                    overlay.style.display = 'none';
                    viewport.style.opacity = '1';
                    viewport.style.pointerEvents = 'auto';
                }
            }
        }

        // 綁定事件監聽器
        window.addEventListener('resize', resizeGame);
        window.addEventListener('orientationchange', resizeGame);
        window.addEventListener('DOMContentLoaded', resizeGame);
        
        // 防止行動端瀏覽器渲染時間差，做延遲複驗
        setTimeout(resizeGame, 100);
        setTimeout(resizeGame, 400);
    </script>
</body>
</html>
