<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>挑戰一：空間維度與單位變形蟲 - 步驟二</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 基礎重設 */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #F0F4F8;
            font-family: 'Kosugi Maru', 'Noto Sans TC', sans-serif;
        }

        /* 16:9 核心視口容器 (1280x720) */
        #app-viewport {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1280px;
            height: 720px;
            background: radial-gradient(circle at center, #FFFFFF 0%, #E8F0F8 100%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transform-origin: center center;
            transform: translate(-50%, -50%) scale(1);
            transition: box-shadow 0.3s ease;
            z-index: 1;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        /* 【數學排版混合層】
            此層疊加於 Canvas 之上，且位於 app-viewport 內部。
            因此它會伴隨 16:9 容器同步進行 CSS Scale 縮放，
            我們可以直接在裡面用 HTML/CSS 排版出極致清晰的次方、分數等數學符號！
        */
        #dom-ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 穿透點擊，不干擾 Canvas 的觸控手勢 */
            z-index: 2;
        }

        /* 內建馬卡龍風格 UI 元素 */
        .interactive-overlay {
            position: absolute;
            pointer-events: auto; /* 恢復特定 UI 元素的點擊能力 */
        }

        /* 測試用答題反饋顯示器 */
        #math-display-card {
            top: 40px;
            right: 40px;
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid #BEE3F8;
            border-radius: 20px;
            padding: 20px 30px;
            box-shadow: 0 8px 24px rgba(49, 130, 206, 0.1);
            color: #2D3748;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #math-display-card.success-pulse {
            border-color: #48BB78;
            background-color: #F0FFF4;
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(72, 187, 120, 0.2);
        }

        /* 標準國中理化數學格式排版 */
        .formula-text {
            font-size: 26px;
            font-weight: bold;
            color: #2B6CB0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 次方標準呈現 */
        .formula-text sup {
            font-size: 16px;
            color: #E53E3E;
            margin-left: 2px;
        }

        /* 觸控測試大按鈕 */
        .feedback-trigger-btn {
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #48BB78 0%, #38A169 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-family: 'Kosugi Maru', sans-serif;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0px #276749, 0 15px 30px rgba(56, 161, 105, 0.3);
            transition: transform 0.05s ease, box-shadow 0.05s ease;
        }

        .feedback-trigger-btn:active {
            transform: translateX(-50%) translateY(6px);
            box-shadow: 0 2px 0px #276749, 0 5px 15px rgba(56, 161, 105, 0.3);
        }

        /* 外部開發者偵錯面板（加入 Touch-Action 防禦） */
        #debug-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 999;
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #BEE3F8;
            border-radius: 14px;
            width: 280px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            max-height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            overscroll-behavior: contain; /* 防止背景頁面跟著橡皮筋滑動 */
            touch-action: pan-y; /* 限制僅允許垂直觸控滑動 */
        }

        #debug-panel.collapsed {
            width: 180px;
            height: 44px;
        }

        #btn-toggle-debug {
            width: 100%;
            height: 44px;
            background: #3182CE;
            color: white;
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
        }

        .debug-body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .debug-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #4A5568;
        }

        .debug-value {
            font-weight: bold;
            color: #2D3748;
        }

        #touch-coordinates {
            color: #E53E3E;
        }
    </style>
</head>
<body>

    <!-- 16:9 遊戲容器 -->
    <div id="app-viewport">
        <canvas id="game-canvas"></canvas>

        <!-- 
            標準數學排版層 (DOM Layer)
            此層直接隸屬於 app-viewport 下，會跟著 Canvas 一起完美縮放。
            這裡用來繪製漂亮的國中數學算式，完全消滅工程師符號 3^5 
        -->
        <div id="dom-ui-layer">
            <!-- 實時數學算式卡片 -->
            <div id="math-display-card" class="interactive-overlay">
                <div class="formula-text">
                    <span>1 m<sup>3</sup></span>
                    <span>=</span>
                    <span>1000 dm<sup>3</sup></span>
                    <span>=</span>
                    <span style="color: #3182CE;">1,000,000 cm<sup>3</sup></span>
                </div>
            </div>

            <!-- 點擊觸發粒子大按鈕 -->
            <button id="btn-trigger-success" class="interactive-overlay feedback-trigger-btn">
                🎉 模擬答對 (發射 Confetti)
            </button>
        </div>
    </div>

    <!-- 偵錯面板 -->
    <div id="debug-panel" class="collapsed">
        <button id="btn-toggle-debug">⚙️ 展開/收折偵錯面板</button>
        <div class="debug-body">
            <div class="debug-row">
                <span>Canvas 縮放比:</span>
                <span id="val-scale" class="debug-value">1.000</span>
            </div>
            <div class="debug-row">
                <span>觸控映射 X:</span>
                <span id="val-touch-x" class="debug-value">None</span>
            </div>
            <div class="debug-row">
                <span>觸控映射 Y:</span>
                <span id="val-touch-y" class="debug-value">None</span>
            </div>
            <div class="debug-row">
                <span>粒子總數:</span>
                <span id="val-particles" class="debug-value">0</span>
            </div>
            <div class="debug-row">
                <span>音效模擬頻率:</span>
                <span id="val-audio-freq" class="debug-value">0 Hz</span>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 基礎宣告與縮放核心 ---
        const BASE_WIDTH = 1280;
        const BASE_HEIGHT = 720;
        
        const viewport = document.getElementById('app-viewport');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        let currentScale = 1;

        function updateLayout() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            const scaleX = windowWidth / BASE_WIDTH;
            const scaleY = windowHeight / BASE_HEIGHT;
            currentScale = Math.min(scaleX, scaleY);

            viewport.style.transform = `translate(-50%, -50%) scale(${currentScale})`;
            document.getElementById('val-scale').textContent = currentScale.toFixed(3);
        }

        // --- 2. 核心工法：等比例觸控座標映射系統 ---
        function getCanvasPointerCoords(e) {
            const rect = canvas.getBoundingClientRect();
            
            // 兼容觸控事件與滑鼠事件
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            // 幾何投影轉換：扣除縮放視口的左/上邊界，並除以當前的 CSS scale 倍率
            const mappedX = (clientX - rect.left) / currentScale;
            const mappedY = (clientY - rect.top) / currentScale;

            return {
                x: Math.max(0, Math.min(BASE_WIDTH, mappedX)),
                y: Math.max(0, Math.min(BASE_HEIGHT, mappedY))
            };
        }

        // --- 3. 粒子物理回饋系統 (Confetti Particle Class) ---
        class ConfettiParticle {
            constructor(startX, startY) {
                this.x = startX;
                this.y = startY;
                
                // 爆炸拋射物理
                const angle = Math.random() * Math.PI * 2;
                const speed = 5 + Math.random() * 15;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - (5 + Math.random() * 5); // 向上噴發力道
                
                // 物理尺寸與旋轉
                this.width = 8 + Math.random() * 12;
                this.height = 4 + Math.random() * 8;
                this.rotation = Math.random() * Math.PI;
                this.rotationSpeed = -0.1 + Math.random() * 0.2;
                
                // 重力與風阻
                this.gravity = 0.35;
                this.resistance = 0.98;
                
                // 馬卡龍色系配色池
                const colors = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#A8DADC', '#BDB2FF', '#FFC6FF'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // 生命週期
                this.alpha = 1;
                this.decay = 0.01 + Math.random() * 0.015;
            }

            update() {
                this.vx *= this.resistance;
                this.vy *= this.resistance;
                this.vy += this.gravity;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.rotation += this.rotationSpeed;
                this.alpha -= this.decay;
            }

            draw(context) {
                if (this.alpha <= 0) return;
                
                context.save();
                context.translate(this.x, this.y);
                context.rotate(this.rotation);
                context.globalAlpha = this.alpha;
                context.fillStyle = this.color;
                
                // 繪製彩色碎紙片
                context.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                context.restore();
            }
        }

        // 粒子管理器
        const confettiList = [];
        
        function triggerSuccessConfetti() {
            // 在視口中央偏下（按鈕上方）產生大量彩色碎片
            const emitterX = BASE_WIDTH / 2;
            const emitterY = BASE_HEIGHT / 2 + 100;
            
            for (let i = 0; i < 120; i++) {
                confettiList.push(new ConfettiParticle(emitterX, emitterY));
            }

            // 觸發算式字卡發光跳躍動畫
            const mathCard = document.getElementById('math-display-card');
            mathCard.classList.add('success-pulse');
            setTimeout(() => {
                mathCard.classList.remove('success-pulse');
            }, 600);

            // 模擬音效頻率累加 (Combo 音調升高)
            simulateComboAudio();
        }

        // --- 4. 模擬 Combo 升音調音效回饋 ---
        let comboCount = 0;
        let comboResetTimer = null;
        
        function simulateComboAudio() {
            comboCount++;
            clearTimeout(comboResetTimer);
            
            // 音效頻率隨 Combo 數升高：基礎 400Hz，每次疊加 150Hz，最高 1600Hz
            const baseFreq = 400;
            const currentFreq = Math.min(1600, baseFreq + (comboCount - 1) * 150);
            
            document.getElementById('val-audio-freq').textContent = `${currentFreq} Hz (Combo x${comboCount})`;
            document.getElementById('val-audio-freq').style.color = '#38A169';

            // 3秒無點擊，Combo 歸零重設
            comboResetTimer = setTimeout(() => {
                comboCount = 0;
                document.getElementById('val-audio-freq').textContent = '0 Hz';
                document.getElementById('val-audio-freq').style.color = '#2D3748';
            }, 3000);
        }

        // --- 5. 互動手勢追蹤核心 (畫布拖曳塗鴉測試) ---
        let isDrawing = false;
        const trailPoints = [];

        function handlePointerStart(e) {
            isDrawing = true;
            const coords = getCanvasPointerCoords(e);
            updateTouchLogs(coords.x, coords.y);
            trailPoints.push({ x: coords.x, y: coords.y, size: 25, alpha: 1 });
        }

        function handlePointerMove(e) {
            if (!isDrawing) return;
            const coords = getCanvasPointerCoords(e);
            updateTouchLogs(coords.x, coords.y);
            trailPoints.push({ x: coords.x, y: coords.y, size: 25, alpha: 1 });
        }

        function handlePointerEnd() {
            isDrawing = false;
        }

        function updateTouchLogs(x, y) {
            document.getElementById('val-touch-x').textContent = Math.round(x);
            document.getElementById('val-touch-y').textContent = Math.round(y);
        }

        // --- 6. 遊戲更新與繪圖主迴圈 (60FPS Frame Loop) ---
        function mainLoop() {
            ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

            // A. 繪製精緻的馬卡龍網格背景
            ctx.strokeStyle = 'rgba(190, 227, 248, 0.35)';
            ctx.lineWidth = 2;
            for (let i = 0; i < BASE_WIDTH; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, BASE_HEIGHT);
                ctx.stroke();
            }
            for (let j = 0; j < BASE_HEIGHT; j += 40) {
                ctx.beginPath();
                ctx.moveTo(0, j);
                ctx.lineTo(BASE_WIDTH, j);
                ctx.stroke();
            }

            // B. 繪製手勢觸控拖曳軌跡 (Pastel Glowing Trail)
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            for (let i = 0; i < trailPoints.length; i++) {
                const pt = trailPoints[i];
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(168, 218, 220, ${pt.alpha})`;
                ctx.fill();
                
                // 拖曳點逐漸縮小並淡出
                pt.alpha -= 0.03;
                pt.size = Math.max(0, pt.size - 0.5);
            }
            // 清理已完全淡出的觸控點
            while (trailPoints.length > 0 && trailPoints[0].alpha <= 0) {
                trailPoints.shift();
            }

            // C. 更新與渲染粒子
            for (let i = confettiList.length - 1; i >= 0; i--) {
                const particle = confettiList[i];
                particle.update();
                particle.draw(ctx);
                
                // 清除死去的粒子
                if (particle.alpha <= 0) {
                    confettiList.splice(i, 1);
                }
            }

            // 更新偵錯數據
            document.getElementById('val-particles').textContent = confettiList.length;

            // D. 繪製 Canvas 靜態指示
            ctx.fillStyle = '#4A5568';
            ctx.font = '24px "Kosugi Maru", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('觸控測試區：請用手指在畫布上滑動塗鴉，測試縮放投影定位', 60, BASE_HEIGHT - 60);

            requestAnimationFrame(mainLoop);
        }

        // --- 7. 初始化與事件綁定 ---
        window.addEventListener('resize', updateLayout);
        
        // 綁定 Canvas 的整合觸控/滑鼠手勢
        canvas.addEventListener('mousedown', handlePointerStart);
        canvas.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerEnd);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 阻擋 iOS 預設的橡皮筋回彈與縮放
            handlePointerStart(e);
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handlePointerMove(e);
        }, { passive: false });
        
        canvas.addEventListener('touchend', handlePointerEnd);

        // 綁定粒子觸發按鈕 (整合 touch/click)
        const successBtn = document.getElementById('btn-trigger-success');
        successBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerSuccessConfetti();
        });
        successBtn.addEventListener('click', triggerSuccessConfetti);

        // 偵錯面板摺疊按鈕
        document.getElementById('btn-toggle-debug').addEventListener('click', (e) => {
            document.getElementById('debug-panel').classList.toggle('collapsed');
        });

        // 初始化
        canvas.width = BASE_WIDTH;
        canvas.height = BASE_HEIGHT;
        updateLayout();
        mainLoop();

    </script>
</body>
</html>
