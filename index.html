<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>空間維度與單位變形蟲 - 步驟六完工版</title>
    <!-- 引入 Google Fonts 親和力開源日系圓體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark-plate: #1e272e; 
            --bg-game: #f5f6fa;       
            --macaron-pink: #ffb8b8;  
            --macaron-blue: #81ecec;  
            --macaron-yellow: #ffeaa7;
            --macaron-green: #55efc4; 
            --text-main: #2d3436;     
            --text-muted: #4a5568;    
            --panel-white: #ffffff;   
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        button, .macaron-btn, .sandbox-btn, canvas, .keypad-key {
            user-select: auto !important;
            -webkit-user-select: auto !important;
            touch-action: manipulation !important;
            cursor: pointer;
        }

        body, html {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-dark-plate);
            font-family: 'Kosugi Maru', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
        }

        /* 16:9 核心畫布 */
        #game-viewport {
            position: absolute;
            width: 1280px;
            height: 720px;
            background-color: var(--bg-game);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            transform-origin: center center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            transition: opacity 0.2s ease;
        }

        /* 遊戲主視區 */
        #main-game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 35px;
            height: 100%;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px dashed #dcdde1;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        h1 {
            color: var(--text-main);
            font-size: 34px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .level-badge {
            background-color: var(--macaron-pink);
            color: white;
            padding: 6px 16px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
        }

        /* 雙欄對比版面配置 */
        .split-container {
            flex: 1;
            display: flex;
            gap: 30px;
            height: calc(100% - 195px); /* 為底部的互動問答區與自訂鍵盤留出空間 */
        }

        .split-panel {
            flex: 1;
            background-color: var(--panel-white);
            border-radius: 28px;
            padding: 20px 25px;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .panel-top-info {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .panel-title {
            font-size: 24px;
            color: var(--text-main);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 雙畫布渲染容器 */
        .canvas-container {
            width: 100%;
            flex: 1;
            margin: 10px 0;
            background-color: #fafbfc;
            border-radius: 18px;
            border: 3px dashed #e2e8f0;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            border-radius: 15px;
            background-color: #ffffff;
        }

        /* 徹底防禦文字與匿名 Flex 佈局衝突 */
        .panel-desc {
            font-size: 19px;
            color: var(--text-muted);
            line-height: 1.5;
            min-height: 50px;
            display: block; 
            text-align: center;
            word-break: keep-all; 
        }

        /* 強健型網頁上標文字抗折行樣式 */
        .math-inline {
            display: inline-block;
            white-space: nowrap;
            vertical-align: baseline;
        }

        sup {
            font-size: 0.7em;
            position: relative;
            top: -0.3em;
            vertical-align: baseline;
            line-height: 0;
        }

        /* ----------------------------------
           底部互動問答與自訂鍵盤面板
        ------------------------------------- */
        #qa-bar-container {
            height: 120px;
            margin-top: 15px;
            background-color: var(--panel-white);
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 4px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 30px;
            gap: 20px;
        }

        /* 題目顯示大卡 */
        .quest-box {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .quest-prompt-label {
            font-size: 16px;
            color: #7f8c8d;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .quest-text {
            font-size: 26px;
            color: var(--text-main);
            font-weight: bold;
        }

        /* 答題輸入與鍵盤操控區 */
        .answer-control-group {
            flex: 1.5;
            display: flex;
            align-items: center;
            gap: 15px;
            height: 100%;
        }

        /* 精美擬真輸入框 */
        .ans-input-wrapper {
            position: relative;
            flex: 1;
            height: 64px;
            background-color: #fafbfc;
            border: 3.5px solid #dfe6e9;
            border-radius: 18px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            transition: all 0.15s ease;
        }

        .ans-input-wrapper.focus {
            border-color: var(--macaron-blue);
            background-color: #ffffff;
            box-shadow: 0 0 15px rgba(129, 236, 236, 0.4);
        }

        /* 答錯抖動反饋動畫 */
        .ans-input-wrapper.shake {
            animation: shakeFeedback 0.4s ease-in-out;
            border-color: #ff7675;
            box-shadow: 0 0 15px rgba(255, 118, 117, 0.4);
        }

        @keyframes shakeFeedback {
            0%, 100% { transform: translateX(0); }
            15%, 45%, 75% { transform: translateX(-8px); }
            30%, 60%, 90% { transform: translateX(8px); }
        }

        .ans-placeholder {
            position: absolute;
            left: 20px;
            font-size: 20px;
            color: #b2bec3;
            pointer-events: none;
            transition: opacity 0.15s;
        }

        .ans-value-display {
            font-size: 28px;
            font-weight: bold;
            color: var(--text-main);
            font-family: 'Kosugi Maru', monospace;
            width: 100%;
            letter-spacing: 1px;
        }

        /* 閃爍光標 */
        .cursor-blink {
            display: inline-block;
            width: 3.5px;
            height: 28px;
            background-color: var(--text-main);
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 答題確定按鈕 */
        .btn-submit {
            height: 64px;
            width: 140px;
            background-color: var(--macaron-green);
            color: #2d3436;
            font-weight: bold;
            font-size: 22px;
            border-radius: 18px;
            border: none;
            box-shadow: 0 6px 0 #2db385;
            transition: all 0.05s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-submit:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2db385;
        }

        /* 狀態與生命生命值區 */
        .status-badge-box {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
        }

        .hearts-label {
            font-size: 15px;
            color: #7f8c8d;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .hearts-container {
            display: flex;
            gap: 5px;
            font-size: 26px;
        }

        .heart-icon {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .heart-icon.lost {
            transform: scale(0);
            width: 0;
            margin: 0 -2px;
            visibility: hidden;
        }

        /* ----------------------------------
           馬卡龍內置觸控鍵盤 (預防彈出 bug)
        ------------------------------------- */
        #virtual-keypad {
            position: absolute;
            bottom: 120px;
            right: 215px;
            background-color: #2d3436;
            border-radius: 18px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid #4a5568;
            z-index: 999;
            width: 250px;
            opacity: 0;
            transform: translateY(15px) scale(0.95);
            pointer-events: none;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #virtual-keypad.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .keypad-key {
            background-color: #4a5568;
            color: white;
            border: none;
            border-radius: 10px;
            height: 44px;
            font-size: 18px;
            font-family: inherit;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 0 #1e272e;
        }

        .keypad-key:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1e272e;
        }

        .keypad-key.action {
            background-color: var(--macaron-pink);
            color: var(--text-main);
            box-shadow: 0 3px 0 #e84118;
        }

        /* ----------------------------------
           特效與全螢幕覆蓋渲染 Canvas (碎紙屑粒子)
        ------------------------------------- */
        #effects-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 1500;
        }

        /* ----------------------------------
           結算大成彈窗 Modal
        ------------------------------------- */
        #settlement-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(30, 39, 46, 0.85);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-card {
            width: 480px;
            background-color: var(--panel-white);
            border-radius: 28px;
            border: 6px solid var(--macaron-blue);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            padding: 35px;
            text-align: center;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes modalPop {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 28px;
            color: var(--text-main);
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .modal-cell {
            background-color: var(--bg-game);
            border-radius: 16px;
            padding: 15px;
            border: 2px solid #ffffff;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }

        .cell-label {
            font-size: 14px;
            color: #7f8c8d;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .cell-val {
            font-size: 24px;
            color: var(--text-main);
            font-weight: bold;
        }

        .sandbox-pack-box {
            background-color: #2d3436;
            color: var(--macaron-green);
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            text-align: left;
            margin-bottom: 20px;
            max-height: 100px;
            overflow-y: auto;
            border: 1px solid #4a5568;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 抽屜式測試沙盒面板 */
        #sandbox-panel {
            position: absolute;
            right: 0;
            top: 0;
            width: 380px;
            height: 100%;
            background-color: rgba(45, 52, 54, 0.98);
            border-left: 6px solid var(--macaron-blue);
            display: flex;
            flex-direction: column;
            padding: 25px;
            color: #f5f6fa;
            z-index: 1000;
            transform: translateX(100%); 
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
        }

        #sandbox-panel.open {
            transform: translateX(0); 
        }

        /* 抽屜切換按鈕 */
        #sandbox-toggle-btn {
            position: absolute;
            left: -140px;
            top: 25px;
            background-color: #2d3436;
            color: var(--macaron-blue);
            border: 2px solid var(--macaron-blue);
            border-right: none;
            border-radius: 12px 0 0 12px;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: -4px 4px 10px rgba(0,0,0,0.2);
            z-index: 1001;
            display: flex; /* 核心硬化：一律預設常開，不依賴任何 JS 成功初始化 */
            align-items: center;
            gap: 6px;
        }

        #sandbox-toggle-btn:hover {
            color: #ffffff;
            background-color: #4a5568;
        }

        .sandbox-title {
            font-size: 22px;
            color: var(--macaron-blue);
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #4a5568;
            padding-bottom: 10px;
        }

        .sandbox-section-title {
            font-size: 15px;
            color: var(--macaron-yellow);
            margin: 15px 0 8px 0;
            font-weight: bold;
        }

        .sandbox-btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .sandbox-btn {
            padding: 8px;
            font-size: 13px;
            font-family: inherit;
            background-color: #4a5568;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.1s;
        }

        .sandbox-btn:hover {
            background-color: #576574;
        }

        .sandbox-btn.accent {
            background-color: var(--macaron-pink);
            color: var(--text-main);
        }

        #sandbox-logger {
            flex: 1;
            background-color: #1e272e;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #4a5568;
            line-height: 1.4;
        }

        .log-entry {
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px dashed #34495e;
            word-break: break-all;
        }

        .log-time {
            color: #95a5a6;
        }

        .log-dir-in {
            color: var(--macaron-blue);
        }

        .log-dir-out {
            color: var(--macaron-green);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 16:9 核心畫布 (1280x720) -->
        <div id="game-viewport">
            
            <!-- 特效遮罩畫布 (Confetti 彩色碎紙物理引擎專用) -->
            <canvas id="effects-canvas"></canvas>

            <!-- 遊戲主畫面 -->
            <div id="main-game-area">
                <header>
                    <h1>空間維度與單位變形蟲 <span class="level-badge" id="current-level-display">LV.1 面積網格</span></h1>
                    <div style="font-size: 24px; color: var(--text-main); font-weight: bold;">分數：<span id="score-display">000</span></div>
                </header>

                <div class="split-container">
                    <!-- 左欄：原始圖型 Canvas -->
                    <div class="split-panel" style="border-top: 8px solid var(--macaron-pink);">
                        <div class="panel-top-info">
                            <div class="panel-title" id="left-panel-title">📐 原始二維空間</div>
                        </div>
                        
                        <div class="canvas-container">
                            <canvas id="left-canvas" width="480" height="300"></canvas>
                        </div>

                        <div class="panel-desc" id="left-panel-desc"></div>
                    </div>

                    <!-- 右欄：切分提示 Canvas -->
                    <div class="split-panel" style="border-top: 8px solid var(--macaron-blue);">
                        <div class="panel-top-info">
                            <div class="panel-title" id="right-panel-title">💡 概念切分提示</div>
                        </div>
                        
                        <div class="canvas-container">
                            <canvas id="right-canvas" width="480" height="300"></canvas>
                        </div>

                        <div class="panel-desc" id="right-panel-desc"></div>
                    </div>
                </div>

                <!-- 底部互動問答控制區 -->
                <div id="qa-bar-container">
                    <!-- 題目資訊 -->
                    <div class="quest-box">
                        <div class="quest-prompt-label">當前換算挑戰題目</div>
                        <div class="quest-text" id="quest-text-display">正在產生關卡題目...</div>
                    </div>

                    <!-- 答題與鍵盤操控區 -->
                    <div class="answer-control-group">
                        <div class="ans-input-wrapper" id="input-trigger-box">
                            <span class="ans-placeholder" id="placeholder-text">請觸控輸入換算數值...</span>
                            <span class="ans-value-display" id="ans-digits-display"><span class="cursor-blink"></span></span>
                        </div>
                        <button class="btn-submit" id="submit-btn" onclick="GameModule.submitAnswer()">確定送出</button>
                    </div>

                    <!-- 作答剩餘機會 (愛心指標) -->
                    <div class="status-badge-box">
                        <div class="hearts-label">剩餘作答生命值</div>
                        <div class="hearts-container" id="hearts-indicator">
                            <span class="heart-icon" id="heart-1">💖</span>
                            <span class="heart-icon" id="heart-2">💖</span>
                            <span class="heart-icon" id="heart-3">💖</span>
                        </div>
                    </div>
                </div>

                <!-- 行動端無痛防彈出虛擬數字小鍵盤 -->
                <div id="virtual-keypad">
                    <button class="keypad-key" onclick="GameModule.keypadPress('7')">7</button>
                    <button class="keypad-key" onclick="GameModule.keypadPress('8')">8</button>
                    <button class="keypad-key" onclick="GameModule.keypadPress('9')">9</button>
                    <button class="keypad-key action" onclick="GameModule.keypadPress('C')">重打</button>
                    
                    <button class="keypad-key" onclick="GameModule.keypadPress('4')">4</button>
                    <button class="keypad-key" onclick="GameModule.keypadPress('5')">5</button>
                    <button class="keypad-key" onclick="GameModule.keypadPress('6')">6</button>
                    <button class="keypad-key action" onclick="GameModule.keypadPress('back')">刪除</button>
                    
                    <button class="keypad-key" onclick="GameModule.keypadPress('1')">1</button>
                    <button class="keypad-key" onclick="GameModule.keypadPress('2')">2</button>
                    <button class="keypad-key" onclick="GameModule.keypadPress('3')">3</button>
                    <button class="keypad-key action" onclick="GameModule.toggleKeypad(false)" style="background-color: var(--macaron-blue);">關閉</button>
                    
                    <button class="keypad-key" onclick="GameModule.keypadPress('0')">0</button>
                    <button class="keypad-key" onclick="GameModule.keypadPress('00')">00</button>
                    <button class="keypad-key" onclick="GameModule.keypadPress('.')">.</button>
                    <button class="keypad-key action" onclick="GameModule.keypadPress(',')">,</button>
                </div>
            </div>

            <!-- 抽屜式控制台：預設常開 -->
            <div id="sandbox-panel">
                <button id="sandbox-toggle-btn" onclick="GameModule.toggleSandbox()">🛠️ 測試控制台</button>
                <div class="sandbox-title">🛠️ 虛擬沙盒控制台</div>
                
                <div class="sandbox-section-title">切換至指定關卡佈局</div>
                <div class="sandbox-btn-grid">
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(1)">LV.1 二維網格</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(2)">LV.2 3D體積</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(3)">LV.3 容體轉換</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(4)">LV.4 微觀尺度</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(5)">LV.5 分數拆解</button>
                </div>

                <div class="sandbox-section-title">排版引擎與渲染極限</div>
                <div class="sandbox-btn-grid" style="grid-template-columns: 1fr;">
                    <button class="sandbox-btn accent" onclick="GameModule.testMathTypography()">繪製複雜數學公式測試</button>
                </div>

                <div class="sandbox-section-title" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>通訊日誌</span>
                    <span style="font-size:11px; color:#95a5a6; cursor:pointer;" onclick="GameModule.clearLogs()">清除</span>
                </div>
                <div id="sandbox-logger"></div>
            </div>

            <!-- 結算大成彈窗 Modal -->
            <div id="settlement-modal">
                <div class="modal-card">
                    <div class="modal-title">🏆 挑戰完成！</div>
                    
                    <div class="modal-grid">
                        <div class="modal-cell">

                        </div>

                            <div class="cell-label">最高 Combo</div>
                            <div class="cell-val" id="settle-combo">0</div>
                        </div>

                            <div class="cell-label">答題勝率</div>
                            <div class="cell-val" id="settle-accuracy">100%</div>
                        </div>
                        <div class="modal-cell">
                            <div class="cell-label">完美通關</div>
                            <div class="cell-val" id="settle-perfect" style="color: var(--macaron-pink);">一次都沒錯！</div>
                        </div>

                    <div class="hearts-label" style="text-align:left; margin-bottom: 5px;">📤 發送給父層 iframe 的通訊日誌報告</div>

    <!-- 直螢幕強制攔截層 -->
    <div id="orientation-overlay">
        <div class="phone-icon-wrapper">
            <span class="phone-icon">📱</span>
        </div>
        <div style="font-size: 32px; color: var(--text-main); font-weight: bold; margin-bottom: 20px;">請旋轉您的行動裝置</div>
        <div style="font-size: 22px; color: #636e72; line-height: 1.8;">本數理挑戰專為【橫螢幕 16:9】設計，<br>請開啟螢幕自動旋轉，並將手機橫放以獲得最佳體驗！</div>
    </div>

    <script>
        // 核心安全警報：若有任何未預期的異常發生，直接在螢幕最頂部以紅色大字標明錯誤，免開 F12
        window.onerror = function(message, source, lineno, colno, error) {
            const errDiv = document.createElement('div');
            errDiv.style.position = 'fixed';
            errDiv.style.top = '0';
            errDiv.style.left = '0';
            errDiv.style.width = '100%';
            errDiv.style.background = 'rgba(235, 94, 85, 0.95)';
            errDiv.style.color = 'white';
            errDiv.style.padding = '15px 30px';
            errDiv.style.zIndex = '99999';
            errDiv.style.fontFamily = 'monospace';
            errDiv.style.fontSize = '14px';
            errDiv.style.wordBreak = 'break-all';
            errDiv.innerHTML = `<strong>JS 執行錯誤：</strong> ${message}<br>在 ${source} 第 ${lineno} 行 (列 ${colno})`;
            document.body.appendChild(errDiv);
            return false;
        };

        // 核心防禦：確保舊版行動瀏覽器無痛支援 roundRect，從根本解決白屏閃退問題
        if (typeof CanvasRenderingContext2D.prototype.roundRect !== 'function') {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (typeof r === 'undefined') r = 0;
                if (typeof r === 'number') {
                    r = {tl: r, tr: r, br: r, bl: r};
                } else if (Array.isArray(r)) {
                    r = {
                        tl: r[0] || 0,
                        tr: r[1] || r[0] || 0,
                        br: r[2] || r[0] || 0,
                        bl: r[3] || r[1] || 0
                    };
                }
                this.beginPath();
                this.moveTo(x + r.tl, y);
                this.lineTo(x + w - r.tr, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                this.lineTo(x + w, y + h - r.br);
                this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                this.lineTo(x + r.bl, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                this.lineTo(x, y + r.tl);
                this.quadraticCurveTo(x, y, x + r.tl, y);
                this.closePath();
                return this;
            };
        }

        /**
         * 遊戲核心與幾何渲染主模組
         */
        const GameModule = {
            config: {
                baseWidth: 1280,
                baseHeight: 720,
                challengeId: 1
            },
            
            state: {
                currentLevel: 1,
                score: 0,
                combo: 0,
                maxCombo: 0,
                totalAnswers: 0,
                correctAnswers: 0,
                attemptsLeft: 3,       // 愛心作答機會 (初始 3 次)
                isPerfect: true,       // 紀錄是否一次都沒錯
                currentQuest: null,    // 當前動態題目物件
                inputValue: "",        // 當前輸入數值
                keypadOpen: false,
                sandboxOpen: false,
                hintActive: false,
                isDebouncing: false    // 防重複發送連點閥
            },

            canvas: {
                left: null,
                right: null,
                effects: null,
                ctxLeft: null,
                ctxRight: null,
                ctxEffects: null
            },

            audioCtx: null,
            particles: [],

            init() {
                GameModule.canvas.left = document.getElementById('left-canvas');
                GameModule.canvas.right = document.getElementById('right-canvas');
                GameModule.canvas.effects = document.getElementById('effects-canvas');
                
                GameModule.canvas.ctxLeft = GameModule.canvas.left.getContext('2d');
                GameModule.canvas.ctxRight = GameModule.canvas.right.getContext('2d');
                GameModule.canvas.ctxEffects = GameModule.canvas.effects.getContext('2d');

                GameModule.bindEvents();
                GameModule.resizeGame();
                GameModule.detectSandboxMode();
                
                // 啟動 Confetti 特效渲染迴圈
                GameModule.initEffectsCanvas();
                GameModule.animateParticles();

                // 啟動關卡 1
                GameModule.transitionToLevel(1);

                GameModule.postToParent({
                    type: 'GAME_READY',
                    challengeId: GameModule.config.challengeId
                });
            },

            bindEvents() {
                window.addEventListener('message', (e) => GameModule.handleIncomingMessage(e));
                window.addEventListener('resize', () => GameModule.resizeGame());
                window.addEventListener('orientationchange', () => GameModule.resizeGame());

                // 點擊觸摸輸入框時喚醒專屬擬真虛擬小鍵盤
                const inputTrigger = document.getElementById('input-trigger-box');
                inputTrigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    GameModule.toggleKeypad(true);
                });

                document.getElementById('main-game-area').addEventListener('click', () => {
                    GameModule.toggleKeypad(false);
                });
                document.getElementById('virtual-keypad').addEventListener('click', (e) => {
                    e.stopPropagation(); 
                });

                window.addEventListener('keydown', (e) => {
                    if (GameModule.state.keypadOpen) {
                        if (e.key >= '0' && e.key <= '9') GameModule.keypadPress(e.key);
                        else if (e.key === '.') GameModule.keypadPress('.');
                        else if (e.key === ',') GameModule.keypadPress(',');
                        else if (e.key === 'Backspace') GameModule.keypadPress('back');
                        else if (e.key === 'Escape') GameModule.toggleKeypad(false);
                        else if (e.key === 'Enter') GameModule.submitAnswer();
                    }
                });
            },

            initAudio() {
                if (!GameModule.audioCtx) {
                    GameModule.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },

            /**
             * Web Audio 合成音調：答對時根據 Combo 數堆疊音調，答錯時播放警示低音
             */
            playSynthSound(type) {
                GameModule.initAudio();
                if (!GameModule.audioCtx) return;

                const ctx = GameModule.audioCtx;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                const now = ctx.currentTime;

                if (type === 'correct') {
                    // 音調隨連續答對 Combo 數同步向上堆疊躍遷
                    const baseFreq = 523.25 + (GameModule.state.combo * 45); 
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(baseFreq, now);
                    osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, now + 0.12);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.45);
                } else if (type === 'wrong') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(146.83, now); 
                    osc.frequency.linearRampToValueAtTime(110.00, now + 0.25);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.32);
                }
            },

            initEffectsCanvas() {
                const resizeEffects = () => {
                    GameModule.canvas.effects.width = GameModule.canvas.effects.parentElement.clientWidth;
                    GameModule.canvas.effects.height = GameModule.canvas.effects.parentElement.clientHeight;
                };
                resizeEffects();
                window.addEventListener('resize', resizeEffects);
            },

            /**
             * Confetti 彩色碎紙屑噴發物理粒子生成
             */
            spawnConfetti() {
                const startX = GameModule.canvas.effects.width / 2;
                const startY = GameModule.canvas.effects.height - 80;
                const colors = ['#ffb8b8', '#81ecec', '#ffeaa7', '#55efc4', '#ff7675', '#a29bfe'];
                for (let i = 0; i < 110; i++) {
                    GameModule.particles.push({
                        x: startX,
                        y: startY,
                        vx: (Math.random() - 0.5) * 22,
                        vy: -Math.random() * 16 - 8,
                        rotation: Math.random() * 360,
                        rSpeed: (Math.random() - 0.5) * 15,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        w: Math.random() * 8 + 6,
                        h: Math.random() * 12 + 8,
                        opacity: 1
                    });
                }
            },

            animateParticles() {
                const ctx = GameModule.canvas.ctxEffects;
                if (!ctx) return;

                ctx.clearRect(0, 0, GameModule.canvas.effects.width, GameModule.canvas.effects.height);

                for (let i = 0; i < GameModule.particles.length; i++) {
                    const p = GameModule.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.45; 
                    p.vx *= 0.98; 
                    p.rotation += p.rSpeed;

                    if (p.vy > 2) {
                        p.opacity -= 0.015;
                    }

                    if (p.opacity <= 0 || p.y > GameModule.canvas.effects.height) {
                        GameModule.particles.splice(i, 1);
                        i--;
                        continue;
                    }

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate((p.rotation * Math.PI) / 180);
                    ctx.globalAlpha = p.opacity;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                }

                requestAnimationFrame(() => GameModule.animateParticles());
            },

            toggleSandbox() {
                GameModule.state.sandboxOpen = !GameModule.state.sandboxOpen;
                const panel = document.getElementById('sandbox-panel');
                if (GameModule.state.sandboxOpen) {
                    panel.classList.add('open');
                } else {
                    panel.classList.remove('open');
                }
            },

            detectSandboxMode() {
                const toggleBtn = document.getElementById('sandbox-toggle-btn');
                const sandboxPanel = document.getElementById('sandbox-panel');
                const isStandalone = (window === top);
                
                if (isStandalone) {
                    toggleBtn.style.display = 'flex';
                    sandboxPanel.style.display = 'flex';
                    GameModule.log('系統偵測：獨立開發模式。已解鎖測試控制台。', 'system');
                } else {
                    toggleBtn.style.display = 'none';
                    sandboxPanel.style.display = 'none';
                }
            },

            toggleKeypad(show) {
                GameModule.state.keypadOpen = show;
                const keypad = document.getElementById('virtual-keypad');
                const inputWrap = document.getElementById('input-trigger-box');
                
                if (show) {
                    keypad.classList.add('show');
                    inputWrap.classList.add('focus');
                } else {
                    keypad.classList.remove('show');
                    inputWrap.classList.remove('focus');
                }
            },

            keypadPress(key) {
                const display = document.getElementById('ans-digits-display');
                const placeholder = document.getElementById('placeholder-text');

                if (key === 'C') {
                    GameModule.state.inputValue = "";
                } else if (key === 'back') {
                    GameModule.state.inputValue = GameModule.state.inputValue.slice(0, -1);
                } else {
                    if (GameModule.state.inputValue.length >= 12) return;
                    if (key === '.' && GameModule.state.inputValue.includes('.')) return;
                    GameModule.state.inputValue += key;
                }

                if (GameModule.state.inputValue === "") {
                    placeholder.style.opacity = "1";
                    display.innerHTML = `<span class="cursor-blink"></span>`;
                } else {
                    placeholder.style.opacity = "0";
                    display.innerHTML = `${GameModule.state.inputValue}<span class="cursor-blink"></span>`;
                }
            },

            /**
             * 自製手繪圓角矩形引擎：完美規避所有老舊內核缺乏 ctx.roundRect 原生方法造成的白屏閃退
             */
            drawRoundRect(ctx, x, y, w, h, r, fillColor = null, strokeColor = null, strokeWidth = 1) {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
                if (fillColor) {
                    ctx.fillStyle = fillColor;
                    ctx.fill();
                }
                if (strokeColor) {
                    ctx.strokeStyle = strokeColor;
                    ctx.lineWidth = strokeWidth;
                    ctx.stroke();
                }
                ctx.restore();
            },

            /**
             * 第一性原理：標準數學排版渲染引擎 (Canvas text superscript parser)
             * 將 "^" 作為上標切分符，在 2D 渲染層完美繪製符合教科書格式的上標字型。
             */
            drawMathText(ctx, text, x, y, fontSize, color = "#2d3436") {
                ctx.save();
                ctx.fillStyle = color;
                ctx.font = `bold ${fontSize}px 'Kosugi Maru', sans-serif`;
                ctx.textBaseline = 'alphabetic';

                const parts = text.split('^');
                let currentX = x;

                parts.forEach((part, index) => {
                    if (index === 0) {
                        ctx.fillText(part, currentX, y);
                        currentX += ctx.measureText(part).width;
                    } else {
                        const superDigit = part.charAt(0);
                        const remainingText = part.slice(1);

                        ctx.font = `bold ${fontSize * 0.6}px 'Kosugi Maru', sans-serif`;
                        const superY = y - fontSize * 0.45;
                        ctx.fillText(superDigit, currentX, superY);
                        currentX += ctx.measureText(superDigit).width + 2;

                        ctx.font = `bold ${fontSize}px 'Kosugi Maru', sans-serif`;
                        if (remainingText) {
                            ctx.fillText(remainingText, currentX, y);
                            currentX += ctx.measureText(remainingText).width;
                        }
                    }
                });
                ctx.restore();
            },

            /**
             * 數學三維等角投影座標變換公式
             * 將三維空間坐標 (x, y, z) 轉換為二維平面投影點 (X, Y)
             */
            getIsoPoint(x, y, z, cx, cy, scale) {
                const cos30 = 0.866025; 
                const sin30 = 0.5;      
                return {
                    x: cx + (x - y) * scale * cos30,
                    y: cy + (x + y) * scale * sin30 - z * scale
                };
            },

            /**
             * 高級等角投影立方體渲染模組
             */
            drawIsoCube(ctx, cx, cy, scale, sizeX, sizeY, sizeZ, options = {}) {
                const topColor = options.topColor || "#ffeaa7";
                const leftColor = options.leftColor || "#ffb8b8";
                const rightColor = options.rightColor || "#81ecec";
                const strokeColor = options.strokeColor || "#2d3436";
                const strokeWidth = options.strokeWidth || 2;
                const drawGrid = options.drawGrid || false;
                const gridSegments = options.gridSegments || 10;
                const gridColor = options.gridColor || "rgba(45, 52, 54, 0.15)";

                const p1 = GameModule.getIsoPoint(sizeX, 0, 0, cx, cy, scale);      
                const p2 = GameModule.getIsoPoint(sizeX, sizeY, 0, cx, cy, scale);  
                const p3 = GameModule.getIsoPoint(0, sizeY, 0, cx, cy, scale);      
                const p4 = GameModule.getIsoPoint(0, 0, sizeZ, cx, cy, scale);      
                const p5 = GameModule.getIsoPoint(sizeX, 0, sizeZ, cx, cy, scale);  
                const p6 = GameModule.getIsoPoint(sizeX, sizeY, sizeZ, cx, cy, scale); 
                const p7 = GameModule.getIsoPoint(0, sizeY, sizeZ, cx, cy, scale);  

                ctx.save();
                ctx.lineJoin = "round";
                ctx.lineCap = "round";

                // 1. 繪製左側面
                ctx.fillStyle = leftColor;
                ctx.beginPath();
                ctx.moveTo(p3.x, p3.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(p6.x, p6.y);
                ctx.lineTo(p7.x, p7.y);
                ctx.closePath();
                ctx.fill();
                
                if (drawGrid) {
                    ctx.strokeStyle = gridColor;
                    ctx.lineWidth = 1;
                    for (let i = 1; i < gridSegments; i++) {
                        const x = sizeX * (i / gridSegments);
                        const start = GameModule.getIsoPoint(x, sizeY, 0, cx, cy, scale);
                        const end = GameModule.getIsoPoint(x, sizeY, sizeZ, cx, cy, scale);
                        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                    }
                    for (let j = 1; j < gridSegments; j++) {
                        const z = sizeZ * (j / gridSegments);
                        const start = GameModule.getIsoPoint(0, sizeY, z, cx, cy, scale);
                        const end = GameModule.getIsoPoint(sizeX, sizeY, z, cx, cy, scale);
                        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                    }
                }
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = strokeWidth;
                ctx.beginPath();
                ctx.moveTo(p3.x, p3.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p6.x, p6.y); ctx.lineTo(p7.x, p7.y); ctx.closePath();
                ctx.stroke();

                // 2. 繪製右側面
                ctx.fillStyle = rightColor;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(p6.x, p6.y);
                ctx.lineTo(p5.x, p5.y);
                ctx.closePath();
                ctx.fill();

                if (drawGrid) {
                    ctx.strokeStyle = gridColor;
                    ctx.lineWidth = 1;
                    for (let i = 1; i < gridSegments; i++) {
                        const y = sizeY * (i / gridSegments);
                        const start = GameModule.getIsoPoint(sizeX, y, 0, cx, cy, scale);
                        const end = GameModule.getIsoPoint(sizeX, y, sizeZ, cx, cy, scale);
                        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                    }
                    for (let j = 1; j < gridSegments; j++) {
                        const z = sizeZ * (j / gridSegments);
                        const start = GameModule.getIsoPoint(sizeX, 0, z, cx, cy, scale);
                        const end = GameModule.getIsoPoint(sizeX, sizeY, z, cx, cy, scale);
                        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                    }
                }
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = strokeWidth;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p6.x, p6.y); ctx.lineTo(p5.x, p5.y); ctx.closePath();
                ctx.stroke();

                // 3. 繪製頂面
                ctx.fillStyle = topColor;
                ctx.beginPath();
                ctx.moveTo(p4.x, p4.y);
                ctx.lineTo(p5.x, p5.y);
                ctx.lineTo(p6.x, p6.y);
                ctx.lineTo(p7.x, p7.y);
                ctx.closePath();
                ctx.fill();

                if (drawGrid) {
                    ctx.strokeStyle = gridColor;
                    ctx.lineWidth = 1;
                    for (let i = 1; i < gridSegments; i++) {
                        const x = sizeX * (i / gridSegments);
                        const start = GameModule.getIsoPoint(x, 0, sizeZ, cx, cy, scale);
                        const end = GameModule.getIsoPoint(x, sizeY, sizeZ, cx, cy, scale);
                        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                    }
                    for (let j = 1; j < gridSegments; j++) {
                        const y = sizeY * (j / gridSegments);
                        const start = GameModule.getIsoPoint(0, y, sizeZ, cx, cy, scale);
                        const end = GameModule.getIsoPoint(sizeX, y, sizeZ, cx, cy, scale);
                        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                    }
                }
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = strokeWidth;
                ctx.beginPath();
                ctx.moveTo(p4.x, p4.y); ctx.lineTo(p5.x, p5.y); ctx.lineTo(p6.x, p6.y); ctx.lineTo(p7.x, p7.y); ctx.closePath();
                ctx.stroke();

                ctx.restore();
            },

            /**
             * 步驟五：繪製立體馬卡龍階梯方塊輔助函數
             */
            drawStairBlock(ctx, x, y, w, h, topColor, frontColor, sideColor, unitText) {
                const shift = 15;
                ctx.save();
                ctx.lineJoin = "round";
                ctx.lineCap = "round";
                ctx.strokeStyle = "#2d3436";
                ctx.lineWidth = 3;

                // 1. 繪製前側面 (Front)
                ctx.fillStyle = frontColor;
                ctx.beginPath();
                ctx.rect(x, y + shift, w - shift, h - shift);
                ctx.fill();
                ctx.stroke();

                // 2. 繪製頂面 (Top)
                ctx.fillStyle = topColor;
                ctx.beginPath();
                ctx.moveTo(x, y + shift);
                ctx.lineTo(x + shift, y);
                ctx.lineTo(x + w, y); // 完美修正：補齊 Y 軸參數，消除 runtime 崩潰
                ctx.lineTo(x + w - shift, y + shift);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 3. 繪製右側面 (Side)
                ctx.fillStyle = sideColor;
                ctx.beginPath();
                ctx.moveTo(x + w - shift, y + shift);
                ctx.lineTo(x + w, y);
                ctx.lineTo(x + w, y + h - shift);
                ctx.lineTo(x + w - shift, y + h);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 4. 文字標註在方塊正面中央
                ctx.fillStyle = "#2d3436";
                ctx.font = "bold 18px 'Kosugi Maru', sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(unitText, x + (w - shift)/2, y + shift + (h - shift)/2);

                ctx.restore();
            },

            /**
             * 動態關卡題庫引擎：隨機生成合理的物理量與換算關係
             */
            generateLevelQuest(level) {
                let text = "";
                let leftRenderValue = 1;
                let answer = "";

                switch (level) {
                    case 1:
                        const m2Vals = [1.5, 2, 2.5, 3.5];
                        const val1 = m2Vals[Math.floor(Math.random() * m2Vals.length)];
                        text = `請將 ${val1} m² 換算為 cm²`;
                        leftRenderValue = val1;
                        answer = (val1 * 10000).toLocaleString(); 
                        break;
                    case 2:
                        const m3Vals = [1.2, 2.0, 1.5, 3.0];
                        const val2 = m3Vals[Math.floor(Math.random() * m3Vals.length)];
                        text = `請將 ${val2} m³ 換算為 cm³`;
                        leftRenderValue = val2;
                        answer = (val2 * 1000000).toLocaleString(); 
                        break;
                    case 3:
                        const lVals = [1.5, 2.5, 3.0, 5.0];
                        const val3 = lVals[Math.floor(Math.random() * lVals.length)];
                        text = `請將水量 ${val3} L 換算為 cm³`;
                        leftRenderValue = val3;
                        answer = (val3 * 1000).toLocaleString(); 
                        break;
                    case 4:
                        const mmVals = [1.5, 2.0, 3.2, 5.0];
                        const val4 = mmVals[Math.floor(Math.random() * mmVals.length)];
                        text = `請將 ${val4} mm 換算為 μm`;
                        leftRenderValue = val4;
                        answer = (val4 * 1000).toLocaleString(); 
                        break;
                    case 5:
                        const speedVals = [36, 72, 90, 108];
                        const val5 = speedVals[Math.floor(Math.random() * speedVals.length)];
                        text = `請將速度 ${val5} km/hr 換算為 m/s`;
                        leftRenderValue = val5;
                        answer = (val5 / 3.6).toString(); 
                        break;
                }

                return {
                    text: text,
                    leftValue: leftRenderValue,
                    answer: answer
                };
            },

            updateHeartsUI() {
                const h1 = document.getElementById('heart-1');
                const h2 = document.getElementById('heart-2');
                const h3 = document.getElementById('heart-3');

                if (GameModule.state.attemptsLeft === 3) {
                    h1.classList.remove('lost'); h2.classList.remove('lost'); h3.classList.remove('lost');
                } else if (GameModule.state.attemptsLeft === 2) {
                    h3.classList.add('lost');
                } else if (GameModule.state.attemptsLeft === 1) {
                    h2.classList.add('lost'); h3.classList.add('lost');
                } else {
                    h1.classList.add('lost'); h2.classList.add('lost'); h3.classList.add('lost');

            submitAnswer() {
                if (GameModule.state.isDebouncing) return;
                GameModule.state.isDebouncing = true;
                setTimeout(() => GameModule.state.isDebouncing = false, 400);

                if (GameModule.state.inputValue === "") {
                    GameModule.triggerInputShake();
                    return;
                }

                const processedInput = GameModule.state.inputValue.replace(/,/g, '').trim();
                const processedAnswer = GameModule.state.currentQuest.answer.replace(/,/g, '').trim();

                GameModule.state.totalAnswers++;

                if (processedInput === processedAnswer) {
                    GameModule.state.correctAnswers++;
                    GameModule.state.combo++;
                    if (GameModule.state.combo > GameModule.state.maxCombo) {
                        GameModule.state.maxCombo = GameModule.state.combo;
                    }
                    GameModule.state.score += 20;

                    GameModule.playSynthSound('correct');
                    GameModule.spawnConfetti();

                    document.getElementById('score-display').textContent = GameModule.state.score.toString().padStart(3, '0');

                    GameModule.state.hintActive = true;
                    GameModule.renderRightGraphics();

                    GameModule.log(`作答正確！Combo數：${GameModule.state.combo}。跳轉下一關。`, 'system');

                    setTimeout(() => {
                        let nextLevel = GameModule.state.currentLevel + 1;
                        if (nextLevel > 5) {
                            GameModule.triggerChallengeOver();
                        } else {
                            GameModule.transitionToLevel(nextLevel);
                        }
                    }, 1800);

                } else {
                    GameModule.state.combo = 0; 
                    GameModule.state.attemptsLeft--;
                    GameModule.state.isPerfect = false; 

                    GameModule.playSynthSound('wrong');
                    GameModule.triggerInputShake();
                    GameModule.updateHeartsUI();

                    GameModule.state.hintActive = true;
                    GameModule.renderRightGraphics();

                    GameModule.log(`作答錯誤。剩餘機會：${GameModule.state.attemptsLeft}`, 'system');

                    if (GameModule.state.attemptsLeft <= 0) {
                        setTimeout(() => {
                            GameModule.triggerChallengeOver();
                        }, 1000);
                    }
                }
            },

            triggerInputShake() {
                const inputWrap = document.getElementById('input-trigger-box');
                inputWrap.classList.add('shake');
                setTimeout(() => {
                    inputWrap.classList.remove('shake');
                }, 400);
            },

            triggerChallengeOver() {
                GameModule.toggleKeypad(false);

                const accuracy = GameModule.state.totalAnswers > 0 
                    ? Math.round((GameModule.state.correctAnswers / GameModule.state.totalAnswers) * 100) 
                    : 0;

                document.getElementById('settle-score').textContent = GameModule.state.score;
                document.getElementById('settle-combo').textContent = GameModule.state.maxCombo;
                document.getElementById('settle-accuracy').textContent = `${accuracy}%`;

                const perfectLabel = document.getElementById('settle-perfect');
                if (GameModule.state.isPerfect) {
                    perfectLabel.textContent = "是，一次都沒錯！";
                    perfectLabel.style.color = "var(--macaron-green)";
                } else {
                    perfectLabel.textContent = "否，再接再厲！";
                    perfectLabel.style.color = "var(--macaron-pink)";
                }

                const overPayload = {
                    type: 'GAME_OVER',
                    challengeId: GameModule.config.challengeId,
                    currentLevel: GameModule.state.currentLevel,
                    isPerfect: GameModule.state.isPerfect,
                    score: GameModule.state.score,
                    comboMax: GameModule.state.maxCombo,
                    accuracy: accuracy
                };

                document.getElementById('settle-json-log').textContent = JSON.stringify(overPayload, null, 2);
                document.getElementById('settlement-modal').style.display = 'flex';

                GameModule.postToParent(overPayload);
            },

            restartChallenge() {
                document.getElementById('settlement-modal').style.display = 'none';
                GameModule.state.score = 0;
                GameModule.state.combo = 0;
                GameModule.state.maxCombo = 0;
                GameModule.state.totalAnswers = 0;
                GameModule.state.correctAnswers = 0;
                GameModule.state.isPerfect = true;
                
                document.getElementById('score-display').textContent = "000";
                GameModule.transitionToLevel(1);
            },

            renderRightGraphics() {

                const height = GameModule.canvas.right.height;

                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, width, height);

                const questValue = GameModule.state.currentQuest ? GameModule.state.currentQuest.leftValue : 1;

                const drawPillBadge = (ctx, bx, by, text) => {
                    ctx.save();
                    ctx.fillStyle = "#ffffff";
                    ctx.strokeStyle = "#fd79a8";
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    GameModule.drawRoundRect(ctx, bx - 36, by - 14, 72, 28, 14, "#ffffff", "#fd79a8", 2.5);
                    ctx.fillStyle = "#d63031";
                    ctx.font = "bold 15px 'Kosugi Maru', sans-serif";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(text, bx, by);
                    ctx.restore();
                };

                const drawCurvedArrow = (ctx, sx, sy, ex, ey, h, arrowColor) => {
                    ctx.save();
                    ctx.strokeStyle = arrowColor;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    const cx = (sx + ex) / 2;
                    const cy = (sy + ey) / 2 - h;
                    ctx.quadraticCurveTo(cx, cy, ex, ey);
                    ctx.stroke();

                    const dx = ex - cx;
                    const dy = ey - cy;
                    const angle = Math.atan2(dy, dx);

                    ctx.fillStyle = arrowColor;
                    ctx.translate(ex, ey);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(-12, -6);
                    ctx.lineTo(-12, 6);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                };

                if (!GameModule.state.hintActive) {
                    ctx.save();
                    ctx.fillStyle = "rgba(129, 236, 236, 0.1)";
                    ctx.beginPath();
                    ctx.arc(width/2, height/2, 60, 0, Math.PI * 2);
