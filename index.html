<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>國二數理大挑戰 - 基礎外殼與通訊</title>
    <!-- 引入 Google Fonts 親和力圓體字型 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 基礎重設與防溢出 */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #F0F4F8; /* 舒適馬卡龍灰藍底色 */
            font-family: 'Kosugi Maru', 'Noto Sans TC', sans-serif;
        }

        /* 16:9 核心視口容器 (標準解析度 1280x720) */
        #app-viewport {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1280px;
            height: 720px;
            background: radial-gradient(circle at center, #FFFFFF 0%, #E8F0F8 100%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transform-origin: center center;
            transform: translate(-50%, -50%) scale(1);
            transition: box-shadow 0.3s ease;
            z-index: 1;
        }

        /* Canvas 層 */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 【行動端高度優化】偵錯面板 */
        #debug-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 999; /* 絕對置頂 */
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #BEE3F8;
            border-radius: 14px;
            width: 280px; /* 從 320px 縮減，防止遮擋過多 Canvas */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            max-height: calc(100vh - 20px); /* 限制最大高度為物理螢幕高度 */
            display: flex;
            flex-direction: column;
        }

        /* 折疊狀態樣式 */
        #debug-panel.collapsed {
            width: 180px;
            height: 44px;
            background: rgba(255, 255, 255, 0.9);
        }

        /* 摺疊切換按鈕 */
        #btn-toggle-debug {
            width: 100%;
            height: 44px;
            background: #4299E1;
            color: white;
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            outline: none;
        }

        #btn-toggle-debug:active {
            background: #3182CE;
        }

        #btn-toggle-debug::after {
            content: '▼';
            font-size: 10px;
            transition: transform 0.3s ease;
        }

        #debug-panel.collapsed #btn-toggle-debug::after {
            content: '▲';
        }

        /* 面板內部內容區（加入順暢的觸控滾動支援） */
        .debug-body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* 解鎖 iOS 物理動態滾動 */
        }

        #debug-panel h3 {
            font-size: 14px;
            color: #2B6CB0;
            border-bottom: 2px dashed #E2E8F0;
            padding-bottom: 4px;
        }

        .debug-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #4A5568;
            margin: 1px 0;
        }

        .debug-value {
            font-weight: bold;
            color: #2D3748;
        }

        /* 行動端觸控按鈕 */
        .btn-test {
            display: block;
            width: 100%;
            height: 42px;
            line-height: 40px;
            padding: 0;
            background-color: #48BB78;
            color: white;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0px #2F855A;
            transition: transform 0.05s ease, box-shadow 0.05s ease;
            text-align: center;
        }

        .btn-test:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0px #2F855A;
        }

        /* 縮小高度並優化滑動的歷史通訊紀錄框 */
        #event-log {
            background: #EDF2F7;
            border-radius: 6px;
            padding: 6px;
            height: 75px; /* 降低高度以適應橫向窄螢幕 */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* 解鎖觸控滾動 */
            font-size: 11px;
            line-height: 1.4;
            color: #2D3748;
            font-family: monospace;
            border: 1px solid #CBD5E0;
        }

        /* 防呆直螢幕阻擋遮罩 */
        #orientation-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #3182CE;
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 30px;
            text-align: center;
        }

        /* 旋轉手機的動態示意圖 */
        .phone-icon-wrapper {
            position: relative;
            width: 80px;
            height: 120px;
            margin-bottom: 20px;
        }

        .phone-icon {
            width: 50px;
            height: 90px;
            border: 4px solid white;
            border-radius: 8px;
            position: absolute;
            top: 15px;
            left: 15px;
            animation: rotatePhone 2s ease-in-out infinite;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        #orientation-blocker h2 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #orientation-blocker p {
            font-size: 16px;
            opacity: 0.9;
        }

        /* CSS 級別的直立螢幕判定 */
        @media (orientation: portrait) {
            #orientation-blocker {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <!-- 16:9 核心遊戲視口 -->
    <div id="app-viewport">
        <!-- 畫布核心 -->
        <canvas id="game-canvas"></canvas>
    </div>

    <!-- 偵錯面板 (置於最外層，不受縮放影響) -->
    <div id="debug-panel" class="collapsed">
        <button id="btn-toggle-debug">⚙️ 開啟/關閉偵錯面板</button>
        <div class="debug-body">
            <h3>開發單元測試面板 (Step 1)</h3>
            <div class="debug-row">
                <span>視窗物理尺寸:</span>
                <span id="val-win-size" class="debug-value">0 x 0</span>
            </div>
            <div class="debug-row">
                <span>畫布縮放比例:</span>
                <span id="val-scale" class="debug-value">1.00</span>
            </div>
            <div class="debug-row">
                <span>字型狀態:</span>
                <span id="val-font" class="debug-value">檢測中...</span>
            </div>
            <div class="debug-row">
                <span>Iframe 狀態:</span>
                <span id="val-embed" class="debug-value">獨立運行</span>
            </div>
            
            <button class="btn-test" id="btn-ready-test">測試 GAME_READY</button>
            <button class="btn-test" id="btn-over-test" style="background-color: #ED64A6; box-shadow: 0 3px 0px #B83280;">測試 GAME_OVER</button>
            
            <div style="font-size: 11px; font-weight: bold; margin-top: 4px; color: #4A5568;">
                虛擬外層訊息接收紀錄：
            </div>
            <div id="event-log"></div>
        </div>
    </div>

    <!-- 螢幕方向引導器 -->
    <div id="orientation-blocker">
        <div class="phone-icon-wrapper">
            <div class="phone-icon"></div>
        </div>
        <h2>請旋轉您的螢幕</h2>
        <p>本挑戰僅支援【橫螢幕】操作，請開啟手機自動旋轉功能並橫放以獲得最佳遊戲體驗。</p>
    </div>

    <script>
        // --- 1. 核心全域參數設定 ---
        const BASE_WIDTH = 1280;
        const BASE_HEIGHT = 720;
        const CHALLENGE_ID = 1;

        const viewport = document.getElementById('app-viewport');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        let currentScale = 1;
        let isFontLoaded = false;
        let isEmbedded = window.parent !== window;

        // --- 2. RWD 自動縮放演算法 ---
        function updateLayout() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            const scaleX = windowWidth / BASE_WIDTH;
            const scaleY = windowHeight / BASE_HEIGHT;
            currentScale = Math.min(scaleX, scaleY);

            viewport.style.transform = `translate(-50%, -50%) scale(${currentScale})`;

            document.getElementById('val-win-size').textContent = `${windowWidth} x ${windowHeight}`;
            document.getElementById('val-scale').textContent = currentScale.toFixed(3);

            const blocker = document.getElementById('orientation-blocker');
            if (windowHeight > windowWidth) {
                blocker.style.display = 'flex';
            } else {
                blocker.style.display = 'none';
            }
        }

        // --- 3. 摺疊面板事件優化 ---
        const debugPanel = document.getElementById('debug-panel');
        document.getElementById('btn-toggle-debug').addEventListener('click', (e) => {
            e.stopPropagation();
            debugPanel.classList.toggle('collapsed');
        });

        // 阻止偵錯面板內部的觸控拖曳事件冒泡到 body，防止整頁被橡皮筋鎖死
        debugPanel.addEventListener('touchmove', (e) => {
            e.stopPropagation();
        }, { passive: true });

        // --- 4. 跨界通訊協定與虛擬接收器 ---
        function sendEventToParent(payload) {
            if (isEmbedded) {
                window.parent.postMessage(payload, '*');
            } else {
                logLocalEvent(payload);
            }
        }

        function logLocalEvent(payload) {
            console.log('%c[遊戲通訊外拋]', 'background: #2D3748; color: #63B3ED; padding: 2px 6px; border-radius: 4px;', payload);
            const logBox = document.getElementById('event-log');
            const timeStr = new Date().toTimeString().split(' ')[0];
            const newMsg = document.createElement('div');
            newMsg.style.marginBottom = '4px';
            newMsg.style.borderBottom = '1px solid #E2E8F0';
            newMsg.style.paddingBottom = '2px';
            newMsg.innerHTML = `<span style="color: #3182CE; font-weight:bold;">[${timeStr}]</span> ${payload.type}`;
            logBox.appendChild(newMsg);
            logBox.scrollTop = logBox.scrollHeight;
        }

        // 綁定測試按鈕事件 (支援 Touchstart 以降低行動端延遲)
        const readyBtn = document.getElementById('btn-ready-test');
        const overBtn = document.getElementById('btn-over-test');

        const triggerReady = (e) => {
            e.preventDefault();
            sendEventToParent({ type: 'GAME_READY', challengeId: CHALLENGE_ID });
        };

        const triggerOver = (e) => {
            e.preventDefault();
            sendEventToParent({
                type: 'GAME_OVER',
                challengeId: CHALLENGE_ID,
                currentLevel: 1,
                isPerfect: true,
                score: 100
            });
        };

        readyBtn.addEventListener('touchstart', triggerReady, { passive: false });
        readyBtn.addEventListener('click', triggerReady);
        overBtn.addEventListener('touchstart', triggerOver, { passive: false });
        overBtn.addEventListener('click', triggerOver);

        // --- 5. Google Fonts 非同步解鎖與 Canvas 初步繪圖 ---
        function checkFontsAndInit() {
            document.fonts.ready.then(() => {
                isFontLoaded = true;
                const fontVal = document.getElementById('val-font');
                fontVal.textContent = '已就緒 (Kosugi)';
                fontVal.style.color = '#38A169';
                
                setupCanvasResolution();
                startDiagnosticRender();
                
                sendEventToParent({ type: 'GAME_READY', challengeId: CHALLENGE_ID });
            }).catch(err => {
                console.error("字型加載失敗：", err);
                const fontVal = document.getElementById('val-font');
                fontVal.textContent = '載入失敗 (降級)';
                fontVal.style.color = '#E53E3E';
                setupCanvasResolution();
                startDiagnosticRender();
            });
        }

        function setupCanvasResolution() {
            canvas.width = BASE_WIDTH;
            canvas.height = BASE_HEIGHT;
        }

        // --- 6. 診斷畫面繪製系統 (行動端 legible 優化) ---
        let rotationAngle = 0;
        function startDiagnosticRender() {
            function drawFrame() {
                ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
                
                // 繪製格線系統
                ctx.strokeStyle = 'rgba(190, 227, 248, 0.4)';
                ctx.lineWidth = 1;
                for (let i = 0; i < BASE_WIDTH; i += 40) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, BASE_HEIGHT);
                    ctx.stroke();
                }
                for (let j = 0; j < BASE_HEIGHT; j += 40) {
                    ctx.beginPath();
                    ctx.moveTo(0, j);
                    ctx.lineTo(BASE_WIDTH, j);
                    ctx.stroke();
                }

                const centerX = BASE_WIDTH / 2;
                const centerY = BASE_HEIGHT / 2 - 40; // 稍微往上調，移開下方字體空間
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(rotationAngle);
                
                // 繪製圓環
                ctx.beginPath();
                ctx.arc(0, 0, 70, 0, Math.PI * 2);
                ctx.lineWidth = 12;
                ctx.strokeStyle = '#BEE3F8';
                ctx.stroke();
                
                ctx.fillStyle = '#63B3ED';
                for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
                    ctx.fillRect(80 * Math.cos(a) - 5, 80 * Math.sin(a) - 5, 10, 10);
                }
                ctx.restore();

                // 【全新優化】大幅放大 Canvas 字體，並採取高可讀性雙行排版
                ctx.fillStyle = '#2B6CB0';
                ctx.font = 'bold 52px "Kosugi Maru", sans-serif'; // 大幅提升至 52px
                ctx.textAlign = 'center';
                ctx.fillText('步驟一：基礎環境與縮放已就緒', centerX, centerY + 160);

                ctx.fillStyle = '#4A5568';
                ctx.font = 'bold 24px "Noto Sans TC", sans-serif'; // 提升至 24px
                
                // 雙行說明，防止在低寬高比螢幕下擠壓變形
                const subLine1 = '點擊左上角「⚙️ 齒輪」展開或收折偵錯面板';
                const subLine2 = '進行行動端手勢與跨界通訊測試';
                
                ctx.fillText(subLine1, centerX, centerY + 220);
                ctx.fillText(subLine2, centerX, centerY + 265);

                rotationAngle += 0.015;
                requestAnimationFrame(drawFrame);
            }
            requestAnimationFrame(drawFrame);
        }

        // --- 7. 事件綁定與初始化啟動 ---
        window.addEventListener('resize', updateLayout);
        window.addEventListener('orientationchange', () => {
            setTimeout(updateLayout, 200);
        });

        document.getElementById('val-embed').textContent = isEmbedded ? 'Iframe 嵌入中' : '獨立運行';
        if (isEmbedded) {
            document.getElementById('val-embed').style.color = '#3182CE';
        }

        updateLayout();
        checkFontsAndInit();

    </script>
</body>
</html>
