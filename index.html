<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>國二數理挑戰 - 獨立遊戲模組 (步驟一修正版)</title>
    <!-- 引入日系可愛圓體與英文 Fredoka 圓體 -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 基礎重設，避免全域滾動條 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #2c2a29; /* 深色沉穩底色，更能襯托馬卡龍色系遊戲視窗 */
            font-family: 'Zen Maru Gothic', 'Fredoka', 'Microsoft JhengHei', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 外層絕對置中容器：使用純 CSS Flexbox 進行絕對置中 */
        #game-container-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ==========================================================================
           【CSS 隔離】所有遊戲核心樣式均在 #game-viewport 命名空間下
           ========================================================================== */
        #game-viewport {
            /* 修正：不再使用 absolute 定位，完全由 Flexbox 決定位置 */
            width: 1280px;
            height: 720px;
            background-color: #FDFBF7; /* 馬卡龍舒壓奶油底色 */
            transform-origin: center center; /* 縮放中心點點在字卡正中央 */
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            transition: background-color 0.4s ease, transform 0.1s ease; /* 縮放也加入輕微過渡，更流暢 */
        }

        /* 頂部資訊區 */
        #game-viewport .header-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 馬卡龍粉紅主題徽章 */
        #game-viewport .level-badge {
            background-color: #FFB7B2; /* 櫻花粉 */
            color: #5D4037;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 6px 0 #FF9E96;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        /* 馬卡龍薄荷綠資訊欄 */
        #game-viewport .status-info {
            background-color: #B5EAD7; /* 薄荷綠 */
            color: #2E5A44;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 6px 0 #92D3BC;
            display: flex;
            gap: 20px;
        }

        /* 中央大字卡主視角 */
        #game-viewport .center-card-flow {
            width: 80%;
            flex-grow: 1;
            margin: 30px 0;
            background: #FFFFFF;
            border: 4px solid #FFDAC1; /* 暖橘膚色邊框 */
            border-radius: 32px;
            box-shadow: 0 12px 0 #FCD1B4, 0 16px 30px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
        }

        #game-viewport .center-card-flow h1 {
            color: #5D4037;
            font-size: 40px;
            margin: 0 0 20px 0;
            font-weight: 700;
        }

        #game-viewport .center-card-flow p {
            color: #8D6E63;
            font-size: 22px;
            line-height: 1.6;
            margin: 0;
        }

        /* 動態連線動態標示 */
        #game-viewport .signal-pulse-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #E8D7FF; /* 薰衣草紫 */
            padding: 12px 28px;
            border-radius: 16px;
            color: #5E35B1;
            font-weight: 700;
            font-size: 18px;
            margin-top: 30px;
            box-shadow: 0 6px 0 #D1B3FF;
        }

        #game-viewport .pulse-dot {
            width: 12px;
            height: 12px;
            background-color: #9575CD;
            border-radius: 50%;
            animation: pulse-glow 1.5s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 12px #9575CD; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        /* 頁尾版權標記 */
        #game-viewport .footer-tag {
            color: #BCAAA4;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 1px;
        }

        /* ==========================================================================
           【直螢幕防呆遮罩】與遊戲 viewport 隔離
           ========================================================================== */
        #orientation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFB7B2; /* 馬卡龍暖紅粉 */
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #5D4037;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #orientation-overlay .phone-icon-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
        }

        #orientation-overlay .phone-svg {
            width: 100%;
            height: 100%;
            fill: #5D4037;
            animation: rotate-phone 2s infinite ease-in-out;
        }

        @keyframes rotate-phone {
            0% { transform: rotate(0deg); }
            40% { transform: rotate(-90deg); }
            70% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        #orientation-overlay h2 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 15px 0;
        }

        #orientation-overlay p {
            font-size: 20px;
            margin: 0;
            opacity: 0.9;
            font-weight: 600;
        }

        /* 媒體查詢：當處於直式螢幕或高度過長時顯示遮罩 */
        @media (orientation: portrait) {
            #orientation-overlay {
                display: flex;
            }
        }

        /* ==========================================================================
           【右下角橘色測試遙控器】（僅在 window === top 獨立測試時渲染）
           ========================================================================== */
        #test-remote-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: linear-gradient(135deg, #FF9E2A 0%, #E65100 100%); /* 亮眼橘色 */
            border: 4px solid #FFF;
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10000; /* 置頂於所有元素之上 */
            color: #FFFFFF;
            display: none; /* 由 JS 依據條件啟用 */
        }

        #test-remote-panel h3 {
            margin: 0 0 15px 0;
            font-size: 18px;
            text-align: center;
            border-bottom: 2px dashed rgba(255,255,255,0.4);
            padding-bottom: 8px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        #test-remote-panel .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.15);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        #test-remote-panel .led-light {
            display: inline-block;
            width: 14px;
            height: 14px;
            background-color: #FF5252; /* 預設紅燈 */
            border-radius: 50%;
            box-shadow: 0 0 8px #FF5252;
            transition: all 0.3s ease;
        }

        #test-remote-panel .led-light.active {
            background-color: #69F0AE; /* 連線亮綠燈 */
            box-shadow: 0 0 12px #69F0AE;
        }

        #test-remote-panel .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        #test-remote-panel .remote-btn {
            background-color: #FFF;
            color: #E65100;
            border: none;
            padding: 8px 10px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 0 #B33D00;
            transition: all 0.1s;
        }

        #test-remote-panel .remote-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #test-remote-panel .log-box {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            max-height: 80px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <!-- 遊戲整體置中包裝 -->
    <div id="game-container-wrapper">
        
        <!-- 【CSS隔離主容器】遊戲本體視界 (16:9 鎖定) -->
        <div id="game-viewport">
            
            <!-- 頂部資訊欄 -->
            <div class="header-bar">
                <div class="level-badge">
                    <span>🏆</span>
                    <span id="display-level">當前關卡：尚未初始化</span>
                </div>
                <div class="status-info">
                    <span>❤️ 生命值: 3/3</span>
                    <span>⭐ Combo: 0</span>
                </div>
            </div>

            <!-- 中央單一主要字卡 -->
            <div class="center-card-flow">
                <h1 id="card-title">等待主系統訊號...</h1>
                <p id="card-desc">請使用右下角的「測試遙控器」點選【模擬啟動】。這會模擬主網站透過 iframe 發送關卡指定訊號給此遊戲模組。</p>
                
                <div class="signal-pulse-box">
                    <div class="pulse-dot"></div>
                    <span id="signal-text">已備妥 GAME_READY，等待外部指令...</span>
                </div>
            </div>

            <!-- 底部裝飾與版權資訊 -->
            <div class="footer-tag">
                SPACE DIMENSION & UNIT CHALLENGE v1.0
            </div>

        </div>

    </div>

    <!-- 直螢幕防呆警告遮罩 -->
    <div id="orientation-overlay">
        <div class="phone-icon-wrapper">
            <!-- 簡單俐落的旋轉手機 SVG 圖示 -->
            <svg class="phone-svg" viewBox="0 0 24 24">
                <path d="M17,19H7V5H17M17,1H7C5.89,1 5,1.89 5,3V21C5,22.1 5.9,23 7,23H17C18.1,23 19,22.1 19,21V3C19,1.89 18.1,1 17,1Z"/>
            </svg>
        </div>
        <h2>請旋轉螢幕以獲得最佳遊戲體驗</h2>
        <p>本挑戰賽專為橫螢幕大字卡模式設計</p>
    </div>

    <!-- 獨立開發專用：橘色測試遙控器 -->
    <div id="test-remote-panel" id="panel">
        <h3>測試遙控器 (獨立開發模式)</h3>
        <div class="status-row">
            <span>外傳 Ready 訊號狀態：</span>
            <div id="led-indicator" class="led-light"></div>
        </div>
        <div class="btn-grid">
            <button class="remote-btn" onclick="GameModule.simulatePostMessage(1)">模擬：開第1關</button>
            <button class="remote-btn" onclick="GameModule.simulatePostMessage(2)">模擬：開第2關</button>
            <button class="remote-btn" onclick="GameModule.simulatePostMessage(3)">模擬：開第3關</button>
            <button class="remote-btn" onclick="GameModule.simulatePostMessage(4)">模擬=開第4關</button>
            <button class="remote-btn" onclick="GameModule.simulatePostMessage(5)">模擬：開第5關</button>
        </div>
        <div class="log-box" id="remote-log">
            系統就緒。已開啟單機測試面板。
        </div>
    </div>

    <!-- ==========================================================================
                 【JS 隔離】所有遊戲變數與行為均在命名空間 GameModule 內
                 ========================================================================== -->
    <script>
        const GameModule = {
            // 設計稿基準解析度 (16:9)
            baseWidth: 1280,
            baseHeight: 720,
            currentLevel: 0,

            // 初始化入口
            init() {
                this.setupRWD();
                this.setupCommunication();
                this.checkStandalone();

                // 註冊 RWD 縮放監聽器
                window.addEventListener('resize', () => this.setupRWD());
                window.addEventListener('orientationchange', () => {
                    // 稍微延遲以確保行動端轉向參數已就緒
                    setTimeout(() => this.setupRWD(), 100);
                });
            },

            // 實作 RWD transform: scale 縮放機制
            setupRWD() {
                const viewport = document.getElementById('game-viewport');
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;

                // 1. 計算縮放率 (選取視窗寬高與設計稿寬高之最小值，確保完全容納在螢幕內)
                const scale = Math.min(windowWidth / this.baseWidth, windowHeight / this.baseHeight);

                // 2. 設定主視角變形。
                // *【關鍵修正】*：不再手動計算並設定 viewport.style.left 或 viewport.style.top！
                // 完全將置中邏輯交給外層 #game-container-wrapper 的 Flexbox 處理。
                // JavaScript 只負責處理 scale 的大小。
                
                viewport.style.transform = `scale(${scale})`;
            },

            // 通訊管道初始化
            setupCommunication() {
                // 1. 發送 GAME_READY 訊號給父視窗 (向上發送)
                this.sendPostMessage({ type: 'GAME_READY', challengeId: 1 });

                // 2. 監聽父視窗傳遞的指令 (向下接收)
                window.addEventListener('message', (event) => {
                    const data = event.data;
                    if (data && data.type === 'START_GAME') {
                        this.logToRemote(`收到外部指令: 啟動 LV.${data.config.level}`);
                        this.startGame(data.config.level);
                    }
                });
            },

            // 啟動關卡狀態更新 (此處為步驟一預留的狀態骨架，後續步驟在此擴充題庫與動畫)
            startGame(level) {
                this.currentLevel = level;
                
                // 更新畫面標籤與文字
                document.getElementById('display-level').innerText = `當前關卡：LV.${level}`;
                
                const titleEl = document.getElementById('card-title');
                const descEl = document.getElementById('card-desc');
                const signalTextEl = document.getElementById('signal-text');

                // 改變奶油底色以配合關卡提示，呈現漸進式色調反饋
                const viewPort = document.getElementById('game-viewport');
                const colors = {
                    1: '#FFF0F0', // 櫻花淡粉紅
                    2: '#FFF9E6', // 香蕉淡黃
                    3: '#E6FFFA', // 薄荷淡藍綠
                    4: '#F0E6FF', // 薰衣草淡紫
                    5: '#FFF0E6'  // 甜橙淡粉
                };
                viewPort.style.backgroundColor = colors[level] || '#FDFBF7';

                titleEl.innerText = `🎮 挑戰狀態：關卡 LV.${level} 載入成功！`;
                descEl.innerHTML = `
                    主網站成功下發指令！目前已成功切換至<b>第 ${level} 關</b>的互動賽局。<br><br>
                    <span style="font-size:18px; color:#A1887F;">這證明了父子視窗 iframe 雙向通訊機制已完美接軌。<br>
                    接下來在「步驟二」與「步驟三」中，我們將在此字卡核心注入 3D 翻轉動畫與隨機出題算式！</span>
                `;
                signalTextEl.innerText = `雙向通訊已建立 (當前關卡: LV.${level})`;
            },

            // 判斷是否為獨立開啟 (window === top) 並啟用虛擬測試面板
            checkStandalone() {
                if (window === top) {
                    // 顯示右下角橘色模擬測試遙控器
                    const panel = document.getElementById('test-remote-panel');
                    panel.style.display = 'block';
                    
                    // 點亮連線狀態燈
                    setTimeout(() => {
                        document.getElementById('led-indicator').classList.add('active');
                        this.logToRemote('通訊自檢：成功對外廣播 GAME_READY');
                    }, 500);
                }
            },

            // 輔助函式：發送訊息並記錄
            sendPostMessage(msg) {
                parent.postMessage(msg, '*');
                this.logToRemote(`發送通訊: ${msg.type}`);
            },

            // 虛擬遙控器專用：模擬外部大網站發送 iframe 訊號
            simulatePostMessage(level) {
                const simulatedEvent = {
                    type: 'START_GAME',
                    config: { level: level }
                };
                // 模擬 message 事件直接觸發於當前視窗，完美還原 iframe 接收情境
                window.postMessage(simulatedEvent, '*');
            },

            // 遙控器 Log 記錄面板顯示
            logToRemote(message) {
                const logBox = document.getElementById('remote-log');
                if (logBox) {
                    const time = new Date().toLocaleTimeString();
                    logBox.innerHTML = `[${time}] ${message}<br>` + logBox.innerHTML;
                }
            }
        };

        // 確保 DOM 載入完畢後開始執行
        window.addEventListener('DOMContentLoaded', () => {
            GameModule.init();
        });
    </script>
</body>
</html>
