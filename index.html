<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>空間維度與單位變形蟲 - 步驟四</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark-plate: #1e272e; 
            --bg-game: #f5f6fa;       
            --macaron-pink: #ffb8b8;  
            --macaron-blue: #81ecec;  
            --macaron-yellow: #ffeaa7;
            --macaron-green: #55efc4; 
            --text-main: #2d3436;     
            --text-muted: #4a5568;    
            --panel-white: #ffffff;   
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        button, .macaron-btn, .sandbox-btn, canvas {
            user-select: auto !important;
            -webkit-user-select: auto !important;
            touch-action: manipulation !important;
            cursor: pointer;
        }

        body, html {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-dark-plate);
            font-family: 'Kosugi Maru', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
        }

        /* 16:9 核心畫布 */
        #game-viewport {
            position: absolute;
            width: 1280px;
            height: 720px;
            background-color: var(--bg-game);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            transform-origin: center center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            transition: opacity 0.2s ease;
        }

        /* 遊戲主視區 */
        #main-game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 35px;
            height: 100%;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px dashed #dcdde1;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 {
            color: var(--text-main);
            font-size: 34px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .level-badge {
            background-color: var(--macaron-pink);
            color: white;
            padding: 6px 16px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
        }

        /* 雙欄對比版面配置 */
        .split-container {
            flex: 1;
            display: flex;
            gap: 30px;
            height: calc(100% - 110px); 
        }

        .split-panel {
            flex: 1;
            background-color: var(--panel-white);
            border-radius: 28px;
            padding: 25px;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .panel-top-info {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .panel-title {
            font-size: 26px;
            color: var(--text-main);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 雙畫布渲染容器 */
        .canvas-container {
            width: 100%;
            flex: 1;
            margin: 15px 0;
            background-color: #fafbfc;
            border-radius: 18px;
            border: 3px dashed #e2e8f0;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            border-radius: 15px;
            background-color: #ffffff;
        }

        .panel-desc {
            font-size: 19px;
            color: var(--text-muted);
            line-height: 1.5;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: keep-all; /* 防禦性語意中斷換行 */
        }

        /* 1. 關鍵優化：強健型網頁上標文字抗折行樣式 */
        .math-inline {
            display: inline-block;
            white-space: nowrap;
            vertical-align: baseline;
        }

        sup {
            font-size: 0.7em;
            position: relative;
            top: -0.3em;
            vertical-align: baseline;
            line-height: 0;
        }

        /* 馬卡龍控制按鈕 */
        .macaron-btn {
            width: 80%;
            padding: 14px 25px;
            font-size: 20px;
            font-family: 'Kosugi Maru', sans-serif;
            font-weight: bold;
            color: var(--text-main);
            background-color: var(--macaron-blue);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #00ced1;
            transition: all 0.05s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .macaron-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #00ced1;
        }

        /* ----------------------------------
           抽屜式測試沙盒面板 (絕對定位)
        ------------------------------------- */
        #sandbox-panel {
            position: absolute;
            right: 0;
            top: 0;
            width: 380px;
            height: 100%;
            background-color: rgba(45, 52, 54, 0.98);
            border-left: 6px solid var(--macaron-blue);
            display: flex;
            flex-direction: column;
            padding: 25px;
            color: #f5f6fa;
            z-index: 1000;
            transform: translateX(100%); 
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
        }

        #sandbox-panel.open {
            transform: translateX(0); 
        }

        /* 抽屜切換按鈕 */
        #sandbox-toggle-btn {
            position: absolute;
            left: -140px;
            top: 25px;
            background-color: #2d3436;
            color: var(--macaron-blue);
            border: 2px solid var(--macaron-blue);
            border-right: none;
            border-radius: 12px 0 0 12px;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: -4px 4px 10px rgba(0,0,0,0.2);
            z-index: 1001;
            display: none; 
            align-items: center;
            gap: 6px;
        }

        #sandbox-toggle-btn:hover {
            color: #ffffff;
            background-color: #4a5568;
        }

        .sandbox-title {
            font-size: 22px;
            color: var(--macaron-blue);
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #4a5568;
            padding-bottom: 10px;
        }

        .sandbox-section-title {
            font-size: 15px;
            color: var(--macaron-yellow);
            margin: 15px 0 8px 0;
            font-weight: bold;
        }

        .sandbox-btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .sandbox-btn {
            padding: 8px;
            font-size: 13px;
            font-family: inherit;
            background-color: #4a5568;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.1s;
        }

        .sandbox-btn:hover {
            background-color: #576574;
        }

        .sandbox-btn.accent {
            background-color: var(--macaron-pink);
            color: var(--text-main);
        }

        #sandbox-logger {
            flex: 1;
            background-color: #1e272e;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #4a5568;
            line-height: 1.4;
        }

        .log-entry {
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px dashed #34495e;
            word-break: break-all;
        }

        .log-time {
            color: #95a5a6;
        }

        .log-dir-in {
            color: var(--macaron-blue);
        }

        .log-dir-out {
            color: var(--macaron-green);
        }

        /* 直螢幕強制攔截層 */
        #orientation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background-color: var(--macaron-yellow);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 40px;
        }

        .phone-icon-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 35px;
        }

        .phone-icon {
            font-size: 100px;
            display: inline-block;
            animation: rotatePhone 2.5s infinite ease-in-out;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            35% { transform: rotate(-90deg); }
            70% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 核心遊戲 16:9 Viewport (1280x720) -->
        <div id="game-viewport">
            
            <!-- 遊戲主畫面 -->
            <div id="main-game-area">
                <header>
                    <h1>空間維度與單位變形蟲 <span class="level-badge" id="current-level-display">LV.1 面積網格</span></h1>
                    <div style="font-size: 24px; color: var(--text-main); font-weight: bold;">分數：<span id="score-display">000</span></div>
                </header>

                <div class="split-container">
                    <!-- 左欄：原始圖型 Canvas -->
                    <div class="split-panel" style="border-top: 8px solid var(--macaron-pink);">
                        <div class="panel-top-info">
                            <div class="panel-title" id="left-panel-title">📐 原始二維空間</div>
                        </div>
                        
                        <div class="canvas-container">
                            <canvas id="left-canvas" width="480" height="300"></canvas>
                        </div>

                        <div class="panel-desc" id="left-panel-desc"></div>
                        <button class="macaron-btn" id="action-btn-left">⚙️ 重繪觀察圖</button>
                    </div>

                    <!-- 右欄：切分提示 Canvas -->
                    <div class="split-panel" style="border-top: 8px solid var(--macaron-blue);">
                        <div class="panel-top-info">
                            <div class="panel-title" id="right-panel-title">💡 概念切分提示</div>
                        </div>
                        
                        <div class="canvas-container">
                            <canvas id="right-canvas" width="480" height="300"></canvas>
                        </div>

                        <div class="panel-desc" id="right-panel-desc"></div>
                        <button class="macaron-btn" id="action-btn-right" style="background-color: var(--macaron-pink); box-shadow: 0 6px 0 #e84118; color: white;">🔍 開啟對比提示</button>
                    </div>
                </div>
            </div>

            <!-- 抽屜式控制台 -->
            <div id="sandbox-panel">
                <button id="sandbox-toggle-btn" onclick="GameModule.toggleSandbox()">🛠️ 測試控制台</button>
                <div class="sandbox-title">🛠️ 虛擬沙盒控制台</div>
                
                <div class="sandbox-section-title">切換至指定關卡佈局</div>
                <div class="sandbox-btn-grid">
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(1)">LV.1 二維網格</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(2)">LV.2 3D體積</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(3)">LV.3 容體轉換</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(4)">LV.4 微觀尺度</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(5)">LV.5 分數拆解</button>
                </div>

                <div class="sandbox-section-title">排版引擎與渲染極限</div>
                <div class="sandbox-btn-grid" style="grid-template-columns: 1fr;">
                    <button class="sandbox-btn accent" onclick="GameModule.testMathTypography()">繪製複雜數學公式測試</button>
                </div>

                <div class="sandbox-section-title" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>通訊日誌</span>
                    <span style="font-size:11px; color:#95a5a6; cursor:pointer;" onclick="GameModule.clearLogs()">清除</span>
                </div>
                <div id="sandbox-logger"></div>
            </div>

        </div>
    </div>

    <!-- 直螢幕強制攔截層 -->
    <div id="orientation-overlay">
        <div class="phone-icon-wrapper">
            <span class="phone-icon">📱</span>
        </div>
        <div style="font-size: 32px; color: var(--text-main); font-weight: bold; margin-bottom: 20px;">請旋轉您的行動裝置</div>
        <div style="font-size: 22px; color: #636e72; line-height: 1.8;">本數理挑戰專為【橫螢幕 16:9】設計，<br>請開啟螢幕自動旋轉，並將手機橫放以獲得最佳體驗！</div>
    </div>

    <script>
        /**
         * 遊戲與幾何渲染主模組
         */
        const GameModule = {
            config: {
                baseWidth: 1280,
                baseHeight: 720,
                challengeId: 1
            },
            
            state: {
                currentLevel: 1,
                score: 0,
                sandboxOpen: false,
                hintActive: false 
            },

            canvas: {
                left: null,
                right: null,
                ctxLeft: null,
                ctxRight: null
            },

            init() {
                this.canvas.left = document.getElementById('left-canvas');
                this.canvas.right = document.getElementById('right-canvas');
                this.canvas.ctxLeft = this.canvas.left.getContext('2d');
                this.canvas.ctxRight = this.canvas.right.getContext('2d');

                this.bindEvents();
                this.resizeGame();
                this.detectSandboxMode();
                
                this.transitionToLevel(1);

                this.postToParent({
                    type: 'GAME_READY',
                    challengeId: this.config.challengeId
                });
            },

            bindEvents() {
                window.addEventListener('message', (e) => this.handleIncomingMessage(e));
                window.addEventListener('resize', () => this.resizeGame());
                window.addEventListener('orientationchange', () => this.resizeGame());

                document.getElementById('action-btn-left').addEventListener('click', () => {
                    this.renderLeftGraphics();
                });

                document.getElementById('action-btn-right').addEventListener('click', () => {
                    this.state.hintActive = !this.state.hintActive;
                    const btn = document.getElementById('action-btn-right');
                    if (this.state.hintActive) {
                        btn.textContent = "🔄 重設對比提示";
                        btn.style.backgroundColor = "#81ecec"; 
                        btn.style.boxShadow = "0 6px 0 #00ced1";
                    } else {
                        btn.textContent = "🔍 開啟對比提示";
                        btn.style.backgroundColor = "#ffb8b8"; 
                        btn.style.boxShadow = "0 6px 0 #e84118";
                    }
                    this.renderRightGraphics();
                });
            },

            toggleSandbox() {
                this.state.sandboxOpen = !this.state.sandboxOpen;
                const panel = document.getElementById('sandbox-panel');
                if (this.state.sandboxOpen) {
                    panel.classList.add('open');
                } else {
                    panel.classList.remove('open');
                }
            },

            detectSandboxMode() {
                const toggleBtn = document.getElementById('sandbox-toggle-btn');
                const sandboxPanel = document.getElementById('sandbox-panel');
                
                toggleBtn.style.display = 'flex';
                sandboxPanel.style.display = 'flex';
                
                this.log('系統偵測：獨立開發模式硬化。已解鎖測試控制台，點擊左側 🛠️ 即可展開測試。', 'system');
            },

            /**
             * 第一性原理：標準數學排版渲染引擎 (Canvas text superscript parser)
             * 將 "^" 作為上標切分符，在 2D 渲染層完美繪製符合教科書格式的上標字型。
             */
            drawMathText(ctx, text, x, y, fontSize, color = "#2d3436") {
                ctx.save();
                ctx.fillStyle = color;
                ctx.font = `bold ${fontSize}px 'Kosugi Maru', sans-serif`;
                ctx.textBaseline = 'alphabetic';

                const parts = text.split('^');
                let currentX = x;

                parts.forEach((part, index) => {
                    if (index === 0) {
                        ctx.fillText(part, currentX, y);
                        currentX += ctx.measureText(part).width;
                    } else {
                        const superDigit = part.charAt(0);
                        const remainingText = part.slice(1);

                        ctx.font = `bold ${fontSize * 0.6}px 'Kosugi Maru', sans-serif`;
                        const superY = y - fontSize * 0.45;
                        ctx.fillText(superDigit, currentX, superY);
                        currentX += ctx.measureText(superDigit).width + 2;

                        ctx.font = `bold ${fontSize}px 'Kosugi Maru', sans-serif`;
                        if (remainingText) {
                            ctx.fillText(remainingText, currentX, y);
                            currentX += ctx.measureText(remainingText).width;
                        }
                    }
                });
                ctx.restore();
            },

            /**
             * 數學三維等角投影座標變換公式
             * 將三維空間坐標 (x, y, z) 轉換為二維平面投影點 (X, Y)
             */
            getIsoPoint(x, y, z, cx, cy, scale) {
                const cos30 = 0.866025; 
                const sin30 = 0.5;      
                return {
                    x: cx + (x - y) * scale * cos30,
                    y: cy + (x + y) * scale * sin30 - z * scale
                };
            },

            /**
             * 高級等角投影立方體渲染模組
             */
            drawIsoCube(ctx, cx, cy, scale, sizeX, sizeY, sizeZ, options = {}) {
                const topColor = options.topColor || "#ffeaa7";
                const leftColor = options.leftColor || "#ffb8b8";
                const rightColor = options.rightColor || "#81ecec";
                const strokeColor = options.strokeColor || "#2d3436";
                const strokeWidth = options.strokeWidth || 2;
                const drawGrid = options.drawGrid || false;
                const gridSegments = options.gridSegments || 10;
                const gridColor = options.gridColor || "rgba(45, 52, 54, 0.15)";

                const p1 = this.getIsoPoint(sizeX, 0, 0, cx, cy, scale);      
                const p2 = this.getIsoPoint(sizeX, sizeY, 0, cx, cy, scale);  
                const p3 = this.getIsoPoint(0, sizeY, 0, cx, cy, scale);      
                const p4 = this.getIsoPoint(0, 0, sizeZ, cx, cy, scale);      
                const p5 = this.getIsoPoint(sizeX, 0, sizeZ, cx, cy, scale);  
                const p6 = this.getIsoPoint(sizeX, sizeY, sizeZ, cx, cy, scale); 
                const p7 = this.getIsoPoint(0, sizeY, sizeZ, cx, cy, scale);  

                ctx.save();
                ctx.lineJoin = "round";
                ctx.lineCap = "round";

                // 1. 繪製左側面
                ctx.fillStyle = leftColor;
                ctx.beginPath();
                ctx.moveTo(p3.x, p3.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(p6.x, p6.y);
                ctx.lineTo(p7.x, p7.y);
                ctx.closePath();
                ctx.fill();
                
                if (drawGrid) {
                    ctx.strokeStyle = gridColor;
                    ctx.lineWidth = 1;
                    for (let i = 1; i < gridSegments; i++) {
                        const x = sizeX * (i / gridSegments);
                        const start = this.getIsoPoint(x, sizeY, 0, cx, cy, scale);
                        const end = this.getIsoPoint(x, sizeY, sizeZ, cx, cy, scale);
                        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                    }
                    for (let j = 1; j < gridSegments; j++) {
                        const z = sizeZ * (j / gridSegments);
                        const start = this.getIsoPoint(0, sizeY, z, cx, cy, scale);
                        const end = this.getIsoPoint(sizeX, sizeY, z, cx, cy, scale);
                        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                    }
                }
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = strokeWidth;
                ctx.beginPath();
                ctx.moveTo(p3.x, p3.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p6.x, p6.y); ctx.lineTo(p7.x, p7.y); ctx.closePath();
                ctx.stroke();

                // 2. 繪製右側面
                ctx.fillStyle = rightColor;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(p6.x, p6.y);
                ctx.lineTo(p5.x, p5.y);
                ctx.closePath();
                ctx.fill();

                if (drawGrid) {
                    ctx.strokeStyle = gridColor;
                    ctx.lineWidth = 1;
                    for (let i = 1; i < gridSegments; i++) {
                        const y = sizeY * (i / gridSegments);
                        const start = this.getIsoPoint(sizeX, y, 0, cx, cy, scale);
                        const end = this.getIsoPoint(sizeX, y, sizeZ, cx, cy, scale);
                        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                    }
                    for (let j = 1; j < gridSegments; j++) {
                        const z = sizeZ * (j / gridSegments);
                        const start = this.getIsoPoint(sizeX, 0, z, cx, cy, scale);
                        const end = this.getIsoPoint(sizeX, sizeY, z, cx, cy, scale);
                        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                    }
                }
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = strokeWidth;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p6.x, p6.y); ctx.lineTo(p5.x, p5.y); ctx.closePath();
                ctx.stroke();

                // 3. 繪製頂面
                ctx.fillStyle = topColor;
                ctx.beginPath();
                ctx.moveTo(p4.x, p4.y);
                ctx.lineTo(p5.x, p5.y);
                ctx.lineTo(p6.x, p6.y);
                ctx.lineTo(p7.x, p7.y);
                ctx.closePath();
                ctx.fill();

                if (drawGrid) {
                    ctx.strokeStyle = gridColor;
                    ctx.lineWidth = 1;
                    for (let i = 1; i < gridSegments; i++) {
                        const x = sizeX * (i / gridSegments);
                        const start = this.getIsoPoint(x, 0, sizeZ, cx, cy, scale);
                        const end = this.getIsoPoint(x, sizeY, sizeZ, cx, cy, scale);
                        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                    }
                    for (let j = 1; j < gridSegments; j++) {
                        const y = sizeY * (j / gridSegments);
                        const start = this.getIsoPoint(0, y, sizeZ, cx, cy, scale);
                        const end = this.getIsoPoint(sizeX, y, sizeZ, cx, cy, scale);
                        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
                    }
                }
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = strokeWidth;
                ctx.beginPath();
                ctx.moveTo(p4.x, p4.y); ctx.lineTo(p5.x, p5.y); ctx.lineTo(p6.x, p6.y); ctx.lineTo(p7.x, p7.y); ctx.closePath();
                ctx.stroke();

                ctx.restore();
            },

            /* =================================================================
               通訊沙盒封裝
               ================================================================= */
            postToParent(data) {
                parent.postMessage(data, '*');
                this.log(`[發送 ↗] ${JSON.stringify(data)}`, 'out');
            },

            handleIncomingMessage(e) {
                const data = e.data;
                if (!data) return;

                this.log(`[接收 ↙] ${JSON.stringify(data)}`, 'in');
                if (data.type === 'START_GAME') {
                    const requestedLevel = data.config?.level || 1;
                    this.transitionToLevel(requestedLevel);
                }
            },

            mockReceiveStartGame(level) {
                window.postMessage({
                    type: 'START_GAME',
                    config: { level: level }
                }, '*');
            },

            log(msg, direction) {
                const logger = document.getElementById('sandbox-logger');
                if (!logger) return;

                const timeStr = new Date().toLocaleTimeString();
                let dirClass = '';
                let prefix = '';

                if (direction === 'in') {
                    dirClass = 'log-dir-in';
                    prefix = '📥 ';
                } else if (direction === 'out') {
                    dirClass = 'log-dir-out';
                    prefix = '📤 ';
                } else {
                    prefix = '⚙️ ';
                }

                logger.innerHTML += `
                    <div class="log-entry">
                        <span class="log-time">[${timeStr}]</span> 
                        <span class="${dirClass}">${prefix}${msg}</span>
                    </div>
                `;
                logger.scrollTop = logger.scrollHeight;
            },

            clearLogs() {
                const logger = document.getElementById('sandbox-logger');
                if (logger) logger.innerHTML = '';
            },

            resizeGame() {
                const container = document.getElementById('game-container');
                const viewport = document.getElementById('game-viewport');
                const overlay = document.getElementById('orientation-overlay');

                if (!container || !viewport) return;

                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;

                const scaleX = windowWidth / this.config.baseWidth;
                const scaleY = windowHeight / this.config.baseHeight;
                const scale = Math.min(scaleX, scaleY);

                viewport.style.transform = `translate(-50%, -50%) scale(${scale})`;

                // 判斷直螢幕狀態
                const isPortrait = windowHeight > windowWidth;

                if (overlay) {
                    if (isPortrait) {
                        overlay.style.display = 'flex';
                        viewport.style.opacity = '0';
                        viewport.style.pointerEvents = 'none';
                    } else {
                        overlay.style.display = 'none';
                        viewport.style.opacity = '1';
                        viewport.style.pointerEvents = 'auto';
                    }
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            GameModule.init();
        });
    </script>
</body>
</html>
