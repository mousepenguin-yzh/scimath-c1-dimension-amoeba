<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>挑戰一：空間維度與單位變形蟲 - 步驟五整合版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #F0F4F8;
            font-family: 'Kosugi Maru', 'Noto Sans TC', sans-serif;
        }

        #app-viewport {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1280px;
            height: 720px;
            background: radial-gradient(circle at center, #FFFFFF 0%, #E8F0F8 100%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transform-origin: center center;
            transform: translate(-50%, -50%) scale(1);
            transition: box-shadow 0.3s ease;
            z-index: 1;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        #dom-ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .interactive-overlay {
            position: absolute;
            pointer-events: auto;
        }

        #main-tabs {
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 16px;
            border-radius: 50px;
            border: 3.5px solid #BEE3F8;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .tab-btn {
            border: none;
            padding: 10px 28px;
            font-family: 'Kosugi Maru', sans-serif;
            font-size: 20px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #4A5568;
            background: transparent;
        }

        .tab-btn.active {
            background-color: #3182CE;
            color: white;
            box-shadow: 0 6px 14px rgba(49, 130, 206, 0.4);
        }

        #status-header {
            top: 105px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 30px;
            border-radius: 30px;
            border: 2px solid #BEE3F8;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.04);
            font-size: 20px;
            font-weight: bold;
            color: #2B6CB0;
            text-align: center;
        }

        #lv5-sub-selector {
            top: 165px;
            left: 50%;
            transform: translateX(-50%);
            display: none; 
            gap: 16px;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 12px;
            border-radius: 40px;
            border: 2px dashed #BEE3F8;
        }

        .sub-tab-btn {
            border: none;
            padding: 6px 20px;
            font-family: 'Kosugi Maru', sans-serif;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: #718096;
            background: transparent;
        }

        .sub-tab-btn.active {
            background-color: #ED64A6;
            color: white;
        }

        #math-display-card {
            top: 240px;
            right: 50px;
            background: rgba(255, 255, 255, 0.98);
            border: 4px solid #BEE3F8;
            border-radius: 24px;
            padding: 28px 40px;
            box-shadow: 0 15px 35px rgba(49, 130, 206, 0.18);
            color: #2D3748;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 480px;
            max-width: 550px;
        }

        #math-display-card.success-pulse {
            border-color: #48BB78;
            background-color: #F0FFF4;
            transform: scale(1.03);
            box-shadow: 0 20px 45px rgba(72, 187, 120, 0.3);
        }

        .card-title {
            font-size: 22px;
            color: #718096;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .formula-text {
            font-size: 32px;
            font-weight: bold;
            color: #2B6CB0;
            line-height: 1.5;
        }

        .formula-text sup {
            font-size: 22px;
            color: #E53E3E;
            margin-left: 2px;
        }

        #control-panel-bottom {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.98);
            border: 3.5px solid #BEE3F8;
            border-radius: 35px;
            padding: 16px 40px;
            width: 85%;
            max-width: 980px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .step-btn {
            background-color: #3182CE;
            color: white;
            border: none;
            padding: 12px 36px;
            border-radius: 25px;
            font-family: inherit;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0px #2B6CB0;
            transition: all 0.05s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0px #2B6CB0;
        }

        .step-btn:disabled {
            background-color: #CBD5E0;
            box-shadow: none;
            color: #A0AEC0;
            cursor: not-allowed;
            transform: none;
        }

        .step-indicator-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
        }

        .step-dots-row {
            display: flex;
            gap: 16px;
        }

        .step-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #E2E8F0;
            border: 2px solid #CBD5E0;
            transition: all 0.25s ease;
        }

        .step-dot.active {
            background-color: #3182CE;
            border-color: #3182CE;
            transform: scale(1.3);
            box-shadow: 0 0 10px rgba(49, 130, 206, 0.4);
        }

        #orientation-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #3182CE;
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .phone-icon-wrapper {
            position: relative;
            width: 80px;
            height: 120px;
            margin-bottom: 20px;
        }

        .phone-icon {
            width: 50px;
            height: 90px;
            border: 4px solid white;
            border-radius: 8px;
            position: absolute;
            top: 15px;
            left: 15px;
            animation: rotatePhone 2s ease-in-out infinite;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        #orientation-blocker h2 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #orientation-blocker p {
            font-size: 16px;
            opacity: 0.9;
        }

        @media (orientation: portrait) {
            #orientation-blocker {
                display: flex;
            }
        }
    </style>
</head>
<body>

    <!-- 16:9 遊戲主視口 -->
    <div id="app-viewport">
        <canvas id="game-canvas"></canvas>

        <div id="dom-ui-layer">
            <div id="main-tabs" class="interactive-overlay">
                <button class="tab-btn active" id="btn-tab-lv2">LV.2 三維體積</button>
                <button class="tab-btn" id="btn-tab-lv4">LV.4 微觀尺度</button>
                <button class="tab-btn" id="btn-tab-lv5">LV.5 複合單位</button>
            </div>

            <!-- 頂部標題大標 -->
            <div id="status-header" class="interactive-overlay">
                LV.2 三維體積：「百萬大分裂」引導式探索
            </div>

            <!-- LV.5 專屬子題切換鈕 -->
            <div id="lv5-sub-selector" class="interactive-overlay">
                <button class="sub-tab-btn active" id="btn-sub-density">密度：g/cm³ → kg/m³</button>
                <button class="sub-tab-btn" id="btn-sub-speed">速度：km/hr → m/s</button>
            </div>

            <!-- 動態算式字卡 -->
            <div id="math-display-card" class="interactive-overlay">
                <div class="card-title" id="math-card-title">第一步：大方塊拆成 1000 份</div>
                <div class="formula-text" id="math-formula">
                    <!-- 動態由 JS 渲染 -->
                </div>
            </div>

            <div id="control-panel-bottom" class="interactive-overlay">
                <button class="step-btn" id="btn-prev" disabled>◀ 上一步</button>
                
                <div class="step-indicator-container">
                    <div class="step-dots-row" id="step-dots-container">
                        <!-- 動態生成步驟圓點 -->
                    </div>
                    <div id="txt-animation-phase" style="color: #3182CE; font-size: 16px; font-weight: bold; margin-top: 4px;">
                        步驟 1 / 6：正在將 1 m³ 切割為中型方塊
                    </div>
                </div>

                <button class="step-btn" id="btn-next">下一步 ▶</button>
            </div>
        </div>
    </div>

    <!-- 螢幕方向引導器 -->
    <div id="orientation-blocker">
        <div class="phone-icon-wrapper">
            <div class="phone-icon"></div>
        </div>
        <h2>請旋轉您的螢幕</h2>
        <p>本挑戰僅支援【橫螢幕】操作，請開啟手機自動旋轉功能並橫放以獲得最佳遊戲體驗。</p>
    </div>

    <script>
        const BASE_WIDTH = 1280;
        const BASE_HEIGHT = 720;
        
        const viewport = document.getElementById('app-viewport');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        let currentScale = 1;

        // 全域當前狀態機
        let activeMainTab = 'LV2'; // 'LV2', 'LV4', 'LV5'
        let activeLv5Sub = 'density'; // 'density' 或 'speed'
        
        let currentStepIndex = 0; 
        let currentProgress = 0;   // 緩動插值後的平滑進度 (0 ~ 100)
        const confettiList = [];
        let hasConfettiTriggered = false;

        // LV.5 速度題視差背景滾動 X 軸偏移
        let speedBgCloudX = 0;
        let speedBgMountainX = 0;
        let speedBgTreeX = 0;

        // 離散步驟目標錨定點定義 (每個關卡皆有不同的引導步數)
        const STEP_CONFIGS = {
            'LV2': {
                targets: [0, 25, 45, 65, 80, 100],
                count: 6
            },
            'LV4': {
                targets: [0, 45, 100],
                count: 3
            },
            'LV5_density': {
                targets: [0, 50, 100],
                count: 3
            },
            'LV5_speed': {
                targets: [0, 50, 100],
                count: 3
            }
        };

        function getStepConfig() {
            if (activeMainTab === 'LV2') return STEP_CONFIGS['LV2'];
            if (activeMainTab === 'LV4') return STEP_CONFIGS['LV4'];
            return STEP_CONFIGS[`LV5_${activeLv5Sub}`];
        }

        function updateLayout() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            const scaleX = windowWidth / BASE_WIDTH;
            const scaleY = windowHeight / BASE_HEIGHT;
            currentScale = Math.min(scaleX, scaleY);

            viewport.style.transform = `translate(-50%, -50%) scale(${currentScale})`;

            const blocker = document.getElementById('orientation-blocker');
            if (windowHeight > windowWidth) {
                blocker.style.display = 'flex';
            } else {
                blocker.style.display = 'none';
            }
        }

        class ConfettiParticle {
            constructor(startX, startY) {
                this.x = startX;
                this.y = startY;
                const angle = Math.random() * Math.PI * 2;
                const speed = 7 + Math.random() * 15;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 8;
                this.width = 12 + Math.random() * 10;
                this.height = 6 + Math.random() * 6;
                this.rotation = Math.random() * Math.PI;
                this.rotationSpeed = -0.12 + Math.random() * 0.24;
                this.gravity = 0.35;
                this.resistance = 0.96;
                const colors = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#BDB2FF', '#FFC6FF'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 1;
                this.decay = 0.008 + Math.random() * 0.012;
            }

            update() {
                this.vx *= this.resistance;
                this.vy *= this.resistance;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                this.alpha -= this.decay;
            }

            draw(context) {
                if (this.alpha <= 0) return;
                context.save();
                context.translate(this.x, this.y);
                context.rotate(this.rotation);
                context.globalAlpha = this.alpha;
                context.fillStyle = this.color;
                context.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                context.restore();
            }
        }

        function triggerConfetti(x, y) {
            for (let i = 0; i < 120; i++) {
                confettiList.push(new ConfettiParticle(x, y));
            }
            const card = document.getElementById('math-display-card');
            card.classList.add('success-pulse');
            setTimeout(() => card.classList.remove('success-pulse'), 600);
        }

        const radLeft = 22 * Math.PI / 180;
        const radRight = 38 * Math.PI / 180;

        function getIsoPoint(x, y, z, originX, originY) {
            return {
                x: originX + x * Math.cos(radRight) - y * Math.cos(radLeft),
                y: originY + x * Math.sin(radRight) + y * Math.sin(radLeft) - z
            };
        }

        function drawCube(context, x, y, z, size, originX, originY, baseAlpha, isTarget = false) {
            const pts = {
                B: getIsoPoint(x + size, y, z, originX, originY),
                C: getIsoPoint(x + size, y + size, z, originX, originY),
                D: getIsoPoint(x, y + size, z, originX, originY),
                E: getIsoPoint(x, y, z + size, originX, originY),
                F: getIsoPoint(x + size, y, z + size, originX, originY),
                G: getIsoPoint(x + size, y + size, z + size, originX, originY),
                H: getIsoPoint(x, y + size, z + size, originX, originY)
            };

            let colorTop, colorLeft, colorRight, strokeStyle;
            if (isTarget) {
                colorTop = `rgba(252, 234, 222, ${baseAlpha})`;    
                colorLeft = `rgba(255, 173, 173, ${baseAlpha})`;   
                colorRight = `rgba(255, 198, 255, ${baseAlpha})`;  
                strokeStyle = `rgba(229, 62, 62, ${baseAlpha * 0.85})`; 
            } else {
                colorTop = `rgba(232, 240, 248, ${baseAlpha})`;    
                colorLeft = `rgba(144, 205, 244, ${baseAlpha})`;   
                colorRight = `rgba(66, 153, 225, ${baseAlpha})`;   
                strokeStyle = `rgba(43, 108, 176, ${baseAlpha * 0.55})`; 
            }

            context.lineWidth = isTarget ? 3.0 : 1.0;
            context.lineCap = 'round';
            context.lineJoin = 'round';

            // 1. 左前側面：D -> C -> G -> H
            context.fillStyle = colorLeft;
            context.beginPath();
            context.moveTo(pts.D.x, pts.D.y);
            context.lineTo(pts.C.x, pts.C.y);
            context.lineTo(pts.G.x, pts.G.y);
            context.lineTo(pts.H.x, pts.H.y);
            context.closePath();
            context.fill();
            context.strokeStyle = strokeStyle;
            context.stroke();

            // 2. 右前側面：B -> C -> G -> F
            context.fillStyle = colorRight;
            context.beginPath();
            context.moveTo(pts.B.x, pts.B.y);
            context.lineTo(pts.C.x, pts.C.y);
            context.lineTo(pts.G.x, pts.G.y);
            context.lineTo(pts.F.x, pts.F.y);
            context.closePath();
            context.fill();
            context.stroke();

            // 3. 頂部面：E -> F -> G -> H
            context.fillStyle = colorTop;
            context.beginPath();
            context.moveTo(pts.E.x, pts.E.y);
            context.lineTo(pts.F.x, pts.F.y);
            context.lineTo(pts.G.x, pts.G.y);
            context.lineTo(pts.H.x, pts.H.y);
            context.closePath();
            context.fill();
            context.stroke();
        }

        function drawFaceGrid(context, p1, p2, p3, p4, linesCount, alpha) {
            context.strokeStyle = `rgba(229, 62, 62, ${alpha * 0.45})`; 
            context.lineWidth = 1.5;
            for (let i = 1; i < linesCount; i++) {
                const ratio = i / linesCount;
                const start1 = {
                    x: p1.x + (p2.x - p1.x) * ratio,
                    y: p1.y + (p2.y - p1.y) * ratio
                };
                const end1 = {
                    x: p4.x + (p3.x - p4.x) * ratio,
                    y: p4.y + (p3.y - p4.y) * ratio
                };
                context.beginPath();
                context.moveTo(start1.x, start1.y);
                context.lineTo(end1.x, end1.y);
                context.stroke();

                const start2 = {
                    x: p1.x + (p4.x - p1.x) * ratio,
                    y: p1.y + (p4.y - p1.y) * ratio
                };
                const end2 = {
                    x: p2.x + (p3.x - p2.x) * ratio,
                    y: p2.y + (p3.y - p2.y) * ratio
                };
                context.beginPath();
                context.moveTo(start2.x, start2.y);
                context.lineTo(end2.x, end2.y);
                context.stroke();
            }
        }

        function drawCallout(context, tx, ty, alpha) {
            context.save();
            context.globalAlpha = alpha;

            const startX = tx + 30;
            const startY = ty - 10;
            const midX = startX + 50;
            const midY = startY - 60; // 朝右上方折，完全避免邊界遮擋
            const endX = midX + 60;

            context.strokeStyle = '#E53E3E';
            context.lineWidth = 3;
            context.beginPath();
            context.moveTo(startX, startY);
            context.lineTo(midX, midY);
            context.lineTo(endX, midY);
            context.stroke();

            context.fillStyle = '#E53E3E';
            context.beginPath();
            context.arc(startX, startY, 5, 0, Math.PI * 2);
            context.fill();

            const bubbleW = 380;
            const bubbleH = 80;
            const bx = endX;
            const by = midY - bubbleH / 2;

            context.fillStyle = '#FFF5F5';
            context.strokeStyle = '#FEB2B2';
            context.lineWidth = 3;
            
            context.beginPath();
            context.roundRect(bx, by, bubbleW, bubbleH, 12);
            context.fill();
            context.stroke();

            context.fillStyle = '#C53030';
            context.font = 'bold 18px "Noto Sans TC", sans-serif';
            context.textAlign = 'left';
            
            context.fillText('這顆切滿 1000 個小格子的中方塊，', bx + 15, by + 32);
            context.fillText(`只是這 1000 個中方塊裡的 1 個！`, bx + 15, by + 58);

            context.restore();
        }

        function renderScene() {
            if (activeMainTab === 'LV2') {
                renderLV2();
            } else if (activeMainTab === 'LV4') {
                renderLV4();
            } else if (activeMainTab === 'LV5') {
                if (activeLv5Sub === 'density') {
                    renderLV5Density();
                } else {
                    renderLV5Speed();
                }
            }
        }

        function renderLV2() {
            const gridOriginX = 420;
            const gridOriginY = 480;
            const cubeSize = 20;
            const maxGap = 7.5;

            const finalSlideFactor = 140;
            const px_end = 9 * (cubeSize + maxGap) + finalSlideFactor;
            const py_end = px_end;
            const pz_end = px_end;
            const targetScreenPos = getIsoPoint(px_end, py_end, pz_end, gridOriginX, gridOriginY);

            if (currentProgress <= 25) {
                const t = currentProgress / 25;
                const gap = t * maxGap; 

                for (let z = 0; z < 10; z++) {
                    for (let y = 0; y < 10; y++) {
                        for (let x = 0; x < 10; x++) {
                            const px = x * (cubeSize + gap);
                            const py = y * (cubeSize + gap);
                            const pz = z * (cubeSize + gap);
                            const isTarget = (x === 9 && y === 9 && z === 9);
                            drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, 1.0, isTarget);
                        }
                    }
                }
            }
            else if (currentProgress > 25 && currentProgress <= 45) {
                const t = (currentProgress - 25) / 20; 
                const fadeAlpha = 1 - t; 
                const slideFactor = t * finalSlideFactor; 

                for (let z = 0; z < 10; z++) {
                    for (let y = 0; y < 10; y++) {
                        for (let x = 0; x < 10; x++) {
                            const isTarget = (x === 9 && y === 9 && z === 9);
                            let px = x * (cubeSize + maxGap);
                            let py = y * (cubeSize + maxGap);
                            let pz = z * (cubeSize + maxGap);

                            if (isTarget) {
                                px += slideFactor;
                                py += slideFactor;
                                pz += slideFactor;
                                drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, 1.0, true);
                            } else {
                                if (fadeAlpha > 0.02) {
                                    drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, fadeAlpha, false);
                                }
                            }
                        }
                    }
                }
            }
            else if (currentProgress > 45 && currentProgress <= 65) {
                const t = (currentProgress - 45) / 20; 
                const currentSize = cubeSize + (240 - cubeSize) * t;
                const currentOriginX = targetScreenPos.x;
                const currentOriginY = targetScreenPos.y;

                drawCube(ctx, 0, 0, 0, currentSize, currentOriginX, currentOriginY, 1.0, true);
            }
            else if (currentProgress > 65 && currentProgress <= 80) {
                const t = (currentProgress - 65) / 15; 
                const size = 240;
                const currentOriginX = targetScreenPos.x;
                const currentOriginY = targetScreenPos.y;

        let amoebaWaveAngle = 0; 
        function renderLV4() {
            const centerX = 380;

            let scale3 = 1.0, alpha3 = 0.0;

            if (currentProgress <= 45) {
                const t = currentProgress / 45;
                scale1 = 1.0 + t * 4.0; 
                alpha1 = 1.0 - t;      
                scale2 = 0.15 + t * 0.85; 
                alpha2 = t;             
            } else {
                const t = (currentProgress - 45) / 55;

                scale2 = 1.0 + t * 5.0;

                scale3 = 0.15 + t * 0.85;

            ctx.save();

            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            ctx.strokeStyle = '#BEE3F8';
            ctx.lineWidth = 10;
            ctx.stroke();
            ctx.clip(); 

            if (alpha1 > 0.01) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.scale(scale1, scale1);
                ctx.globalAlpha = alpha1;

                amoebaWaveAngle += 0.015;
                ctx.fillStyle = 'rgba(168, 218, 220, 0.4)';
                ctx.strokeStyle = '#457B9D';
                ctx.lineWidth = 3;
                
                ctx.beginPath();
                const pointsCount = 12;
                const rBase = 120;
                for (let i = 0; i <= pointsCount; i++) {
                    const angle = (i / pointsCount) * Math.PI * 2;
                    const wave = Math.sin(amoebaWaveAngle + i * 1.5) * 12;
                    const r = rBase + wave;
                    const px = Math.cos(angle) * r;
                    const py = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = 'rgba(69, 123, 157, 0.3)';
                for (let i = 0; i < 6; i++) {
                    ctx.beginPath();

                    ctx.arc(Math.cos(dotAngle) * 50, Math.sin(dotAngle) * 50, 8, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.fillStyle = 'rgba(230, 57, 70, 0.5)';
                ctx.beginPath();
                ctx.arc(0, 0, 20, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            if (alpha2 > 0.01) {
                ctx.save();
                ctx.translate(centerX, centerY);

                ctx.fillStyle = 'rgba(255, 173, 173, 0.35)';

                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(0, 0, 130, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 6;
                for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
                    ctx.beginPath();
                    ctx.arc(130 * Math.cos(a), 130 * Math.sin(a), 8, 0, Math.PI * 2);
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fill();
                }

                ctx.strokeStyle = 'rgba(229, 62, 62, 0.45)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(-70, -30);
                ctx.bezierCurveTo(-30, -80, 30, -50, 40, -10);
                ctx.bezierCurveTo(50, 40, -20, 60, -60, 20);
                ctx.bezierCurveTo(-100, -20, -50, -40, 0, -20);
                ctx.stroke();

                ctx.fillStyle = '#C53030';
                ctx.beginPath();
                ctx.arc(15, -15, 30, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            if (alpha3 > 0.01) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.scale(scale3, scale3);
                ctx.globalAlpha = alpha3;

                const dnaTime = Date.now() * 0.0025;
                const helixW = 280;
                const helixPoints = 18;
                const waveAmp = 55; 

                for (let i = 0; i < helixPoints; i++) {
                    const ratio = i / (helixPoints - 1);
                    const lx = -helixW / 2 + ratio * helixW;
                    const phase1 = lx * 0.025 + dnaTime;
                    const phase2 = phase1 + Math.PI; 
                    const ly1 = Math.sin(phase1) * waveAmp;
                    const ly2 = Math.sin(phase2) * waveAmp;

                    const colors = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#BDB2FF'];
                    ctx.strokeStyle = colors[i % colors.length];
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(lx, ly1);
                    ctx.lineTo(lx, ly2);
                    ctx.stroke();

                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(lx, (ly1 + ly2)/2, 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.strokeStyle = '#4299E1';
                ctx.lineWidth = 7;
                ctx.beginPath();
                for (let i = 0; i < helixPoints; i++) {
                    const ratio = i / (helixPoints - 1);
                    const lx = -helixW / 2 + ratio * helixW;
                    const ly = Math.sin(lx * 0.025 + dnaTime) * waveAmp;
                    if (i === 0) ctx.moveTo(lx, ly);
                    else ctx.lineTo(lx, ly);
                }
                ctx.stroke();

                ctx.strokeStyle = '#ED64A6';
                ctx.lineWidth = 7;
                ctx.beginPath();
                for (let i = 0; i < helixPoints; i++) {
                    const ratio = i / (helixPoints - 1);
                    const lx = -helixW / 2 + ratio * helixW;
                    const ly = Math.sin(lx * 0.025 + dnaTime + Math.PI) * waveAmp;
                    if (i === 0) ctx.moveTo(lx, ly);
                    else ctx.lineTo(lx, ly);
                }
                ctx.stroke();

                ctx.fillStyle = '#4A5568';
                ctx.font = 'bold 20px "Noto Sans TC", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('1 奈米 (nm) 分子結構', 0, 160);
                ctx.restore();

                if (currentProgress >= 99 && !hasConfettiTriggered) {
                    triggerConfetti(centerX, centerY - 80);
                    hasConfettiTriggered = true;
                }
            }
            ctx.restore(); 

            ctx.fillStyle = '#1D3557';
            ctx.font = 'bold 28px "Kosugi Maru", sans-serif';
            ctx.textAlign = 'center';
            
            let magStr = '10倍 實體鏡';
            if (currentProgress <= 45) {
                const t = currentProgress / 45;
                magStr = `放大：${Math.round(1 + t * 999)} 倍`;
            } else {
                const t = (currentProgress - 45) / 55;
                magStr = `放大：${(Math.round(1000 + t * 999000)).toLocaleString()} 倍`;
            }
            ctx.fillText(magStr, centerX, centerY + 280);
        }

                        break;
                    case 3:
                        labelPhase.textContent = '步驟 4 / 6：切開了！這 1 個中方塊內含 1000 個小立方公分';
                        labelPhase.style.color = '#E53E3E';
                        cardTitle.textContent = '第三步：1 個中方塊包含 1000 格！';
                        formulaContainer.innerHTML = `
                            <span>1 個中方塊</span>
                            <span>=</span>
                            <span>10 cm × 10 cm × 10 cm</span>
                            <span>=</span>
                            <span style="color: #E53E3E;">1000 個 1 cm<sup>3</sup> 小格子</span>
                        `;
                        hasConfettiTriggered = false;
                        break;
                    case 4:
                        labelPhase.textContent = '步驟 5 / 6：原位縮小對照，這疊原本一共有 1000 個！';
                        labelPhase.style.color = '#D69E2E';
                        cardTitle.textContent = '第四步：放回群體，驚人對比！';
                        formulaContainer.innerHTML = `
                            <span>1 個中方塊 = 1000 個小格子</span>
                            <br>
                            <span style="font-size: 22px; color: #2B6CB0;">而這整疊大方塊有 1000 個中方塊！</span>
                        `;
                        hasConfettiTriggered = false;
                        break;
                    case 5:
                        labelPhase.textContent = '步驟 6 / 6：百萬倍二階段分裂圓滿成功！';
                        labelPhase.style.color = '#38A169';
                        cardTitle.textContent = '第五步：終極百萬倍率換算公式';
                        formulaContainer.innerHTML = `
                            <span style="font-size: 24px; color: #4A5568;">1000 × 1000 (每個切1000格) =</span>
                            <br>
                            <span style="color: #48BB78; font-size: 42px; font-weight: 900;">1,000,000 cm<sup>3</sup></span>
                        `;
                        break;
                }
            } 
            else if (activeMainTab === 'LV4') {
                switch(currentStepIndex) {
                    case 0:
                        labelPhase.textContent = '步驟 1 / 3：變形蟲本體 (大小約為 1 毫米 mm)';
                        labelPhase.style.color = '#3182CE';
                        cardTitle.textContent = '初探微觀世界（毫米級）';
                        formulaContainer.innerHTML = `
                            <span>肉眼極限：變形蟲</span>
                            <br>
                            <span style="font-size: 24px; color: #3182CE;">大小 ≈ 1 mm (公厘)</span>
                        `;
                        hasConfettiTriggered = false;
                        break;
                    case 1:
                        labelPhase.textContent = '步驟 2 / 3：放大 1000 倍，聚焦細胞核 (微米 μm)';
                        labelPhase.style.color = '#ED64A6';
                        cardTitle.textContent = '進入細胞內部（微米級）';
                        formulaContainer.innerHTML = `
                            <span>1 毫米 (mm) 切割為 1000 份：</span>
                            <br>
                            <span style="color: #ED64A6; font-size: 32px;">1 mm = 1000 μm (微米)</span>
                        `;
                        hasConfettiTriggered = false;
                        break;
                    case 2:
                        labelPhase.textContent = '步驟 3 / 3：再放大 1000 倍，看見分子 DNA (奈米 nm)';
                        labelPhase.style.color = '#38A169';
                        cardTitle.textContent = '極限分子尺度（奈米級）';
                        formulaContainer.innerHTML = `
                            <span>1 微米 (μm) 切割為 1000 份：</span>
                            <br>
                            <span style="color: #38A169; font-size: 32px;">1 μm = 1000 nm (奈米)</span>
                            <br>
                            <span style="font-size: 20px; color: #4A5568;">總計放大 1,000,000 倍！</span>
                        `;
                        break;
                }
            } 
            else if (activeMainTab === 'LV5') {
                if (activeLv5Sub === 'density') {
                    switch(currentStepIndex) {
                        case 0:
                            labelPhase.textContent = '步驟 1 / 3：水的基礎密度為 1 g/cm³';
                            labelPhase.style.color = '#3182CE';
                            cardTitle.textContent = '微觀密度概念';
                            formulaContainer.innerHTML = `
                                <span>1 cm<sup>3</sup> 的 water 重 1 公克</span>
                                <br>
                                <span style="font-size: 24px; color: #3182CE;">水的密度 = 1 g/cm<sup>3</sup></span>
                            `;
                            hasConfettiTriggered = false;
                            break;
                        case 1:
                            labelPhase.textContent = '步驟 2 / 3：想像 1 立方公尺 (1 m³) 的大水箱';
                            labelPhase.style.color = '#ED64A6';
                            cardTitle.textContent = '宏觀體積大變身';
                            formulaContainer.innerHTML = `
                                <span>1 m<sup>3</sup> 包含 1,000,000 cm<sup>3</sup></span>
                                <br>
                                <span style="font-size: 24px; color: #ED64A6;">這代表水箱裡裝滿 100 萬滴水！</span>
                            `;
                            hasConfettiTriggered = false;
                            break;
                        case 2:
                            labelPhase.textContent = '步驟 3 / 3：計算總重量：水的複合單位換算成功！';
                            labelPhase.style.color = '#38A169';
                            cardTitle.textContent = '複合密度終極換算';
                            formulaContainer.innerHTML = `
                                <span>1,000,000 公克 (g)</span>
                                <span>=</span>
                                <span style="color: #38A169; font-size: 36px;">1000 公斤 (kg)</span>
                                <br>
                                <span style="font-size: 22px; color: #2D3748;">1 g/cm<sup>3</sup> = 1000 kg/m<sup>3</sup> (1公噸)</span>
                            `;
                            break;
                    }
                } else {
                    switch(currentStepIndex) {
                        case 0:
                            labelPhase.textContent = '步驟 1 / 3：高鐵時速 90 公里 (km/hr)';
                            labelPhase.style.color = '#3182CE';
                            cardTitle.textContent = '時速概念拆解';
                            formulaContainer.innerHTML = `
                                <span>列車每小時前進 90 公里</span>
                                <br>
                                <span style="font-size: 24px; color: #3182CE;">距離 = 90,000 公尺 (m)</span>
                            `;
                            hasConfettiTriggered = false;
                            break;
                        case 1:
                            labelPhase.textContent = '步驟 2 / 3：一小時包含 3600 秒 (s)';
                            labelPhase.style.color = '#ED64A6';
                            cardTitle.textContent = '時間基準轉換';
                            formulaContainer.innerHTML = `
                                <span>1 小時 = 60 分 × 60 秒</span>
                                <br>
                                <span style="font-size: 24px; color: #ED64A6;">總時間 = 3600 秒 (s)</span>
                            `;
                            hasConfettiTriggered = false;
                            break;
                        case 2:
                            labelPhase.textContent = '步驟 3 / 3：計算每秒鐘飛奔的距離（秒速）';
                            labelPhase.style.color = '#38A169';
                            cardTitle.textContent = '複合速度終極換算';
                            formulaContainer.innerHTML = `
                                <span>90,000 m ÷ 3600 s =</span>
                                <br>
                                <span style="color: #38A169; font-size: 38px;">25 m/s (秒速)</span>
                                <br>
                                <span style="font-size: 18px; color: #4A5568;">時速 90 公里，相當於每秒飛奔五間教室！</span>
                            `;
                            break;
                    }
                }
            }

            document.getElementById('btn-prev').disabled = (currentStepIndex === 0);
            document.getElementById('btn-next').textContent = (currentStepIndex === config.count - 1) ? '挑戰完成 🎉' : '下一步 ▶';
        }

        function mainLoop() {
            ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

            ctx.strokeStyle = 'rgba(190, 227, 248, 0.35)';
            ctx.lineWidth = 2;
            for (let i = 0; i < BASE_WIDTH; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, BASE_HEIGHT); ctx.stroke();
            }
            for (let j = 0; j < BASE_HEIGHT; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(BASE_WIDTH, j); ctx.stroke();
            }

            const config = getStepConfig();
            const targetProgress = config.targets[currentStepIndex];
            const diff = targetProgress - currentProgress;
            
            // 降低至 0.035 實現慢動作優雅移動
            if (Math.abs(diff) > 0.05) {
                currentProgress += diff * 0.035; 
            } else {
                currentProgress = targetProgress;
            }

            renderScene();

            for (let i = confettiList.length - 1; i >= 0; i--) {
                const particle = confettiList[i];
                particle.update();
                particle.draw(ctx);
                if (particle.alpha <= 0) {
                    confettiList.splice(i, 1);
                }
            }

            requestAnimationFrame(mainLoop);
        }

        const prevBtn = document.getElementById('btn-prev');
        const nextBtn = document.getElementById('btn-next');

        const goNext = (e) => {
            e.preventDefault();
            const config = getStepConfig();
            if (currentStepIndex < config.count - 1) {
                currentStepIndex++;
                updateDOMUIByStep();
            } else {
                triggerConfetti(640, 240);
            }
        };

        const goPrev = (e) => {
            e.preventDefault();
            if (currentStepIndex > 0) {
                currentStepIndex--;
                updateDOMUIByStep();
            }
        };

        nextBtn.addEventListener('touchstart', goNext);
        nextBtn.addEventListener('click', goNext);
        prevBtn.addEventListener('touchstart', goPrev);
        prevBtn.addEventListener('click', goPrev);

        function selectMainTab(tab) {
            activeMainTab = tab;
            currentStepIndex = 0;
            currentProgress = 0;
            confettiList.length = 0;
            hasConfettiTriggered = false;

            document.getElementById('btn-tab-lv2').className = `tab-btn ${tab === 'LV2' ? 'active' : ''}`;
            document.getElementById('btn-tab-lv4').className = `tab-btn ${tab === 'LV4' ? 'active' : ''}`;
            document.getElementById('btn-tab-lv5').className = `tab-btn ${tab === 'LV5' ? 'active' : ''}`;

            const lv5SubSelector = document.getElementById('lv5-sub-selector');
            if (tab === 'LV5') {
                lv5SubSelector.style.display = 'flex';
                document.getElementById('status-header').textContent = 'LV.5 終極複合單位：跨界科學換算';
            } else {
                lv5SubSelector.style.display = 'none';
                if (tab === 'LV2') {
                    document.getElementById('status-header').textContent = 'LV.2 三維體積：「百萬大分裂」引導式探索';
                } else {
                    document.getElementById('status-header').textContent = 'LV.4 微觀尺度：從毫米到奈米的極限放大';
                }
            }

            updateDOMUIByStep();
        }

        document.getElementById('btn-tab-lv2').addEventListener('click', () => selectMainTab('LV2'));
        document.getElementById('btn-tab-lv4').addEventListener('click', () => selectMainTab('LV4'));
        document.getElementById('btn-tab-lv5').addEventListener('click', () => selectMainTab('LV5'));

        function selectLv5Sub(sub) {
            activeLv5Sub = sub;
            currentStepIndex = 0;
            currentProgress = 0;
            confettiList.length = 0;
            hasConfettiTriggered = false;

            document.getElementById('btn-sub-density').className = `sub-tab-btn ${sub === 'density' ? 'active' : ''}`;
            document.getElementById('btn-sub-speed').className = `sub-tab-btn ${sub === 'speed' ? 'active' : ''}`;

            updateDOMUIByStep();
        }

        document.getElementById('btn-sub-density').addEventListener('click', () => selectLv5Sub('density'));
        document.getElementById('btn-sub-speed').addEventListener('click', () => selectLv5Sub('speed'));

        window.addEventListener('resize', updateLayout);
        window.addEventListener('orientationchange', () => {
            setTimeout(updateLayout, 200);
        });

        canvas.width = BASE_WIDTH;
        canvas.height = BASE_HEIGHT;
        updateLayout();
        selectMainTab('LV2'); 
        mainLoop();

    </script>
</body>
</html>
