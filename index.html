<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>空間維度與單位變形蟲 - 步驟三</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark-plate: #1e272e; 
            --bg-game: #f5f6fa;       
            --macaron-pink: #ffb8b8;  
            --macaron-blue: #81ecec;  
            --macaron-yellow: #ffeaa7;
            --macaron-green: #55efc4; 
            --text-main: #2d3436;     
            --text-muted: #4a5568;    
            --panel-white: #ffffff;   
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 關鍵修正：行動端解鎖按鈕與畫布的觸控權限，消除 tap delay */
        button, .macaron-btn, .sandbox-btn, canvas {
            user-select: auto !important;
            -webkit-user-select: auto !important;
            touch-action: manipulation !important;
            cursor: pointer;
        }

        body, html {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-dark-plate);
            font-family: 'Kosugi Maru', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
        }

        /* 16:9 核心畫布 */
        #game-viewport {
            position: absolute;
            width: 1280px;
            height: 720px;
            background-color: var(--bg-game);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            transform-origin: center center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            transition: opacity 0.2s ease;
        }

        /* 遊戲主視區 */
        #main-game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 35px;
            height: 100%;
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px dashed #dcdde1;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 {
            color: var(--text-main);
            font-size: 34px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .level-badge {
            background-color: var(--macaron-pink);
            color: white;
            padding: 6px 16px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
        }

        /* 雙欄對比版面配置 */
        .split-container {
            flex: 1;
            display: flex;
            gap: 30px;
            height: calc(100% - 110px); /* 扣除 header 高度 */
        }

        .split-panel {
            flex: 1;
            background-color: var(--panel-white);
            border-radius: 28px;
            padding: 25px;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .panel-top-info {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .panel-title {
            font-size: 26px;
            color: var(--text-main);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 雙畫布渲染容器 */
        .canvas-container {
            width: 100%;
            flex: 1;
            margin: 15px 0;
            background-color: #fafbfc;
            border-radius: 18px;
            border: 3px dashed #e2e8f0;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            border-radius: 15px;
            background-color: #ffffff;
        }

        .panel-desc {
            font-size: 19px;
            color: var(--text-muted);
            line-height: 1.5;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 馬卡龍控制按鈕 */
        .macaron-btn {
            width: 80%;
            padding: 14px 25px;
            font-size: 20px;
            font-family: 'Kosugi Maru', sans-serif;
            font-weight: bold;
            color: var(--text-main);
            background-color: var(--macaron-blue);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #00ced1;
            transition: all 0.05s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .macaron-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #00ced1;
        }

        /* ----------------------------------
           抽屜式測試沙盒面板 (絕對定位，解決擠壓問題)
        ------------------------------------- */
        #sandbox-panel {
            position: absolute;
            right: 0;
            top: 0;
            width: 380px;
            height: 100%;
            background-color: rgba(45, 52, 54, 0.98);
            border-left: 6px solid var(--macaron-blue);
            display: flex;
            flex-direction: column;
            padding: 25px;
            color: #f5f6fa;
            z-index: 1000;
            transform: translateX(100%); /* 預設完全收合在螢幕右側外 */
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
        }

        #sandbox-panel.open {
            transform: translateX(0); /* 展開狀態 */
        }

        /* 抽屜切換按鈕 */
        #sandbox-toggle-btn {
            position: absolute;
            left: -140px;
            top: 25px;
            background-color: #2d3436;
            color: var(--macaron-blue);
            border: 2px solid var(--macaron-blue);
            border-right: none;
            border-radius: 12px 0 0 12px;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: -4px 4px 10px rgba(0,0,0,0.2);
            z-index: 1001;
            display: none; /* 由 JS 依開發階段控制顯示 */
            align-items: center;
            gap: 6px;
        }

        #sandbox-toggle-btn:hover {
            color: #ffffff;
            background-color: #4a5568;
        }

        .sandbox-title {
            font-size: 22px;
            color: var(--macaron-blue);
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #4a5568;
            padding-bottom: 10px;
        }

        .sandbox-section-title {
            font-size: 15px;
            color: var(--macaron-yellow);
            margin: 15px 0 8px 0;
            font-weight: bold;
        }

        .sandbox-btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .sandbox-btn {
            padding: 8px;
            font-size: 13px;
            font-family: inherit;
            background-color: #4a5568;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.1s;
        }

        .sandbox-btn:hover {
            background-color: #576574;
        }

        .sandbox-btn.accent {
            background-color: var(--macaron-pink);
            color: var(--text-main);
        }

        #sandbox-logger {
            flex: 1;
            background-color: #1e272e;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #4a5568;
            line-height: 1.4;
        }

        .log-entry {
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px dashed #34495e;
            word-break: break-all;
        }

        .log-time {
            color: #95a5a6;
        }

        .log-dir-in {
            color: var(--macaron-blue);
        }

        .log-dir-out {
            color: var(--macaron-green);
        }

        /* 直螢幕強制攔截層 */
        #orientation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background-color: var(--macaron-yellow);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 40px;
        }

        .phone-icon-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 35px;
        }

        .phone-icon {
            font-size: 100px;
            display: inline-block;
            animation: rotatePhone 2.5s infinite ease-in-out;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            35% { transform: rotate(-90deg); }
            70% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 核心遊戲 16:9 Viewport (1280x720) -->
        <div id="game-viewport">
            
            <!-- 遊戲主畫面 -->
            <div id="main-game-area">
                <header>
                    <h1>空間維度與單位變形蟲 <span class="level-badge" id="current-level-display">LV.1 面積網格</span></h1>
                    <div style="font-size: 24px; color: var(--text-main); font-weight: bold;">分數：<span id="score-display">000</span></div>
                </header>

                <div class="split-container">
                    <!-- 左欄：原始圖型 Canvas -->
                    <div class="split-panel" style="border-top: 8px solid var(--macaron-pink);">
                        <div class="panel-top-info">
                            <div class="panel-title" id="left-panel-title">📐 原始二維空間</div>
                        </div>
                        
                        <div class="canvas-container">
                            <canvas id="left-canvas" width="480" height="300"></canvas>
                        </div>

                        <div class="panel-desc" id="left-panel-desc">
                            <!-- 由 JS 動態注入帶有 sup 的標準數學文字 -->
                        </div>
                        <button class="macaron-btn" id="action-btn-left">⚙️ 重繪左畫布</button>
                    </div>

                    <!-- 右欄：切分提示 Canvas -->
                    <div class="split-panel" style="border-top: 8px solid var(--macaron-blue);">
                        <div class="panel-top-info">
                            <div class="panel-title" id="right-panel-title">💡 概念切分提示</div>
                        </div>
                        
                        <div class="canvas-container">
                            <canvas id="right-canvas" width="480" height="300"></canvas>
                        </div>

                        <div class="panel-desc" id="right-panel-desc">
                            <!-- 由 JS 動態注入帶有 sup 的標準數學文字 -->
                        </div>
                        <button class="macaron-btn" id="action-btn-right" style="background-color: var(--macaron-pink); box-shadow: 0 6px 0 #e84118; color: white;">🔍 開啟切分網格</button>
                    </div>
                </div>
            </div>

            <!-- 抽屜式控制台：預設收合在右側 -->
            <div id="sandbox-panel">
                <button id="sandbox-toggle-btn" onclick="GameModule.toggleSandbox()">🛠️ 測試控制台</button>
                <div class="sandbox-title">🛠️ 虛擬沙盒控制台</div>
                
                <div class="sandbox-section-title">切換至指定關卡佈局</div>
                <div class="sandbox-btn-grid">
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(1)">LV.1 二維網格</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(2)">LV.2 3D體積</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(3)">LV.3 容體轉換</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(4)">LV.4 微觀尺度</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(5)">LV.5 分數拆解</button>
                </div>

                <div class="sandbox-section-title">排版引擎極限測試</div>
                <div class="sandbox-btn-grid" style="grid-template-columns: 1fr;">
                    <button class="sandbox-btn accent" onclick="GameModule.testMathTypography()">繪製複雜數學公式測試</button>
                </div>

                <div class="sandbox-section-title" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>通訊日誌</span>
                    <span style="font-size:11px; color:#95a5a6; cursor:pointer;" onclick="GameModule.clearLogs()">清除</span>
                </div>
                <div id="sandbox-logger"></div>
            </div>

        </div>
    </div>

    <!-- 直螢幕強制攔截層 -->
    <div id="orientation-overlay">
        <div class="phone-icon-wrapper">
            <span class="phone-icon">📱</span>
        </div>
        <div style="font-size: 32px; color: var(--text-main); font-weight: bold; margin-bottom: 20px;">請旋轉您的行動裝置</div>
        <div style="font-size: 22px; color: #636e72; line-height: 1.8;">本數理挑戰專為【橫螢幕 16:9】設計，<br>請開啟螢幕自動旋轉，並將手機橫放以獲得最佳體驗！</div>
    </div>

    <script>
        /**
         * 遊戲與渲染主模組
         */
        const GameModule = {
            config: {
                baseWidth: 1280,
                baseHeight: 720,
                challengeId: 1
            },
            
            state: {
                currentLevel: 1,
                score: 0,
                sandboxOpen: false,
                hintActive: false 
            },

            canvas: {
                left: null,
                right: null,
                ctxLeft: null,
                ctxRight: null
            },

            init() {
                this.canvas.left = document.getElementById('left-canvas');
                this.canvas.right = document.getElementById('right-canvas');
                this.canvas.ctxLeft = this.canvas.left.getContext('2d');
                this.canvas.ctxRight = this.canvas.right.getContext('2d');

                this.bindEvents();
                this.resizeGame();
                this.detectSandboxMode();
                
                this.transitionToLevel(1);

                this.postToParent({
                    type: 'GAME_READY',
                    challengeId: this.config.challengeId
                });
            },

            bindEvents() {
                window.addEventListener('message', (e) => this.handleIncomingMessage(e));
                window.addEventListener('resize', () => this.resizeGame());
                window.addEventListener('orientationchange', () => this.resizeGame());

                document.getElementById('action-btn-left').addEventListener('click', () => {
                    this.renderLeftGraphics();
                });

                document.getElementById('action-btn-right').addEventListener('click', () => {
                    this.state.hintActive = !this.state.hintActive;
                    const btn = document.getElementById('action-btn-right');
                    if (this.state.hintActive) {
                        btn.textContent = "🔄 重設對比提示";
                        btn.style.backgroundColor = "#81ecec"; // 修正：直接使用色碼，防禦 CSS 變數在部分行動端失效
                        btn.style.boxShadow = "0 6px 0 #00ced1";
                    } else {
                        btn.textContent = "🔍 開啟切分網格";
                        btn.style.backgroundColor = "#ffb8b8"; // 修正：直接使用色碼
                        btn.style.boxShadow = "0 6px 0 #e84118";
                    }
                    this.renderRightGraphics();
                });
            },

            toggleSandbox() {
                this.state.sandboxOpen = !this.state.sandboxOpen;
                const panel = document.getElementById('sandbox-panel');
                if (this.state.sandboxOpen) {
                    panel.classList.add('open');
                } else {
                    panel.classList.remove('open');
                }
            },

            /**
             * 修正：開發期強健性優化
             * 為了確保在主站 iframe、Vercel 預覽、手機網頁中皆能完全調用驗證，
             * 移除嚴格的 window === top 偵測，強制開啟測試控制台切換功能。
             */
            detectSandboxMode() {
                const toggleBtn = document.getElementById('sandbox-toggle-btn');
                const sandboxPanel = document.getElementById('sandbox-panel');
                
                // 開發步驟階段：不論宿主環境，全面解鎖控制台
                toggleBtn.style.display = 'flex';
                sandboxPanel.style.display = 'flex';
                
                this.log('系統偵測：獨立開發模式硬化。已解鎖測試控制台，點擊左側 🛠️ 即可展開測試。', 'system');
            },

            /**
             * 第一性原理：標準數學排版渲染引擎 (Canvas text superscript parser)
             * 修正：將所有 CSS 變數參數改為絕對 Hex 碼，防禦 Canvas 渲染器解讀失效。
             */
            drawMathText(ctx, text, x, y, fontSize, color = "#2d3436") {
                ctx.save();
                ctx.fillStyle = color;
                ctx.font = `bold ${fontSize}px 'Kosugi Maru', sans-serif`;
                ctx.textBaseline = 'alphabetic';

                const parts = text.split('^');
                let currentX = x;

                parts.forEach((part, index) => {
                    if (index === 0) {
                        ctx.fillText(part, currentX, y);
                        currentX += ctx.measureText(part).width;
                    } else {
                        const superDigit = part.charAt(0);
                        const remainingText = part.slice(1);

                        ctx.font = `bold ${fontSize * 0.6}px 'Kosugi Maru', sans-serif`;
                        const superY = y - fontSize * 0.45;
                        ctx.fillText(superDigit, currentX, superY);
                        currentX += ctx.measureText(superDigit).width + 2;

                        ctx.font = `bold ${fontSize}px 'Kosugi Maru', sans-serif`;
                        if (remainingText) {
                            ctx.fillText(remainingText, currentX, y);
                            currentX += ctx.measureText(remainingText).width;
                        }
                    }
                });
                ctx.restore();
            },

            transitionToLevel(level) {
                this.state.currentLevel = level;
                this.state.hintActive = false; 
                
                const rightBtn = document.getElementById('action-btn-right');
                rightBtn.textContent = "🔍 開啟切分網格";
                rightBtn.style.backgroundColor = "#ffb8b8";
                rightBtn.style.boxShadow = "0 6px 0 #e84118";

                let badgeText = "";
                switch (level) {
                    case 1: badgeText = "LV.1 面積網格"; break;
                    case 2: badgeText = "LV.2 3D體積"; break;
                    case 3: badgeText = "LV.3 容體轉換"; break;
                    case 4: badgeText = "LV.4 微觀尺度"; break;
                    case 5: badgeText = "LV.5 分數拆解"; break;
                }
                document.getElementById('current-level-display').textContent = badgeText;

                const leftTitle = document.getElementById('left-panel-title');
                const leftDesc = document.getElementById('left-panel-desc');
                const rightTitle = document.getElementById('right-panel-title');
                const rightDesc = document.getElementById('right-panel-desc');

                switch (level) {
                    case 1:
                        leftTitle.innerHTML = "📐 原始二維空間";
                        leftDesc.innerHTML = "一幅邊長為 1 m 的正方形畫作，<br>它的總表面積就是 1 m<sup>2</sup>。";
                        
                        rightTitle.innerHTML = "💡 二維切分對比";
                        rightDesc.innerHTML = "我們將它的長與寬各自切成 100 等分，<br>看一看會發生什麼事？";
                        break;
                    case 2:
                        leftTitle.innerHTML = "📦 三維等角立方體";
                        leftDesc.innerHTML = "一個長、寬、高皆為 1 m 的巨大貨櫃，<br>它的體積為 1 m<sup>3</sup>。";
                        
                        rightTitle.innerHTML = "💡 三維嵌套拆解";
                        rightDesc.innerHTML = "在立方公分的視角下，<br>這個貨櫃到底塞得下多少個 1 cm<sup>3</sup>？";
                        break;
                    case 3:
                        leftTitle.innerHTML = "🧪 1000 cm<sup>3</sup> 正方體";
                        leftDesc.innerHTML = "邊長為 10 cm 的小正立方體，<br>其真實體積就是 1000 cm<sup>3</sup>。";
                        
                        rightTitle.innerHTML = "💡 體積與容積的鐵律";
                        rightDesc.innerHTML = "並排比較：1 L 的牛奶盒、1000 mL 的量筒，<br>找出「1 mL = 1 cm<sup>3</sup>」的絕對法則。";
                        break;
                    case 4:
                        leftTitle.innerHTML = "🔬 微觀尺度階梯";
                        leftDesc.innerHTML = "肉眼看不見的奇妙階梯：<br>毫米(mm) -> 微米(&mu;m) -> 奈米(nm)。";
                        
                        rightTitle.innerHTML = "💡 奈米級千倍律";
                        rightDesc.innerHTML = "掌握微觀大魔王的換算祕訣，<br>每下一個台階就要乘以 1000！";
                        break;
                    case 5:
                        leftTitle.innerHTML = "⚡ 複合維度密度";
                        leftDesc.innerHTML = "水在物理學中的密度金律：<br>1 g/cm<sup>3</sup>。";
                        
                        rightTitle.innerHTML = "💡 分數拆解防禦線";
                        rightDesc.innerHTML = "密度換算：1 g/cm<sup>3</sup> = ? kg/m<sup>3</sup>，<br>將分子與分母完全拆開進行第一性原理分析。";
                        break;
                }

                this.renderLeftGraphics();
                this.renderRightGraphics();
            },

            /**
             * 渲染左側 Canvas
             */
            renderLeftGraphics() {
                const ctx = this.canvas.ctxLeft;
                const width = this.canvas.left.width;
                const height = this.canvas.left.height;

                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, width, height);

                ctx.strokeStyle = "rgba(45, 52, 54, 0.1)";
                ctx.lineWidth = 1;
                
                if (this.state.currentLevel === 1) {
                    ctx.save();
                    ctx.strokeStyle = "#ff7675";
                    ctx.lineWidth = 4;
                    ctx.fillStyle = "rgba(255, 120, 120, 0.15)";
                    ctx.beginPath();
                    ctx.rect(140, 50, 200, 200);
                    ctx.fill();
                    ctx.stroke();

                    // 修正：代入絕對 hex 碼
                    this.drawMathText(ctx, "1 m", 225, 40, 20, "#2d3436");
                    this.drawMathText(ctx, "1 m", 100, 155, 20, "#2d3436");
                    this.drawMathText(ctx, "1 m^2", 215, 155, 26, "#ff7675");
                    ctx.restore();
                } else {
                    ctx.fillStyle = "#dfe6e9";
                    ctx.font = "bold 20px 'Kosugi Maru'";
                    ctx.fillText(`[LV.${this.state.currentLevel} 基礎 Canvas 圖型預留區]`, 110, 140);
                    this.drawMathText(ctx, "標準數學引擎：100 cm^2", 120, 180, 20, "#4a5568");
                }
            },

            /**
             * 渲染右側 Canvas
             */
            renderRightGraphics() {
                const ctx = this.canvas.ctxRight;
                const width = this.canvas.right.width;
                const height = this.canvas.right.height;

                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, width, height);

                if (!this.state.hintActive) {
                    ctx.save();
                    ctx.fillStyle = "rgba(129, 236, 236, 0.1)";
                    ctx.beginPath();
                    ctx.arc(width/2, height/2, 60, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = "#81ecec"; // 修正：使用絕對 hex
                    ctx.font = "bold 72px 'Kosugi Maru'";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText("?", width/2, height/2 + 5);

                    ctx.fillStyle = "#4a5568"; // 修正：使用絕對 hex
                    ctx.font = "bold 20px 'Kosugi Maru'";
                    ctx.fillText("點擊下方按鈕，開啟概念切分網格", width/2, height/2 + 95);
                    ctx.restore();
                    return;
                }

                if (this.state.currentLevel === 1) {
                    ctx.save();
                    const startX = 140;
                    const startY = 50;
                    const size = 200;
                    
                    ctx.fillStyle = "rgba(129, 236, 236, 0.1)";
                    ctx.fillRect(startX, startY, size, size);

                    ctx.strokeStyle = "rgba(129, 236, 236, 0.4)";
                    ctx.lineWidth = 1;
                    for (let i = 20; i < size; i += 20) {
                        ctx.beginPath();
                        ctx.moveTo(startX + i, startY);
                        ctx.lineTo(startX + i, startY + size);
                        ctx.stroke();

                        ctx.beginPath();
                        ctx.moveTo(startX, startY + i);
                        ctx.lineTo(startX + size, startY + i);
                        ctx.stroke();
                    }

                    ctx.strokeStyle = "#81ecec"; // 修正：使用絕對 hex
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.rect(startX, startY, size, size);
                    ctx.stroke();

                    this.drawMathText(ctx, "100 cm", 205, 40, 20, "#2d3436");
                    this.drawMathText(ctx, "100 cm", 65, 155, 20, "#2d3436");
                    
                    // 修正：算式 $Y$ 軸坐標提昇至 265，確保在任何高寬比切邊中均不被裁切
                    this.drawMathText(ctx, "100 * 100 = 10,000 cm^2", 120, 265, 20, "#2d3436");
                    ctx.restore();
                } else {
                    ctx.fillStyle = "#dfe6e9";
                    ctx.font = "bold 20px 'Kosugi Maru'";
                    ctx.fillText(`[LV.${this.state.currentLevel} 提示對比 Canvas 預留區]`, 110, 140);
                    this.drawMathText(ctx, "提示數學引擎：1,000,000 cm^3", 100, 180, 20, "#ffb8b8");
                }
            },

            /**
             * 測試排版引擎極限
             */
            testMathTypography() {
                const ctx = this.canvas.ctxLeft;
                ctx.clearRect(0, 0, this.canvas.left.width, this.canvas.left.height);
                ctx.fillStyle = "#fafbfc";
                ctx.fillRect(0, 0, this.canvas.left.width, this.canvas.left.height);

                ctx.save();
                ctx.fillStyle = "#2d3436";
                ctx.font = "bold 20px 'Kosugi Maru'";
                ctx.fillText("📐 排版引擎極限複雜運算式測試：", 30, 50);

                this.drawMathText(ctx, "面積單位：1 m^2 = 10,000 cm^2 = 1,000,000 mm^2", 30, 110, 18, "#2980b9");
                this.drawMathText(ctx, "體積與容積：1 m^3 = 1,000,000 cm^3", 30, 160, 18, "#27ae60");
                this.drawMathText(ctx, "複合單位：1.5 g/cm^3 = 1500 kg/m^3", 30, 210, 18, "#e74c3c");
                this.drawMathText(ctx, "化學與代數式：H^2O 和 X^2 + Y^3 = Z^5", 30, 260, 18, "#8e44ad");
                ctx.restore();

                this.log("排版引擎測試完成！已在左畫布渲染複雜上下標組合運算式。", "system");
            },

            /* =================================================================
               通訊沙盒封裝
               ================================================================= */
            postToParent(data) {
                parent.postMessage(data, '*');
                this.log(`[發送 ↗] ${JSON.stringify(data)}`, 'out');
            },

            handleIncomingMessage(e) {
                const data = e.data;
                if (!data) return;

                this.log(`[接收 ↙] ${JSON.stringify(data)}`, 'in');
                if (data.type === 'START_GAME') {
                    const requestedLevel = data.config?.level || 1;
                    this.transitionToLevel(requestedLevel);
                }
            },

            mockReceiveStartGame(level) {
                window.postMessage({
                    type: 'START_GAME',
                    config: { level: level }
                }, '*');
            },

            log(msg, direction) {
                const logger = document.getElementById('sandbox-logger');
                if (!logger) return;

                const timeStr = new Date().toLocaleTimeString();
                let dirClass = '';
                let prefix = '';

                if (direction === 'in') {
                    dirClass = 'log-dir-in';
                    prefix = '📥 ';
                } else if (direction === 'out') {
                    dirClass = 'log-dir-out';
                    prefix = '📤 ';
                } else {
                    prefix = '⚙️ ';
                }

                logger.innerHTML += `
                    <div class="log-entry">
                        <span class="log-time">[${timeStr}]</span> 
                        <span class="${dirClass}">${prefix}${msg}</span>
                    </div>
                `;
                logger.scrollTop = logger.scrollHeight;
            },

            clearLogs() {
                const logger = document.getElementById('sandbox-logger');
                if (logger) logger.innerHTML = '';
            },

            resizeGame() {
                const container = document.getElementById('game-container');
                const viewport = document.getElementById('game-viewport');
                const overlay = document.getElementById('orientation-overlay');

                if (!container || !viewport) return;

                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;

                const scaleX = windowWidth / this.config.baseWidth;
                const scaleY = windowHeight / this.config.baseHeight;
                const scale = Math.min(scaleX, scaleY);

                viewport.style.transform = `translate(-50%, -50%) scale(${scale})`;

                // 判斷直螢幕狀態
                const isPortrait = windowHeight > windowWidth;

                if (overlay) {
                    if (isPortrait) {
                        overlay.style.display = 'flex';
                        viewport.style.opacity = '0';
                        viewport.style.pointerEvents = 'none';
                    } else {
                        overlay.style.display = 'none';
                        viewport.style.opacity = '1';
                        viewport.style.pointerEvents = 'auto';
                    }
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            GameModule.init();
        });
    </script>
</body>
