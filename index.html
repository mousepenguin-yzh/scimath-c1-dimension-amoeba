<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>空間維度與單位變形蟲 - 步驟二</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark-plate: #1e272e; 
            --bg-game: #f5f6fa;       
            --macaron-pink: #ffb8b8;  
            --macaron-blue: #81ecec;  
            --macaron-yellow: #ffeaa7;
            --macaron-green: #55efc4; 
            --text-main: #2d3436;     
            --text-muted: #4a5568;    
            --panel-white: #ffffff;   
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: var(--bg-dark-plate);
            font-family: 'Kosugi Maru', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
        }

        /* 16:9 核心畫布 */
        #game-viewport {
            position: absolute;
            width: 1280px;
            height: 720px;
            background-color: var(--bg-game);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            transform-origin: center center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            transition: opacity 0.2s ease;
        }

        /* 遊戲主視區 */
        #main-game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 35px;
            height: 100%;
            transition: all 0.3s ease;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px dashed #dcdde1;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 {
            color: var(--text-main);
            font-size: 34px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .level-badge {
            background-color: var(--macaron-pink);
            color: white;
            padding: 6px 16px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
        }

        .split-container {
            flex: 1;
            display: flex;
            gap: 30px;
        }

        .split-panel {
            flex: 1;
            background-color: var(--panel-white);
            border-radius: 28px;
            padding: 35px;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        .panel-top-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .panel-icon {
            font-size: 72px;
            margin-bottom: 10px;
        }

        .panel-title {
            font-size: 28px;
            color: var(--text-main);
            font-weight: bold;
        }

        .panel-desc {
            font-size: 21px;
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 90%;
        }

        .macaron-btn {
            width: 85%;
            padding: 16px 30px;
            font-size: 22px;
            font-family: 'Kosugi Maru', sans-serif;
            font-weight: bold;
            color: var(--text-main);
            background-color: var(--macaron-blue);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #00ced1;
            transition: all 0.05s ease;
        }

        .macaron-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #00ced1;
        }

        /* ----------------------------------
           步驟二專屬：虛擬測試沙盒面板 (僅在 window === top 時渲染)
        ------------------------------------- */
        #sandbox-panel {
            width: 380px;
            background-color: #2d3436;
            border-left: 6px solid var(--macaron-blue);
            display: flex;
            flex-direction: column;
            padding: 25px;
            color: #f5f6fa;
            z-index: 100;
        }

        .sandbox-title {
            font-size: 22px;
            color: var(--macaron-blue);
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #4a5568;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sandbox-section-title {
            font-size: 16px;
            color: var(--macaron-yellow);
            margin: 15px 0 8px 0;
            font-weight: bold;
        }

        .sandbox-btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .sandbox-btn {
            padding: 10px;
            font-size: 14px;
            font-family: inherit;
            background-color: #4a5568;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.1s;
        }

        .sandbox-btn:hover {
            background-color: #576574;
        }

        .sandbox-btn:active {
            transform: scale(0.97);
        }

        .sandbox-btn.accent {
            background-color: var(--macaron-pink);
            color: var(--text-main);
        }

        .sandbox-btn.accent:hover {
            background-color: #ff9f9f;
        }

        /* 通訊日誌監控器 */
        #sandbox-logger {
            flex: 1;
            background-color: #1e272e;
            border-radius: 12px;
            padding: 15px;
            font-family: monospace;
            font-size: 13px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid #4a5568;
            line-height: 1.5;
        }

        .log-entry {
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #34495e;
            word-break: break-all;
        }

        .log-time {
            color: #95a5a6;
        }

        .log-dir-in {
            color: var(--macaron-blue);
            font-weight: bold;
        }

        .log-dir-out {
            color: var(--macaron-green);
            font-weight: bold;
        }

        /* 直螢幕強制攔截層 */
        #orientation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background-color: var(--macaron-yellow);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 40px;
        }

        .phone-icon-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 35px;
        }

        .phone-icon {
            font-size: 100px;
            display: inline-block;
            animation: rotatePhone 2.5s infinite ease-in-out;
        }

        .warning-title {
            font-size: 32px;
            color: var(--text-main);
            font-weight: bold;
            margin-bottom: 20px;
        }

        .warning-sub {
            font-size: 22px;
            color: #636e72;
            line-height: 1.8;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            35% { transform: rotate(-90deg); }
            70% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 核心遊戲 16:9 Viewport -->
        <div id="game-viewport">
            
            <!-- 遊戲主畫面（左側欄與右側欄） -->
            <div id="main-game-area">
                <header>
                    <h1>空間維度與單位變形蟲 <span class="level-badge" id="current-level-display">LV.1 測試</span></h1>
                    <div style="font-size: 24px; color: var(--text-main); font-weight: bold;">分數：<span id="score-display">000</span></div>
                </header>

                <div class="split-container">
                    <div class="split-panel" style="border-top: 8px solid var(--macaron-pink);">
                        <div class="panel-top-info">
                            <div class="panel-icon" id="left-panel-icon">📐</div>
                            <div class="panel-title" id="left-panel-title">原始二維面積</div>
                            <div class="panel-desc" id="left-panel-desc">長 1 公尺，寬 1 公尺。<br>我們將在此處繪製基本的 Canvas 立方。</div>
                        </div>
                        <button class="macaron-btn" id="action-btn-left">點擊測試反饋</button>
                    </div>

                    <div class="split-panel" style="border-top: 8px solid var(--macaron-blue);">
                        <div class="panel-top-info">
                            <div class="panel-icon" id="right-panel-icon">💡</div>
                            <div class="panel-title" id="right-panel-title">切分對比與提示</div>
                            <div class="panel-desc" id="right-panel-desc">點擊左側提示按鈕時，此處將同步載入切分網格。</div>
                        </div>
                        <button class="macaron-btn" id="action-btn-right" style="background-color: var(--macaron-pink); box-shadow: 0 8px 0 #e84118; color: white;">提示按鈕測試</button>
                    </div>
                </div>
            </div>

            <!-- 虛擬沙盒控制台（當獨立運行時，會自動出現於 Viewport 右側內） -->
            <div id="sandbox-panel" style="display: none;">
                <div class="sandbox-title">🛠️ 虛擬沙盒控制台</div>
                
                <div class="sandbox-section-title">模擬父視窗指令 (向下通訊)</div>
                <div class="sandbox-btn-grid">
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(1)">啟動 LV.1</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(2)">啟動 LV.2</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(3)">啟動 LV.3</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(4)">啟動 LV.4</button>
                    <button class="sandbox-btn" onclick="GameModule.mockReceiveStartGame(5)">啟動 LV.5</button>
                </div>

                <div class="sandbox-section-title">模擬遊戲內事件 (向上通訊)</div>
                <div class="sandbox-btn-grid">
                    <button class="sandbox-btn accent" onclick="GameModule.mockTriggerLevelUp()">模擬答對升級</button>
                    <button class="sandbox-btn accent" onclick="GameModule.mockTriggerGameOver(true)">完美通關(成功)</button>
                    <button class="sandbox-btn accent" style="background-color: #ff7675;" onclick="GameModule.mockTriggerGameOver(false)">失敗結算</button>
                </div>

                <div class="sandbox-section-title" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>通訊傳輸日誌</span>
                    <span style="font-size:11px; color:#95a5a6; cursor:pointer;" onclick="GameModule.clearLogs()">清除</span>
                </div>
                <div id="sandbox-logger"></div>
            </div>

        </div>
    </div>

    <!-- 直螢幕強制攔截層 -->
    <div id="orientation-overlay">
        <div class="phone-icon-wrapper">
            <span class="phone-icon">📱</span>
        </div>
        <div class="warning-title">請旋轉您的行動裝置</div>
        <div class="warning-sub">本數理挑戰專為【橫螢幕 16:9】設計，<br>請開啟螢幕自動旋轉，並將手機橫放以獲得最佳體驗！</div>
    </div>

    <script>
        /**
         * 2. 封裝命名空間：隔離內部邏輯，防止與主網站產生全域命名衝突
         */
        const GameModule = {
            // 基礎參數設定
            config: {
                baseWidth: 1280,
                baseHeight: 720,
                challengeId: 1
            },
            
            // 遊戲當前內部狀態
            state: {
                currentLevel: 1,
                score: 0,
                isPerfect: true
            },

            /**
             * 初始化遊戲
             */
            init() {
                this.bindEvents();
                this.resizeGame();
                this.detectSandboxMode();
                
                // 子傳父：發送 GAME_READY 訊號，宣告遊戲載入完畢
                this.postToParent({
                    type: 'GAME_READY',
                    challengeId: this.config.challengeId
                });
            },

            /**
             * 監聽與綁定事件
             */
            bindEvents() {
                // 監聽父視窗（主網站）向下發送的 message
                window.addEventListener('message', (event) => {
                    this.handleIncomingMessage(event);
                });

                // 綁定視窗縮放與旋轉事件
                window.addEventListener('resize', () => this.resizeGame());
                window.addEventListener('orientationchange', () => this.resizeGame());
            },

            /**
             * 偵測當前是否為獨立運行（Sandbox 模式）
             */
            detectSandboxMode() {
                const isStandalone = (window === top);
                const sandboxPanel = document.getElementById('sandbox-panel');
                
                if (isStandalone) {
                    // 若不在 iframe 內，顯現右側虛擬測試面板，並微調遊戲寬度
                    sandboxPanel.style.display = 'flex';
                    this.log('系統偵測：獨立運行環境。已自動啟用【虛擬沙盒控制台】。', 'system');
                } else {
                    sandboxPanel.style.display = 'none';
                }
            },

            /**
             * 統一處理向父視窗發送的通訊封包（子傳父）
             */
            postToParent(data) {
                // 向上發送至父視窗
                parent.postMessage(data, '*');
                
                // 同步將發送紀錄渲染至畫面的「通訊傳輸日誌」中，以供肉眼直觀驗證
                this.log(`[發送 ↗] ${JSON.stringify(data)}`, 'out');
            },

            /**
             * 統一處理父視窗傳入的通訊封包（父傳子）
             */
            handleIncomingMessage(event) {
                const data = event.data;
                if (!data) return;

                this.log(`[接收 ↙] ${JSON.stringify(data)}`, 'in');

                // 處理 START_GAME 指令
                if (data.type === 'START_GAME') {
                    const requestedLevel = data.config?.level || 1;
                    this.transitionToLevel(requestedLevel);
                }
            },

            /**
             * 實作關卡狀態切換 (關卡核心驅動)
             */
            transitionToLevel(level) {
                this.state.currentLevel = level;
                
                // 更新畫面 DOM UI
                document.getElementById('current-level-display').textContent = `LV.${level} 測試`;
                
                const leftTitle = document.getElementById('left-panel-title');
                const leftDesc = document.getElementById('left-panel-desc');
                const leftIcon = document.getElementById('left-panel-icon');
                
                const rightTitle = document.getElementById('right-panel-title');
                const rightDesc = document.getElementById('right-panel-desc');
                const rightIcon = document.getElementById('right-panel-icon');

                // 依據不同關卡渲染不同的測試文字（為步驟三、四的圖形做預備）
                switch (level) {
                    case 1:
                        leftIcon.textContent = "📐";
                        leftTitle.textContent = "原始二維面積";
                        leftDesc.innerHTML = "長 1 公尺，寬 1 公尺。<br>這是一個純粹的二維平面空間。";
                        
                        rightIcon.textContent = "💡";
                        rightTitle.textContent = "二維切分對比";
                        rightDesc.innerHTML = "切分為長 100 公分，寬 100 公分的細密網格。";
                        break;
                    case 2:
                        leftIcon.textContent = "📦";
                        leftTitle.textContent = "三維等角立方體";
                        leftDesc.innerHTML = "長、寬、高皆為 1 公尺。<br>立體空間的三維世界。";
                        
                        rightIcon.textContent = "💡";
                        rightTitle.textContent = "三維嵌套放大分解";
                        rightDesc.innerHTML = "點擊提示後展示 1,000,000 個立方公分的驚人對比！";
                        break;
                    case 3:
                        leftIcon.textContent = "🧪";
                        leftTitle.textContent = "1000 立方公分正方體";
                        leftDesc.innerHTML = "物理課本裡的基礎容積：長 10 釐米的正方體。";
                        
                        rightIcon.textContent = "💡";
                        rightTitle.textContent = "容積與體積的橋樑";
                        rightDesc.innerHTML = "並排繪製 1 公升牛奶盒與 1000 毫升量筒。";
                        break;
                    case 4:
                        leftIcon.textContent = "🔬";
                        leftTitle.textContent = "微觀尺度階梯";
                        leftDesc.innerHTML = "肉眼看不見的世界：<br>毫米(mm)、微米(μm)、奈米(nm)。";
                        
                        rightIcon.textContent = "💡";
                        rightTitle.textContent = "微觀千倍換算律";
                        rightDesc.innerHTML = "展示階梯與箭頭：「每跨出一步就是 1000 倍差距！」";
                        break;
                    case 5:
                        leftIcon.textContent = "⚡";
                        leftTitle.textContent = "複合單位拆解";
                        leftDesc.innerHTML = "密度換算與速度換算：<br>例如 1 g/cm³ 或 90 km/hr。";
                        
                        rightIcon.textContent = "💡";
                        rightTitle.textContent = "分數上下拆解框";
                        rightDesc.innerHTML = "獨立處理分子與分母：將複合單位還原為第一性原理。";
                        break;
                }
            },

            /* =================================================================
               沙盒模擬專屬函數 (僅供畫面按鈕直接觸發通訊，不影響主網站功能)
               ================================================================= */
            
            /**
             * 模擬父視窗向子網頁發送 START_GAME 封包
             */
            mockReceiveStartGame(level) {
                // 利用 postMessage 模擬從父層傳過來的事件，以此徹底檢驗事件監聽是否完美暢通
                window.postMessage({
                    type: 'START_GAME',
                    config: { level: level }
                }, '*');
            },

            /**
             * 模擬遊戲中答對、積分增加並推進關卡
             */
            mockTriggerLevelUp() {
                this.state.score += 20;
                document.getElementById('score-display').textContent = this.state.score.toString().padStart(3, '0');
                
                let nextLevel = this.state.currentLevel + 1;
                if (nextLevel > 5) nextLevel = 1; // 循環回到 LV.1
                
                this.transitionToLevel(nextLevel);
                this.log(`模擬事件：學生答對了！分數增加。跳轉至 LV.${nextLevel}。`, 'system');
            },

            /**
             * 模擬學生玩完遊戲，發送 GAME_OVER 資料包
             */
            mockTriggerGameOver(isPerfect) {
                this.state.isPerfect = isPerfect;
                
                // 子傳父：發送 GAME_OVER 報告至父層
                this.postToParent({
                    type: 'GAME_OVER',
                    challengeId: this.config.challengeId,
                    currentLevel: this.state.currentLevel,
                    isPerfect: this.state.isPerfect,
                    score: this.state.score
                });
            },

            /**
             * 在畫面的日誌框中列印一條訊息 (純視覺驗證，取代開 F12 的麻煩)
             */
            log(msg, direction) {
                const logger = document.getElementById('sandbox-logger');
                if (!logger) return;

                const timeStr = new Date().toLocaleTimeString();
                let dirClass = '';
                let prefix = '';

                if (direction === 'in') {
                    dirClass = 'log-dir-in';
                    prefix = '📥 ';
                } else if (direction === 'out') {
                    dirClass = 'log-dir-out';
                    prefix = '📤 ';
                } else {
                    prefix = '⚙️ ';
                }

                logger.innerHTML += `
                    <div class="log-entry">
                        <span class="log-time">[${timeStr}]</span> 
                        <span class="${dirClass}">${prefix}${msg}</span>
                    </div>
                `;
                // 自動捲動到底部
                logger.scrollTop = logger.scrollHeight;
            },

            /**
             * 清空日誌顯示
             */
            clearLogs() {
                const logger = document.getElementById('sandbox-logger');
                if (logger) logger.innerHTML = '';
            },

            /**
             * 動態縮放計算
             */
            resizeGame() {
                const container = document.getElementById('game-container');
                const viewport = document.getElementById('game-viewport');
                const overlay = document.getElementById('orientation-overlay');

                if (!container || !viewport) return;

                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;

                const scaleX = windowWidth / this.config.baseWidth;
                const scaleY = windowHeight / this.config.baseHeight;
                const scale = Math.min(scaleX, scaleY);

                viewport.style.transform = `translate(-50%, -50%) scale(${scale})`;

                // 判斷直螢幕狀態
                const isPortrait = windowHeight > windowWidth;

                if (overlay) {
                    if (isPortrait) {
                        overlay.style.display = 'flex';
                        viewport.style.opacity = '0';
                        viewport.style.pointerEvents = 'none';
                    } else {
                        overlay.style.display = 'none';
                        viewport.style.opacity = '1';
                        viewport.style.pointerEvents = 'auto';
                    }
                }
            }
        };

        // 啟動模組
        window.addEventListener('DOMContentLoaded', () => {
            GameModule.init();
        });
    </script>
</body>
</html>
