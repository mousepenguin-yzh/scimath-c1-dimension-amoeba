<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>挑戰一：空間維度與單位變形蟲 - 步驟四步驟引導版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 基礎重設 */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #F0F4F8;
            font-family: 'Kosugi Maru', 'Noto Sans TC', sans-serif;
        }

        /* 16:9 核心視口容器 (1280x720) */
        #app-viewport {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1280px;
            height: 720px;
            background: radial-gradient(circle at center, #FFFFFF 0%, #E8F0F8 100%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transform-origin: center center;
            transform: translate(-50%, -50%) scale(1);
            transition: box-shadow 0.3s ease;
            z-index: 1;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        /* 數學與控制排版混合層 */
        #dom-ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .interactive-overlay {
            position: absolute;
            pointer-events: auto;
        }

        /* 頂部標題 */
        #status-header {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 14px 40px;
            border-radius: 50px;
            border: 3px solid #BEE3F8;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            font-size: 26px;
            font-weight: bold;
            color: #2B6CB0;
            text-align: center;
        }

        /* 答題算式卡片 */
        #math-display-card {
            top: 140px;
            right: 50px;
            background: rgba(255, 255, 255, 0.98);
            border: 4px solid #BEE3F8;
            border-radius: 24px;
            padding: 28px 40px;
            box-shadow: 0 15px 35px rgba(49, 130, 206, 0.18);
            color: #2D3748;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 480px;
            max-width: 550px;
        }

        #math-display-card.success-pulse {
            border-color: #48BB78;
            background-color: #F0FFF4;
            transform: scale(1.03);
            box-shadow: 0 20px 45px rgba(72, 187, 120, 0.3);
        }

        .card-title {
            font-size: 22px;
            color: #718096;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .formula-text {
            font-size: 34px;
            font-weight: bold;
            color: #2B6CB0;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }

        .formula-text sup {
            font-size: 24px;
            color: #E53E3E;
            margin-left: 3px;
        }

        /* 離散步驟引導導覽面板 (高度適合平板與手機大拇指點按) */
        #control-panel-bottom {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.98);
            border: 3.5px solid #BEE3F8;
            border-radius: 35px;
            padding: 16px 40px;
            width: 85%;
            max-width: 980px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        /* 引導按鈕 (統一 50px 物理高度，極佳觸控反饋) */
        .step-btn {
            background-color: #3182CE;
            color: white;
            border: none;
            padding: 12px 36px;
            border-radius: 25px;
            font-family: inherit;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0px #2B6CB0;
            transition: all 0.05s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0px #2B6CB0;
        }

        .step-btn:disabled {
            background-color: #CBD5E0;
            box-shadow: none;
            color: #A0AEC0;
            cursor: not-allowed;
            transform: none;
        }

        /* 步驟指示圓點 (Step Dots) */
        .step-indicator-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
        }

        .step-dots-row {
            display: flex;
            gap: 16px;
        }

        .step-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #E2E8F0;
            border: 2px solid #CBD5E0;
            transition: all 0.25s ease;
        }

        .step-dot.active {
            background-color: #3182CE;
            border-color: #3182CE;
            transform: scale(1.3);
            box-shadow: 0 0 10px rgba(49, 130, 206, 0.4);
        }

        /* 防呆直螢幕阻擋遮罩 */
        #orientation-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #3182CE;
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 30px;
            text-align: center;
        }

        /* 旋轉手機的動態示意圖 */
        .phone-icon-wrapper {
            position: relative;
            width: 80px;
            height: 120px;
            margin-bottom: 20px;
        }

        .phone-icon {
            width: 50px;
            height: 90px;
            border: 4px solid white;
            border-radius: 8px;
            position: absolute;
            top: 15px;
            left: 15px;
            animation: rotatePhone 2s ease-in-out infinite;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }

        #orientation-blocker h2 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #orientation-blocker p {
            font-size: 16px;
            opacity: 0.9;
        }

        @media (orientation: portrait) {
            #orientation-blocker {
                display: flex;
            }
        }

        /* 偵錯面板 */
        #debug-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 999;
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #BEE3F8;
            border-radius: 14px;
            width: 260px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            max-height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
        }

        #debug-panel.collapsed {
            width: 180px;
            height: 44px;
        }

        #btn-toggle-debug {
            width: 100%;
            height: 44px;
            background: #2B6CB0;
            color: white;
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
        }

        .debug-body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .debug-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #4A5568;
        }

        .debug-value {
            font-weight: bold;
            color: #2D3748;
        }
    </style>
</head>
<body>

    <!-- 16:9 遊戲主視口 -->
    <div id="app-viewport">
        <canvas id="game-canvas"></canvas>

        <div id="dom-ui-layer">
            <!-- 頂部標題 -->
            <div id="status-header" class="interactive-overlay">
                LV.2 三維體積：「百萬大分裂」引導式探索
            </div>

            <!-- 動態算式字卡 -->
            <div id="math-display-card" class="interactive-overlay">
                <div class="card-title" id="math-card-title">第一步：大方塊拆成 1000 份</div>
                <div class="formula-text" id="math-formula">
                    <span>1 m<sup>3</sup> 巨大體積</span>
                    <span>=</span>
                    <span style="color: #3182CE;">1000 個 10 cm 中方塊</span>
                </div>
            </div>

            <!-- 離散步驟引導導覽面板 -->
            <div id="control-panel-bottom" class="interactive-overlay">
                <button class="step-btn" id="btn-prev" disabled>◀ 上一步</button>
                
                <div class="step-indicator-container">
                    <div class="step-dots-row">
                        <div class="step-dot active"></div>
                        <div class="step-dot"></div>
                        <div class="step-dot"></div>
                        <div class="step-dot"></div>
                        <div class="step-dot"></div>
                        <div class="step-dot"></div>
                    </div>
                    <div id="txt-animation-phase" style="color: #3182CE; font-size: 16px; font-weight: bold; margin-top: 4px;">
                        步驟 1 / 6：正在分裂為 1000 個中型方塊
                    </div>
                </div>

                <button class="step-btn" id="btn-next">下一步 ▶</button>
            </div>
        </div>
    </div>

    <!-- 螢幕方向引導器 -->
    <div id="orientation-blocker">
        <div class="phone-icon-wrapper">
            <div class="phone-icon"></div>
        </div>
        <h2>請旋轉您的螢幕</h2>
        <p>本挑戰僅支援【橫螢幕】操作，請開啟手機自動旋轉功能並橫放以獲得最佳遊戲體驗。</p>
    </div>

    <!-- 開發者偵錯面板 -->
    <div id="debug-panel" class="collapsed">
        <button id="btn-toggle-debug">⚙️ 展開/收折偵錯面板</button>
        <div class="debug-body">
            <div class="debug-row">
                <span>時間軸進度:</span>
                <span id="val-progress" class="debug-value">0.00</span>
            </div>
            <div class="debug-row">
                <span>繪製方塊數:</span>
                <span id="val-draw-count" class="debug-value">0</span>
            </div>
            <div class="debug-row">
                <span>聚焦方塊 Alpha:</span>
                <span id="val-focus-alpha" class="debug-value">1.00</span>
            </div>
            <div class="debug-row">
                <span>背景方塊 Alpha:</span>
                <span id="val-back-alpha" class="debug-value">1.00</span>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 核心畫布與解析度設定 ---
        const BASE_WIDTH = 1280;
        const BASE_HEIGHT = 720;
        
        const viewport = document.getElementById('app-viewport');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        let currentScale = 1;

        // 固定為 1 立方公尺基礎教學模型，消滅一切多餘變數與認知阻礙
        const questionVolume = 1;

        // 定義 6 個離散的步驟目標時間軸位置
        const STEP_PROGRESS_TARGETS = [0, 25, 45, 65, 80, 100];
        let currentStepIndex = 0; // 當前所在的步驟 (0 ~ 5)
        let currentProgress = 0;   // 目前的渲染時間軸進度 (0 ~ 100)

        const confettiList = [];
        let hasConfettiTriggered = false;

        function updateLayout() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            const scaleX = windowWidth / BASE_WIDTH;
            const scaleY = windowHeight / BASE_HEIGHT;
            currentScale = Math.min(scaleX, scaleY);

            viewport.style.transform = `translate(-50%, -50%) scale(${currentScale})`;

            // 雙重防呆直屏阻擋
            const blocker = document.getElementById('orientation-blocker');
            if (windowHeight > windowWidth) {
                blocker.style.display = 'flex';
            } else {
                blocker.style.display = 'none';
            }
        }

        // --- 2. 物理碎紙花粒子系統 ---
        class ConfettiParticle {
            constructor(startX, startY) {
                this.x = startX;
                this.y = startY;
                const angle = Math.random() * Math.PI * 2;
                const speed = 7 + Math.random() * 15;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 8;
                this.width = 12 + Math.random() * 10;
                this.height = 6 + Math.random() * 6;
                this.rotation = Math.random() * Math.PI;
                this.rotationSpeed = -0.12 + Math.random() * 0.24;
                this.gravity = 0.35;
                this.resistance = 0.96;
                const colors = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#BDB2FF', '#FFC6FF'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 1;
                this.decay = 0.008 + Math.random() * 0.012;
            }

            update() {
                this.vx *= this.resistance;
                this.vy *= this.resistance;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                this.alpha -= this.decay;
            }

            draw(context) {
                if (this.alpha <= 0) return;
                context.save();
                context.translate(this.x, this.y);
                context.rotate(this.rotation);
                context.globalAlpha = this.alpha;
                context.fillStyle = this.color;
                context.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                context.restore();
            }
        }

        function triggerConfetti(x, y) {
            for (let i = 0; i < 150; i++) {
                confettiList.push(new ConfettiParticle(x, y));
            }
            const card = document.getElementById('math-display-card');
            card.classList.add('success-pulse');
            setTimeout(() => card.classList.remove('success-pulse'), 600);
        }

        // --- 3. 非對稱二等角投影幾何計算 ---
        const radLeft = 22 * Math.PI / 180;
        const radRight = 38 * Math.PI / 180;

        function getIsoPoint(x, y, z, originX, originY) {
            return {
                x: originX + x * Math.cos(radRight) - y * Math.cos(radLeft),
                y: originY + x * Math.sin(radRight) + y * Math.sin(radLeft) - z
            };
        }

        function drawCube(context, x, y, z, size, originX, originY, baseAlpha, isTarget = false) {
            const pts = {
                B: getIsoPoint(x + size, y, z, originX, originY),
                C: getIsoPoint(x + size, y + size, z, originX, originY),
                D: getIsoPoint(x, y + size, z, originX, originY),
                E: getIsoPoint(x, y, z + size, originX, originY),
                F: getIsoPoint(x + size, y, z + size, originX, originY),
                G: getIsoPoint(x + size, y + size, z + size, originX, originY),
                H: getIsoPoint(x, y + size, z + size, originX, originY)
            };

            let colorTop, colorLeft, colorRight, strokeStyle;
            if (isTarget) {
                colorTop = `rgba(252, 234, 222, ${baseAlpha})`;    
                colorLeft = `rgba(255, 173, 173, ${baseAlpha})`;   
                colorRight = `rgba(255, 198, 255, ${baseAlpha})`;  
                strokeStyle = `rgba(229, 62, 62, ${baseAlpha * 0.85})`; 
            } else {
                colorTop = `rgba(232, 240, 248, ${baseAlpha})`;    
                colorLeft = `rgba(144, 205, 244, ${baseAlpha})`;   
                colorRight = `rgba(66, 153, 225, ${baseAlpha})`;   
                strokeStyle = `rgba(43, 108, 176, ${baseAlpha * 0.55})`; 
            }

            context.lineWidth = isTarget ? 3.0 : 1.0;
            context.lineCap = 'round';
            context.lineJoin = 'round';

            // 1. 左前側面：D -> C -> G -> H
            context.fillStyle = colorLeft;
            context.beginPath();
            context.moveTo(pts.D.x, pts.D.y);
            context.lineTo(pts.C.x, pts.C.y);
            context.lineTo(pts.G.x, pts.G.y);
            context.lineTo(pts.H.x, pts.H.y);
            context.closePath();
            context.fill();
            context.strokeStyle = strokeStyle;
            context.stroke();

            // 2. 右前側面：B -> C -> G -> F
            context.fillStyle = colorRight;
            context.beginPath();
            context.moveTo(pts.B.x, pts.B.y);
            context.lineTo(pts.C.x, pts.C.y);
            context.lineTo(pts.G.x, pts.G.y);
            context.lineTo(pts.F.x, pts.F.y);
            context.closePath();
            context.fill();
            context.stroke();

            // 3. 頂部面：E -> F -> G -> H
            context.fillStyle = colorTop;
            context.beginPath();
            context.moveTo(pts.E.x, pts.E.y);
            context.lineTo(pts.F.x, pts.F.y);
            context.lineTo(pts.G.x, pts.G.y);
            context.lineTo(pts.H.x, pts.H.y);
            context.closePath();
            context.fill();
            context.stroke();
        }

        function drawFaceGrid(context, p1, p2, p3, p4, linesCount, alpha) {
            context.strokeStyle = `rgba(229, 62, 62, ${alpha * 0.45})`; 
            context.lineWidth = 1.5;
            for (let i = 1; i < linesCount; i++) {
                const ratio = i / linesCount;
                const start1 = {
                    x: p1.x + (p2.x - p1.x) * ratio,
                    y: p1.y + (p2.y - p1.y) * ratio
                };
                const end1 = {
                    x: p4.x + (p3.x - p4.x) * ratio,
                    y: p4.y + (p3.y - p4.y) * ratio
                };
                context.beginPath();
                context.moveTo(start1.x, start1.y);
                context.lineTo(end1.x, end1.y);
                context.stroke();

                const start2 = {
                    x: p1.x + (p4.x - p1.x) * ratio,
                    y: p1.y + (p4.y - p1.y) * ratio
                };
                const end2 = {
                    x: p2.x + (p3.x - p2.x) * ratio,
                    y: p2.y + (p3.y - p2.y) * ratio
                };
                context.beginPath();
                context.moveTo(start2.x, start2.y);
                context.lineTo(end2.x, end2.y);
                context.stroke();
            }
        }

        // --- 4. 核心嵌套渲染演算法 ---
        let renderCubeCount = 0;

        function renderMultiStageVolume() {
            renderCubeCount = 0;

            const gridOriginX = 420;
            const gridOriginY = 480;
            const cubeSize = 20;
            const maxGap = 7.5;

            const finalSlideFactor = 140;
            const px_end = 9 * (cubeSize + maxGap) + finalSlideFactor;
            const py_end = px_end;
            const pz_end = px_end;
            const targetScreenPos = getIsoPoint(px_end, py_end, pz_end, gridOriginX, gridOriginY);

            // ----------------------------------------------------
            // 階段 A (0% 到 25%)：切割中方塊
            // ----------------------------------------------------
            if (currentProgress <= 25) {
                const t = currentProgress / 25;
                const gap = t * maxGap; 

                for (let z = 0; z < 10; z++) {
                    for (let y = 0; y < 10; y++) {
                        for (let x = 0; x < 10; x++) {
                            const px = x * (cubeSize + gap);
                            const py = y * (cubeSize + gap);
                            const pz = z * (cubeSize + gap);
                            const isTarget = (x === 9 && y === 9 && z === 9);
                            
                            drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, 1.0, isTarget);
                            renderCubeCount++;
                        }
                    }
                }
                
                ctx.fillStyle = '#1A365D';
                ctx.font = 'bold 22px "Noto Sans TC", sans-serif';
                ctx.textAlign = 'center';
                const labelPos = getIsoPoint(100, 100, 240, gridOriginX, gridOriginY);
                ctx.fillText(`巨大方塊 (${questionVolume} m³)`, labelPos.x, labelPos.y);
                
                document.getElementById('val-focus-alpha').textContent = "1.00";
                document.getElementById('val-back-alpha').textContent = "1.00";
            }
            // ----------------------------------------------------
            // 階段 B (25% 到 45%)：抽出一個
            // ----------------------------------------------------
            else if (currentProgress > 25 && currentProgress <= 45) {
                const t = (currentProgress - 25) / 20; 
                const fadeAlpha = 1 - t; 
                const slideFactor = t * finalSlideFactor; 

                for (let z = 0; z < 10; z++) {
                    for (let y = 0; y < 10; y++) {
                        for (let x = 0; x < 10; x++) {
                            const isTarget = (x === 9 && y === 9 && z === 9);
                            let px = x * (cubeSize + maxGap);
                            let py = y * (cubeSize + maxGap);
                            let pz = z * (cubeSize + maxGap);

                            if (isTarget) {
                                px += slideFactor;
                                py += slideFactor;
                                pz += slideFactor;
                                drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, 1.0, true);
                            } else {
                                if (fadeAlpha > 0.02) {
                                    drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, fadeAlpha, false);
                                }
                            }
                            renderCubeCount++;
                        }
                    }
                }
                document.getElementById('val-focus-alpha').textContent = "1.00";
                document.getElementById('val-back-alpha').textContent = fadeAlpha.toFixed(2);
            }
            // ----------------------------------------------------
            // 階段 C (45% 到 65%)：原位放大
            // ----------------------------------------------------
            else if (currentProgress > 45 && currentProgress <= 65) {
                const t = (currentProgress - 45) / 20; 
                const currentSize = cubeSize + (240 - cubeSize) * t;

                const currentOriginX = targetScreenPos.x;
                const currentOriginY = targetScreenPos.y;

                drawCube(ctx, 0, 0, 0, currentSize, currentOriginX, currentOriginY, 1.0, true);
                renderCubeCount = 1;

                document.getElementById('val-focus-alpha').textContent = "1.00";
                document.getElementById('val-back-alpha').textContent = "0.00";
            }
            // ----------------------------------------------------
            // 階段 D (65% 到 80%)：細緻劃分
            // ----------------------------------------------------
            else if (currentProgress > 65 && currentProgress <= 80) {
                const t = (currentProgress - 65) / 15; 
                const size = 240;
                
                const currentOriginX = targetScreenPos.x;
                const currentOriginY = targetScreenPos.y;

                drawCube(ctx, 0, 0, 0, size, currentOriginX, currentOriginY, 1.0, true);
                renderCubeCount = 1;

                const pts = {
                    B: getIsoPoint(size, 0, 0, currentOriginX, currentOriginY),
                    C: getIsoPoint(size, size, 0, currentOriginX, currentOriginY),
                    D: getIsoPoint(0, size, 0, currentOriginX, currentOriginY),
                    E: getIsoPoint(0, 0, size, currentOriginX, currentOriginY),
                    F: getIsoPoint(size, 0, size, currentOriginX, currentOriginY),
                    G: getIsoPoint(size, size, size, currentOriginX, currentOriginY),
                    H: getIsoPoint(0, size, size, currentOriginX, currentOriginY)
                };

                const linesCount = 10;
                drawFaceGrid(ctx, pts.D, pts.C, pts.G, pts.H, linesCount, t);
                drawFaceGrid(ctx, pts.B, pts.C, pts.G, pts.F, linesCount, t);
                drawFaceGrid(ctx, pts.E, pts.F, pts.G, pts.H, linesCount, t);
                
                document.getElementById('val-focus-alpha').textContent = "1.00";
                document.getElementById('val-back-alpha').textContent = "0.00";
            }
            // ----------------------------------------------------
            // 階段 E (80% 到 92%)：歸位縮小與群體復原
            // ----------------------------------------------------
            else if (currentProgress > 80 && currentProgress <= 92) {
                const t = (currentProgress - 80) / 12; 
                const currentSize = 240 + (cubeSize - 240) * t; 
                const backAlpha = t * 0.7; 

                for (let z = 0; z < 10; z++) {
                    for (let y = 0; y < 10; y++) {
                        for (let x = 0; x < 10; x++) {
                            const isTarget = (x === 9 && y === 9 && z === 9);
                            if (isTarget) continue;

                            const px = x * (cubeSize + maxGap);
                            const py = y * (cubeSize + maxGap);
                            const pz = z * (cubeSize + maxGap);

                            drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, backAlpha, false);
                            renderCubeCount++;
                        }
                    }
                }

                const currentOriginX = targetScreenPos.x;
                const currentOriginY = targetScreenPos.y;
                drawCube(ctx, 0, 0, 0, currentSize, currentOriginX, currentOriginY, 1.0, true);
                renderCubeCount++;

                const pts = {
                    B: getIsoPoint(currentSize, 0, 0, currentOriginX, currentOriginY),
                    C: getIsoPoint(currentSize, currentSize, 0, currentOriginX, currentOriginY),
                    D: getIsoPoint(0, currentSize, 0, currentOriginX, currentOriginY),
                    E: getIsoPoint(0, 0, currentSize, currentOriginX, currentOriginY),
                    F: getIsoPoint(currentSize, 0, currentSize, currentOriginX, currentOriginY),
                    G: getIsoPoint(currentSize, currentSize, currentSize, currentOriginX, currentOriginY),
                    H: getIsoPoint(0, currentSize, currentSize, currentOriginX, currentOriginY)
                };
                drawFaceGrid(ctx, pts.D, pts.C, pts.G, pts.H, 10, 1.0);
                drawFaceGrid(ctx, pts.B, pts.C, pts.G, pts.F, 10, 1.0);
                drawFaceGrid(ctx, pts.E, pts.F, pts.G, pts.H, 10, 1.0);

                drawCallout(ctx, targetScreenPos.x, targetScreenPos.y, t);

                document.getElementById('val-focus-alpha').textContent = "1.00";
                document.getElementById('val-back-alpha').textContent = backAlpha.toFixed(2);
            }
            // ----------------------------------------------------
            // 階段 F (92% 到 100%)：歸位完工與全螢幕慶祝
            // ----------------------------------------------------
            else if (currentProgress > 92) {
                const backAlpha = 0.75;

                for (let z = 0; z < 10; z++) {
                    for (let y = 0; y < 10; y++) {
                        for (let x = 0; x < 10; x++) {
                            const isTarget = (x === 9 && y === 9 && z === 9);
                            if (isTarget) continue;

                            const px = x * (cubeSize + maxGap);
                            const py = y * (cubeSize + maxGap);
                            const pz = z * (cubeSize + maxGap);

                            drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, backAlpha, false);
                            renderCubeCount++;
                        }
                    }
                }

                const currentOriginX = targetScreenPos.x;
                const currentOriginY = targetScreenPos.y;
                drawCube(ctx, 0, 0, 0, cubeSize, currentOriginX, currentOriginY, 1.0, true);
                renderCubeCount++;

                const pts = {
                    B: getIsoPoint(cubeSize, 0, 0, currentOriginX, currentOriginY),
                    C: getIsoPoint(cubeSize, cubeSize, 0, currentOriginX, currentOriginY),
                    D: getIsoPoint(0, cubeSize, 0, currentOriginX, currentOriginY),
                    E: getIsoPoint(0, 0, cubeSize, currentOriginX, currentOriginY),
                    F: getIsoPoint(cubeSize, 0, cubeSize, currentOriginX, currentOriginY),
                    G: getIsoPoint(cubeSize, cubeSize, cubeSize, currentOriginX, currentOriginY),
                    H: getIsoPoint(0, cubeSize, cubeSize, currentOriginX, currentOriginY)
                };
                drawFaceGrid(ctx, pts.D, pts.C, pts.G, pts.H, 10, 1.0);
                drawFaceGrid(ctx, pts.B, pts.C, pts.G, pts.F, 10, 1.0);
                drawFaceGrid(ctx, pts.E, pts.F, pts.G, pts.H, 10, 1.0);

                drawCallout(ctx, targetScreenPos.x, targetScreenPos.y, 1.0);

                if (currentProgress >= 99 && !hasConfettiTriggered) {
                    triggerConfetti(targetScreenPos.x - 50, targetScreenPos.y - 100);
                    hasConfettiTriggered = true;
                }
                
                document.getElementById('val-focus-alpha').textContent = "1.00";
                document.getElementById('val-back-alpha').textContent = backAlpha.toFixed(2);
            }
        }

        // 右上氣泡框拉引 (完全解決左下遮蔽與切角 Bug)
        function drawCallout(context, tx, ty, alpha) {
            context.save();
            context.globalAlpha = alpha;

            const startX = tx + 30;
            const startY = ty - 10;
            const midX = startX + 50;
            const midY = startY - 60; 
            const endX = midX + 60;

            context.strokeStyle = '#E53E3E';
            context.lineWidth = 3;
            context.beginPath();
            context.moveTo(startX, startY);
            context.lineTo(midX, midY);
            context.lineTo(endX, midY);
            context.stroke();

            context.fillStyle = '#E53E3E';
            context.beginPath();
            context.arc(startX, startY, 5, 0, Math.PI * 2);
            context.fill();

            const bubbleW = 380;
            const bubbleH = 80;
            const bx = endX;
            const by = midY - bubbleH / 2;

            context.fillStyle = '#FFF5F5';
            context.strokeStyle = '#FEB2B2';
            context.lineWidth = 3;
            
            context.beginPath();
            context.roundRect(bx, by, bubbleW, bubbleH, 12);
            context.fill();
            context.stroke();

            context.fillStyle = '#C53030';
            context.font = 'bold 18px "Noto Sans TC", sans-serif';
            context.textAlign = 'left';
            
            context.fillText('這顆切滿 1000 個小格子的中方塊，', bx + 15, by + 32);
            context.fillText(`只是這 1000 個中方塊裡的 1 個！`, bx + 15, by + 58);

            context.restore();
        }

        // --- 5. 實時 UI 與動態公式排版同步 ---
        const labelPhase = document.getElementById('txt-animation-phase');
        const cardTitle = document.getElementById('math-card-title');
        const formulaContainer = document.getElementById('math-formula');

        // 當步驟改變時，自動同步更新公式與文案
        function updateDOMUIByStep() {
            // 更新下方步驟指示圓點
            const dots = document.querySelectorAll('.step-dot');
            dots.forEach((dot, idx) => {
                if (idx === currentStepIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });

            // 依據當前步驟 Index 顯示對應引導
            switch(currentStepIndex) {
                case 0:
                    labelPhase.textContent = `步驟 1 / 6：正在將 ${questionVolume} m³ 切割為中型方塊`;
                    labelPhase.style.color = '#3182CE';
                    cardTitle.textContent = `第一步：拆成 10 cm 中方塊`;
                    formulaContainer.innerHTML = `
                        <span>${questionVolume} m<sup>3</sup> 體積</span>
                        <span>=</span>
                        <span style="color: #3182CE;">1000 個 10 cm 中方塊</span>
                    `;
                    hasConfettiTriggered = false;
                    break;
                case 1:
                    labelPhase.textContent = '步驟 2 / 6：抽出其中 1 個 10 cm 立方體進行觀察';
                    labelPhase.style.color = '#ED64A6';
                    cardTitle.textContent = '第二步：抽出 1 份代表觀察';
                    formulaContainer.innerHTML = `
                        <span>仔細看 1000 個裡的這 1 個：</span>
                        <br>
                        <span style="font-size: 24px; color: #ED64A6;">邊長 = 10 公分 (cm)</span>
                    `;
                    break;
                case 2:
                    labelPhase.textContent = '步驟 3 / 6：原位放大這顆 10 cm 立方體';
                    labelPhase.style.color = '#D69E2E';
                    cardTitle.textContent = '準備揭曉中方塊的秘密...';
                    formulaContainer.innerHTML = `
                        <span>這顆 10 cm 的中方塊</span>
                        <br>
                        <span style="font-size: 24px; color: #D69E2E;">放大中，看它能被切成幾格？</span>
                    `;
                    break;
                case 3:
                    labelPhase.textContent = '步驟 4 / 6：切開了！這 1 個中方塊內含 1000 個小立方公分';
                    labelPhase.style.color = '#E53E3E';
                    cardTitle.textContent = '第三步：1 個中方塊包含 1000 格！';
                    formulaContainer.innerHTML = `
                        <span>1 個中方塊</span>
                        <span>=</span>
                        <span>10 cm × 10 cm × 10 cm</span>
                        <span>=</span>
                        <span style="color: #E53E3E;">1000 個 1 cm<sup>3</sup> 小格子</span>
                    `;
                    hasConfettiTriggered = false;
                    break;
                case 4:
                    labelPhase.textContent = `步驟 5 / 6：原位縮小對照，這疊原本一共有 1000 個！`;
                    labelPhase.style.color = '#D69E2E';
                    cardTitle.textContent = '第四步：放回群體，驚人對比！';
                    formulaContainer.innerHTML = `
                        <span>1 個中方塊 = 1000 個小格子</span>
                        <br>
                        <span style="font-size: 22px; color: #2B6CB0;">而這整疊大方塊有 1000 個中方塊！</span>
                    `;
                    hasConfettiTriggered = false;
                    break;
                case 5:
                    labelPhase.textContent = '步驟 6 / 6：百萬倍二階段分裂圓滿成功！';
                    labelPhase.style.color = '#38A169';
                    cardTitle.textContent = '第五步：終極百萬倍率換算公式';
                    
                    const finalCubicCm = (1000000 * questionVolume).toLocaleString();
                    formulaContainer.innerHTML = `
                        <span style="font-size: 24px; color: #4A5568;">1000 × 1000 (每個切1000格) =</span>
                        <br>
                        <span style="color: #48BB78; font-size: 42px; font-weight: 900;">${finalCubicCm} cm<sup>3</sup></span>
                    `;
                    break;
            }

            // 動態禁用邊界導航按鈕
            document.getElementById('btn-prev').disabled = (currentStepIndex === 0);
            document.getElementById('btn-next').textContent = (currentStepIndex === 5) ? '挑戰完成 🎉' : '下一步 ▶';
        }

        // --- 6. 步驟插值平滑物理動畫過渡器 (Tween Loop) ---
        function mainLoop() {
            ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

            // A. 繪製背景格線
            ctx.strokeStyle = 'rgba(190, 227, 248, 0.35)';
            ctx.lineWidth = 2;
            for (let i = 0; i < BASE_WIDTH; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, BASE_HEIGHT); ctx.stroke();
            }
            for (let j = 0; j < BASE_HEIGHT; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(BASE_WIDTH, j); ctx.stroke();
            }

            // B. 步驟插值平滑过渡
            const targetProgress = STEP_PROGRESS_TARGETS[currentStepIndex];
            const diff = targetProgress - currentProgress;
            
            if (Math.abs(diff) > 0.05) {
                currentProgress += diff * 0.08;
            } else {
                currentProgress = targetProgress;
            }

            // C. 渲染幾何主體
            renderMultiStageVolume();

            // D. 物理碎紙花粒子更新
            for (let i = confettiList.length - 1; i >= 0; i--) {
                const particle = confettiList[i];
                particle.update();
                particle.draw(ctx);
                if (particle.alpha <= 0) {
                    confettiList.splice(i, 1);
                }
            }

            // 同步更新偵錯面板
            document.getElementById('val-progress').textContent = currentProgress.toFixed(2);
            document.getElementById('val-draw-count').textContent = renderCubeCount;

            requestAnimationFrame(mainLoop);
        }

        // --- 7. 手勢與步驟導覽事件綁定 (極致流暢觸控) ---
        const prevBtn = document.getElementById('btn-prev');
        const nextBtn = document.getElementById('btn-next');

        const goNext = (e) => {
            e.preventDefault();
            if (currentStepIndex < 5) {
                currentStepIndex++;
                updateDOMUIByStep();
            } else {
                triggerConfetti(640, 240);
            }
        };

        const goPrev = (e) => {
            e.preventDefault();
            if (currentStepIndex > 0) {
                currentStepIndex--;
                updateDOMUIByStep();
            }
        };

        nextBtn.addEventListener('touchstart', goNext);
        nextBtn.addEventListener('click', goNext);
        prevBtn.addEventListener('touchstart', goPrev);
        prevBtn.addEventListener('click', goPrev);

        document.getElementById('btn-toggle-debug').addEventListener('click', (e) => {
            document.getElementById('debug-panel').classList.toggle('collapsed');
        });

        // 初始化
        window.addEventListener('resize', updateLayout);
        window.addEventListener('orientationchange', () => {
            setTimeout(updateLayout, 200);
        });

        canvas.width = BASE_WIDTH;
        canvas.height = BASE_HEIGHT;
        updateLayout();
        updateDOMUIByStep();
        mainLoop();

    </script>
</body>
