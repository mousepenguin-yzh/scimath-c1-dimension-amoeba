<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>國二數理挑戰 - 獨立遊戲模組 (步驟三)</title>
    <!-- 引入日系可愛圓體與英文 Fredoka 圓體 -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 基礎重設，避免全域滾動條 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #2c2a29; /* 深色沉穩底色，更能襯托馬卡龍色系遊戲視窗 */
            font-family: 'Zen Maru Gothic', 'Fredoka', 'Microsoft JhengHei', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 外層絕對置中容器：使用純 CSS Flexbox 進行絕對置中 */
        #game-container-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ==========================================================================
           【CSS 隔離】所有遊戲核心樣式均在 #game-viewport 命名空間下
           ========================================================================== */
        #game-viewport {
            width: 1280px;
            height: 720px;
            background-color: #FDFBF7; /* 馬卡龍舒壓奶油底色 */
            transform-origin: center center; /* 縮放中心點在字卡正中央 */
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px; /* 稍微縮小上下 padding，給內部元件更多空間 */
            box-sizing: border-box;
            transition: background-color 0.4s ease, transform 0.1s ease;
        }

        /* 頂部資訊區 */
        #game-viewport .header-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        /* 馬卡龍粉紅主題徽章 */
        #game-viewport .level-badge {
            background-color: #FFB7B2; /* 櫻花粉 */
            color: #5D4037;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 6px 0 #FF9E96;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        /* 馬卡龍薄荷綠資訊欄 */
        #game-viewport .status-info {
            background-color: #B5EAD7; /* 薄荷綠 */
            color: #2E5A44;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 6px 0 #92D3BC;
            display: flex;
            gap: 20px;
        }

        #game-viewport .status-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* ==========================================================================
           【3D 雙面字卡流】外層
           ========================================================================== */
        #game-viewport .center-card-flow {
            width: 90%;
            height: 500px; /* 調增高度以容納自製鍵盤 */
            margin: 15px 0;
            perspective: 1500px;
            position: relative;
        }

        /* 3D 旋轉內膽 */
        #game-viewport .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        /* 當啟動 flipped 狀態時，整張卡片旋轉 180 度 */
        #game-viewport .center-card-flow.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        /* 卡片正面與背面的共有基礎樣式 */
        #game-viewport .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 32px;
            padding: 24px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* ------------------ 【狀態 A】正面：解題畫面 ------------------ */
        #game-viewport .card-front {
            background: #FFFFFF;
            border: 4px solid #FFDAC1; /* 暖橘邊框 */
            box-shadow: 0 12px 0 #FCD1B4, 0 16px 30px rgba(0, 0, 0, 0.05);
            transform: rotateY(0deg);
        }

        #game-viewport .card-front.correct-flash {
            animation: correct-glow-pulse 0.5s ease-out;
        }
        @keyframes correct-glow-pulse {
            0% { border-color: #FFDAC1; box-shadow: 0 0 0px #B5EAD7; }
            50% { border-color: #69F0AE; box-shadow: 0 0 30px #69F0AE; }
            100% { border-color: #FFDAC1; box-shadow: 0 12px 0 #FCD1B4; }
        }

        #game-viewport .card-front.error-shake {
            animation: error-shake-move 0.5s ease-in-out;
        }
        @keyframes error-shake-move {
            0%, 100% { transform: translateX(0); border-color: #FFDAC1; }
            20%, 60% { transform: translateX(-10px); border-color: #FFB7B2; }
            40%, 80% { transform: translateX(10px); border-color: #FFB7B2; }
        }

        #game-viewport .front-title {
            color: #8D6E63;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        #game-viewport .question-box {
            font-size: 44px; /* 稍調大，呈現更強的視覺焦點 */
            font-weight: 700;
            color: #5D4037;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        /* 答題互動控制區 (包含輸入顯示與控制鈕) */
        #game-viewport .input-and-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: center;
            margin-bottom: 5px;
        }

        #game-viewport .answer-input {
            width: 250px;
            height: 54px;
            border: 4px solid #FFDAC1;
            border-radius: 16px;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            color: #5D4037;
            outline: none;
            background-color: #FFFDFB;
            caret-color: #FF9E96; /* 游標呈粉紅色 */
        }

        #game-viewport .btn-control {
            height: 54px;
            padding: 0 20px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        #game-viewport .btn-submit {
            background-color: #B5EAD7;
            color: #2E5A44;
            box-shadow: 0 5px 0 #92D3BC;
        }
        #game-viewport .btn-submit:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #92D3BC;
        }

        #game-viewport .btn-hint {
            background-color: #FFDAC1;
            color: #8D6E63;
            box-shadow: 0 5px 0 #E2B695;
        }
        #game-viewport .btn-hint:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #E2B695;
        }

        #game-viewport .btn-clear-input {
            background-color: #FFE0B2;
            color: #EF6C00;
            box-shadow: 0 5px 0 #F5C68A;
        }
        #game-viewport .btn-clear-input:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #F5C68A;
        }

        /* 答對時的「下一題」覆蓋彈出層，電玩感十足 */
        #game-viewport .next-question-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            display: none; /* 預設隱藏 */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop-in {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #game-viewport .overlay-title {
            font-size: 36px;
            color: #2E5A44;
            font-weight: 700;
            margin-bottom: 10px;
        }

        #game-viewport .overlay-desc {
            font-size: 18px;
            color: #616161;
            margin-bottom: 25px;
            font-weight: 600;
        }

        #game-viewport .btn-next-level {
            height: 60px;
            padding: 0 50px;
            background-color: #B5EAD7;
            color: #2E5A44;
            border: none;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 0 #92D3BC;
            transition: all 0.1s ease;
        }
        #game-viewport .btn-next-level:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #92D3BC;
        }

        /* ==========================================================================
           【自製馬卡龍專屬數字鍵盤】
           ========================================================================== */
        #game-viewport .custom-keyboard {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* 2x6 的扁平化極簡鍵盤，完美融入 16:9 空間 */
            gap: 8px;
            width: 100%;
            max-width: 540px;
            margin-top: 5px;
        }

        #game-viewport .key-btn {
            background-color: #F5EBE6; /* 溫潤淡米色 */
            border: none;
            border-radius: 12px;
            height: 54px;
            font-family: 'Fredoka', sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: #5D4037;
            cursor: pointer;
            box-shadow: 0 4px 0 #D7CCC8;
            transition: all 0.05s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-viewport .key-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #D7CCC8;
            background-color: #EFE5E0;
        }

        /* 退格鍵採用馬卡龍警示紅 */
        #game-viewport .key-btn.backspace {
            background-color: #FFD1D1;
            color: #C62828;
            box-shadow: 0 4px 0 #EAB2B2;
            font-size: 22px;
        }
        #game-viewport .key-btn.backspace:active {
            background-color: #FBC2C2;
            box-shadow: 0 2px 0 #EAB2B2;
        }

        /* 小數點鍵採用馬卡龍薄荷綠 */
        #game-viewport .key-btn.decimal {
            background-color: #E8D7FF;
            color: #5E35B1;
            box-shadow: 0 4px 0 #D1B3FF;
            font-weight: 700;
        }
        #game-viewport .key-btn.decimal:active {
            background-color: #DCD0FF;
            box-shadow: 0 2px 0 #D1B3FF;
        }

        /* ------------------ 【狀態 B】背面：原理說明畫面 ------------------ */
        #game-viewport .card-back {
            background: #FFFFFF;
            border: 4px solid #B5EAD7;
            box-shadow: 0 12px 0 #92D3BC, 0 16px 30px rgba(0, 0, 0, 0.05);
            transform: rotateY(180deg);
        }

        #game-viewport .back-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed #E0F2F1;
            padding-bottom: 10px;
        }

        #game-viewport .back-title {
            color: #00796B;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #game-viewport .back-explanation-content {
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }

        #game-viewport .back-highlight {
            font-size: 24px;
            font-weight: 700;
            color: #C62828;
            margin-bottom: 8px;
        }

        #game-viewport .back-text {
            font-size: 16px;
            color: #5D4037;
            line-height: 1.5;
            margin: 0 0 10px 0;
            font-weight: 600;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
            background: #FDFBF7;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #FFF3E0;
        }

        #game-viewport .svg-illustration-placeholder {
            width: 100%;
            height: 130px;
            background-color: #F5F5F5;
            border-radius: 16px;
            border: 2px dashed #BCAAA4;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #8D6E63;
            font-weight: 700;
            font-size: 16px;
        }

        #game-viewport .btn-retry {
            width: 100%;
            height: 52px;
            background-color: #FFB7B2;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            color: #5D4037;
            cursor: pointer;
            box-shadow: 0 6px 0 #FF9E96;
            transition: all 0.1s ease;
        }

        #game-viewport .btn-retry:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #FF9E96;
        }

        /* 頁尾版權標記 */
        #game-viewport .footer-tag {
            color: #BCAAA4;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 1px;
            z-index: 10;
        }

        /* ==========================================================================
           【直螢幕防呆遮罩】與遊戲 viewport 隔離
           ========================================================================== */
        #orientation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFB7B2;
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #5D4037;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #orientation-overlay .phone-icon-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
        }

        #orientation-overlay .phone-svg {
            width: 100%;
            height: 100%;
            fill: #5D4037;
            animation: rotate-phone 2s infinite ease-in-out;
        }

        @keyframes rotate-phone {
            0% { transform: rotate(0deg); }
            40% { transform: rotate(-90deg); }
            70% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        #orientation-overlay h2 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 15px 0;
        }

        #orientation-overlay p {
            font-size: 20px;
            margin: 0;
            opacity: 0.9;
            font-weight: 600;
        }

        /* 媒體查詢：當處於直式螢幕或高度過長時顯示遮罩 */
        @media (orientation: portrait) {
            #orientation-overlay {
                display: flex;
            }
        }

        /* ==========================================================================
           【右下角橘色測試遙控器】（僅在 window === top 獨立測試時渲染）
           ========================================================================== */
        #test-remote-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: linear-gradient(135deg, #FF9E2A 0%, #E65100 100%);
            border: 4px solid #FFF;
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10000;
            color: #FFFFFF;
            display: none;
        }

        #test-remote-panel h3 {
            margin: 0 0 15px 0;
            font-size: 18px;
            text-align: center;
            border-bottom: 2px dashed rgba(255,255,255,0.4);
            padding-bottom: 8px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        #test-remote-panel .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.15);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        #test-remote-panel .led-light {
            display: inline-block;
            width: 14px;
            height: 14px;
            background-color: #69F0AE;
            border-radius: 50%;
            box-shadow: 0 0 12px #69F0AE;
        }

        #test-remote-panel .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        #test-remote-panel .remote-btn {
            background-color: #FFF;
            color: #E65100;
            border: none;
            padding: 8px 10px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 0 #B33D00;
            transition: all 0.1s;
        }

        #test-remote-panel .remote-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        #test-remote-panel .log-box {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            max-height: 80px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <!-- 遊戲整體置中包裝 -->
    <div id="game-container-wrapper">
        
        <!-- 【CSS隔離主容器】遊戲本體視界 (16:9 鎖定) -->
        <div id="game-viewport">
            
            <!-- 頂部資訊欄 -->
            <div class="header-bar">
                <div class="level-badge" id="level-badge-container">
                    <span>🏆</span>
                    <span id="display-level">挑戰關卡：LV.1</span>
                </div>
                <div class="status-info">
                    <span class="status-item">❤️ 生命值: <span id="display-hearts">3</span>/3</span>
                    <span class="status-item">⭐ Combo: <span id="display-combo">0</span></span>
                </div>
            </div>

            <!-- 【步驟二/三核心】單一主要字卡區 (3D 旋轉視角外層) -->
            <div class="center-card-flow" id="main-card-flow">
                <div class="flip-card-inner">
                    
                    <!-- 【狀態 A】卡片正面：解題畫面 -->
                    <div class="card-face card-front" id="card-front-face">
                        
                        <!-- 答對時彈出的高質感「下一題」互動層 -->
                        <div class="next-question-overlay" id="success-overlay">
                            <div class="overlay-title">🎉 答對了！太厲害了</div>
                            <div class="overlay-desc" id="success-overlay-desc">完美完成此次空間維度轉換！</div>
                            <button class="btn-next-level" onclick="GameModule.loadNewQuestion()">挑戰下一題 ➔</button>
                        </div>

                        <div class="front-title">空間維度與單位變形蟲</div>
                        
                        <!-- 隨機題目渲染區 (使用標準 sup 標籤) -->
                        <div class="question-box" id="question-text">
                            <!-- 題目將由 JavaScript 演算法隨機渲染 -->
                            載入題目中...
                        </div>
                        
                        <!-- 輸入與操作按鈕 -->
                        <div class="input-and-controls">
                            <input type="text" class="answer-input" id="player-input" placeholder="請使用下方鍵盤作答" inputmode="none" readonly autocomplete="off">
                            <button class="btn-control btn-submit" onclick="GameModule.submitAnswer()">送出</button>
                            <button class="btn-control btn-clear-input" onclick="GameModule.pressKey('C')">清除</button>
                            <button class="btn-control btn-hint" onclick="GameModule.flipToB('hint')">提示</button>
                        </div>

                        <!-- 自製對稱馬卡龍 2 x 6 果凍鍵盤 (新增小數點鍵) -->
                        <div class="custom-keyboard">
                            <button class="key-btn" onclick="GameModule.pressKey('1')">1</button>
                            <button class="key-btn" onclick="GameModule.pressKey('2')">2</button>
                            <button class="key-btn" onclick="GameModule.pressKey('3')">3</button>
                            <button class="key-btn" onclick="GameModule.pressKey('4')">4</button>
                            <button class="key-btn" onclick="GameModule.pressKey('5')">5</button>
                            <button class="key-btn backspace" onclick="GameModule.pressKey('⌫')">⌫</button>

                            <button class="key-btn" onclick="GameModule.pressKey('6')">6</button>
                            <button class="key-btn" onclick="GameModule.pressKey('7')">7</button>
                            <button class="key-btn" onclick="GameModule.pressKey('8')">8</button>
                            <button class="key-btn" onclick="GameModule.pressKey('9')">9</button>
                            <button class="key-btn" onclick="GameModule.pressKey('0')">0</button>
                            <button class="key-btn decimal" onclick="GameModule.pressKey('.')">.</button>
                        </div>
                    </div>
                    
                    <!-- 【狀態 B】卡片背面：原理說明畫面 -->
                    <div class="card-face card-back">
                        <div class="back-header">
                            <div class="back-title">
                                <span>💡</span>
                                <span id="back-title-text">原理與維度解析</span>
                            </div>
                            <div style="font-weight:700; color:#00796B;" id="explanation-source">由提示點擊觸發</div>
                        </div>
                        
                        <!-- 依據當下隨機出題，自動生成的文字解說內容 -->
                        <div class="back-explanation-content">
                            <div class="back-highlight" id="explanation-highlight">長與寬各放大 100 倍！</div>
                            <div class="back-text" id="explanation-body">
                                載入解析中...
                            </div>
                            <!-- 幾何圖形 placeholder，步驟四將在此繪製原生動態 SVG -->
                            <div class="svg-illustration-placeholder" id="svg-container">
                                🎨 [極簡 SVG 比例圖 預留位置 - 步驟四實作]
                            </div>
                        </div>
                        
                        <!-- 返回大按鈕 -->
                        <button class="btn-retry" onclick="GameModule.flipToA()">返回挑戰，我再想想！</button>
                    </div>

                </div>
            </div>

            <!-- 底部裝飾與版權資訊 -->
            <div class="footer-tag">
                SPACE DIMENSION & UNIT CHALLENGE v1.0
            </div>

        </div>

    </div>

    <!-- 直螢幕防呆警告遮罩 -->
    <div id="orientation-overlay">
        <div class="phone-icon-wrapper">
            <svg class="phone-svg" viewBox="0 0 24 24">
                <path d="M17,19H7V5H17M17,1H7C5.89,1 5,1.89 5,3V21C5,22.1 5.9,23 7,23H17C18.1,23 19,22.1 19,21V3C19,1.89 18.1,1 17,1Z"/>
            </svg>
        </div>
        <h2>請旋轉螢幕以獲得最佳遊戲體驗</h2>
        <p>本挑戰賽專為橫螢幕大字卡模式設計</p>
    </div>

    <!-- 獨立開發專用：橘色測試遙控器 -->
    <div id="test-remote-panel">
        <h3>測試遙控器 (隨機演算法驗證)</h3>
        <div class="status-row">
            <span>連線狀態：已自動廣播</span>
            <div class="led-light"></div>
        </div>
        <div class="btn-grid">
            <button class="remote-btn" onclick="GameModule.changeLevelAndRestart(1)">切換：第 1 關 (面積)</button>
            <button class="remote-btn" onclick="GameModule.changeLevelAndRestart(2)">切換：第 2 關 (體積)</button>
            <button class="remote-btn" onclick="GameModule.changeLevelAndRestart(3)">切換：第 3 關 (容積)</button>
            <button class="remote-btn" onclick="GameModule.changeLevelAndRestart(4)">切換：第 4 關 (微觀)</button>
            <button class="remote-btn" onclick="GameModule.changeLevelAndRestart(5)">切換：第 5 關 (複合)</button>
            <button class="remote-btn" style="background-color: #E65100; color:#fff;" onclick="GameModule.loadNewQuestion()">手動：隨機換一題</button>
            <button class="remote-btn" onclick="GameModule.showCheatAnswer()" style="grid-column: span 2; background-color: #ECEFF1; color:#37474F;">顯示：當前題目解答</button>
        </div>
        <div class="log-box" id="remote-log">
            步驟三隨機題庫演算法啟動。
        </div>
    </div>

    <!-- ==========================================================================
         【JS 隔離】所有遊戲變數與行為均在命名空間 GameModule 內
         ========================================================================== -->
    <script>
        const GameModule = {
            baseWidth: 1280,
            baseHeight: 720,
            
            // 核心賽局與狀態
            currentLevel: 1,
            hearts: 3,
            combo: 0,
            isFlipped: false,
            
            // 步驟三核心：保存當下隨機生成的題目資料
            currentQuestion: {
                questionText: "",
                correctAnswer: "",
                explanationHighlight: "",
                explanationText: ""
            },

            init() {
                this.setupRWD();
                this.setupCommunication();
                this.checkStandalone();

                window.addEventListener('resize', () => this.setupRWD());
                window.addEventListener('orientationchange', () => {
                    setTimeout(() => this.setupRWD(), 100);
                });

                // 首次加載隨機題目
                this.loadNewQuestion();
            },

            setupRWD() {
                const viewport = document.getElementById('game-viewport');
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                const scale = Math.min(windowWidth / this.baseWidth, windowHeight / this.baseHeight);
                viewport.style.transform = `scale(${scale})`;
            },

            setupCommunication() {
                parent.postMessage({ type: 'GAME_READY', challengeId: 1 }, '*');
                
                window.addEventListener('message', (event) => {
                    const data = event.data;
                    if (data && data.type === 'START_GAME') {
                        this.logToRemote(`接收父視窗指定啟動: LV.${data.config.level}`);
                        this.changeLevelAndRestart(data.config.level);
                    }
                });
            },

            checkStandalone() {
                if (window === top) {
                    document.getElementById('test-remote-panel').style.display = 'block';
                }
            },

            // ------------------ 【步驟三核心：LV.1 ~ LV.5 隨機出題演算法】 ------------------
            generateRandomQuestion(level) {
                let questionText = "";
                let correctAnswer = "";
                let explanationHighlight = "";
                let explanationText = "";

                switch(level) {
                    case 1: {
                        // 二維面積換算 (m² <-> cm²，倍率 10000)
                        const isForward = Math.random() < 0.5;
                        const vals = [0.5, 1, 1.5, 2, 4, 5, 8, 10, 12, 0.05];
                        const val = vals[Math.floor(Math.random() * vals.length)];
                        
                        if (isForward) {
                            questionText = `${val} m<sup>2</sup> = ? cm<sup>2</sup>`;
                            correctAnswer = (val * 10000).toString();
                            explanationHighlight = "長與寬各放大 100 倍！";
                            explanationText = `二維面積（平方）換算時，長度和寬度都要進行換算。<br>因為 1 m = 100 cm，所以面積放大倍數為：100 × 100 = 10,000 倍。<br><br>算式：${val} × 10,000 = ${correctAnswer} cm<sup>2</sup>`;
                        } else {
                            const cmVal = val * 10000;
                            questionText = `${cmVal} cm<sup>2</sup> = ? m<sup>2</sup>`;
                            correctAnswer = val.toString();
                            explanationHighlight = "逆向換算：從 cm<sup>2</sup> 換回 m<sup>2</sup>！";
                            explanationText = `從小單位（cm<sup>2</sup>）換算為大單位（m<sup>2</sup>）時，數值要除以換算倍率。<br>因為 1 m<sup>2</sup> = 10,000 cm<sup>2</sup>。<br><br>算式：${cmVal} ÷ 10,000 = ${correctAnswer} m<sup>2</sup>`;
                        }
                        break;
                    }
                    case 2: {
                        // 三維體積換算 (m³ <-> cm³，倍率 1,000,000)
                        const isForward = Math.random() < 0.5;
                        const vals = [0.1, 0.5, 1, 1.5, 2, 0.05, 0.25];
                        const val = vals[Math.floor(Math.random() * vals.length)];
                        
                        if (isForward) {
                            questionText = `${val} m<sup>3</sup> = ? cm<sup>3</sup>`;
                            correctAnswer = (val * 1000000).toString();
                            explanationHighlight = "長、寬、高各放大 100 倍！";
                            explanationText = `三維體積（立方）換算時，長度、寬度與高度都要進行換算。<br>1 m<sup>3</sup> 先拆為 1,000 個中方塊（分米），1 個中方塊再拆為 1,000 個小方塊（公分）。<br>所以體積放大倍數為：100 × 100 × 100 = 1,000,000 倍（一百萬）。<br><br>算式：${val} × 1,000,000 = ${correctAnswer} cm<sup>3</sup>`;
                        } else {
                            const cmVal = val * 1000000;
                            questionText = `${cmVal} cm<sup>3</sup> = ? m<sup>3</sup>`;
                            correctAnswer = val.toString();
                            explanationHighlight = "逆向換算：從 cm<sup>3</sup> 換回 m<sup>3</sup>！";
                            explanationText = `從小單位換算為大單位時，數值要除以一百萬（除以 1,000,000）。<br>因為 1 m<sup>3</sup> = 1,000,000 cm<sup>3</sup>。<br><br>算式：${cmVal} ÷ 1,000,000 = ${correctAnswer} m<sup>3</sup>`;
                        }
                        break;
                    }
                    case 3: {
                        // 容積與體積 (L、mL、cm³ 跨界轉換)
                        const type = Math.floor(Math.random() * 4);
                        if (type === 0) {
                            // L -> cm³ (倍率 1000)
                            const vals = [0.5, 1, 1.5, 2, 3.5, 5];
                            const val = vals[Math.floor(Math.random() * vals.length)];
                            questionText = `${val} L = ? cm<sup>3</sup>`;
                            correctAnswer = (val * 1000).toString();
                            explanationHighlight = "公升(L) 與 立方公分(cm³) 的橋樑！";
                            explanationText = `關鍵核心記憶點：<b>1 mL（毫升）完全等價於 1 cm<sup>3</sup>（立方公分）</b>。<br>因為 1 L = 1,000 mL，所以 1 L 也就等於 1,000 cm<sup>3</sup>。<br><br>算式：${val} × 1,000 = ${correctAnswer} cm<sup>3</sup>`;
                        } else if (type === 1) {
                            // cm³ -> L
                            const vals = [500, 1000, 1500, 2000, 3000, 5000];
                            const val = vals[Math.floor(Math.random() * vals.length)];
                            questionText = `${val} cm<sup>3</sup> = ? L`;
                            correctAnswer = (val / 1000).toString();
                            explanationHighlight = "立方公分(cm³) 換算回 公升(L)！";
                            explanationText = `從小單位換算回大單位：1,000 cm<sup>3</sup> = 1 L。<br>因此將數值除以 1,000 即可。<br><br>算式：${val} ÷ 1,000 = ${correctAnswer} L`;
                        } else if (type === 2) {
                            // mL -> cm³ (等值轉換)
                            const val = Math.floor(Math.random() * 450) + 50;
                            questionText = `${val} mL = ? cm<sup>3</sup>`;
                            correctAnswer = val.toString();
                            explanationHighlight = "毫升(mL) 與 立方公分(cm³) 完全等價！";
                            explanationText = `黃金記憶法：<b>1 mL = 1 cm<sup>3</sup></b>。<br>液體的容積單位「毫升」與固體的體積單位「立方公分」大小是完全一模一樣的！數值直接帶入即可，不需任何乘除！<br><br>算式：${val} mL = ${correctAnswer} cm<sup>3</sup>`;
                        } else {
                            // cm³ -> mL (等值轉換)
                            const val = Math.floor(Math.random() * 450) + 50;
                            questionText = `${val} cm<sup>3</sup> = ? mL`;
                            correctAnswer = val.toString();
                            explanationHighlight = "立方公分(cm³) 與 毫升(mL) 完全等價！";
                            explanationText = `兩者是完全相等的等價值。實驗室中最常進行此轉換，直接填寫同等數字即可。<br><br>算式：${val} cm<sup>3</sup> = ${correctAnswer} mL`;
                        }
                        break;
                    }
                    case 4: {
                        // 微觀尺度 (mm, µm, nm 跳階與連續千倍換算)
                        const type = Math.floor(Math.random() * 5);
                        const vals = [0.5, 1, 1.5, 2, 3, 5, 8, 10, 0.05];
                        const val = vals[Math.floor(Math.random() * vals.length)];
                        
                        if (type === 0) {
                            // mm -> µm (1 mm = 1000 µm)
                            questionText = `${val} mm = ? &mu;m`;
                            correctAnswer = (val * 1000).toString();
                            explanationHighlight = "公厘(mm) 換算為 微米(&mu;m)";
                            explanationText = `微觀世界長度階梯中，每跨一步就是 1,000 倍。<br>1 mm = 1,000 &mu;m（微米）。所以大單位換小單位要乘以 1,000。<br><br>算式：${val} × 1,000 = ${correctAnswer} &mu;m`;
                        } else if (type === 1) {
                            // µm -> nm (1 µm = 1000 nm)
                            questionText = `${val} &mu;m = ? nm`;
                            correctAnswer = (val * 1000).toString();
                            explanationHighlight = "微米(&mu;m) 換算為 奈米(nm)";
                            explanationText = `微(微米)和奈(奈米)都是千倍魔王，跨一步要放大 1,000 倍！<br>1 &mu;m = 1,000 nm（奈米）。<br><br>算式：${val} × 1,000 = ${correctAnswer} nm`;
                        } else if (type === 2) {
                            // mm -> nm (連續跨兩步，倍率 1,000,000)
                            const cleanVal = val === 0.05 ? 0.1 : val; // 避免數值太小
                            questionText = `${cleanVal} mm = ? nm`;
                            correctAnswer = (cleanVal * 1000000).toString();
                            explanationHighlight = "連跳兩階！公厘(mm) 直通 奈米(nm)";
                            explanationText = `因為連續跨兩步（公厘 ➔ 微米 ➔ 奈米），要乘以 1,000 再乘以 1,000，也就是放大一百萬倍（1,000,000）！<br><br>算式：${cleanVal} × 1,000,000 = ${correctAnswer} nm`;
                        } else if (type === 3) {
                            // µm -> mm
                            const mVal = val * 1000;
                            questionText = `${mVal} &mu;m = ? mm`;
                            correctAnswer = val.toString();
                            explanationHighlight = "逆向換算：微米(&mu;m) 換回 公厘(mm)";
                            explanationText = `從小單位換回大單位，數值要縮小 1,000 倍（除以 1,000）。<br>1,000 &mu;m = 1 mm。<br><br>算式：${mVal} ÷ 1,000 = ${correctAnswer} mm`;
                        } else {
                            // nm -> µm
                            const nVal = val * 1000;
                            questionText = `${nVal} nm = ? &mu;m`;
                            correctAnswer = val.toString();
                            explanationHighlight = "逆向換算：奈米(nm) 換回 微米(&mu;m)";
                            explanationText = `從極細小的奈米換回微米，數值除以 1,000。<br>1,000 nm = 1 &mu;m。<br><br>算式：${nVal} ÷ 1,000 = ${correctAnswer} &mu;m`;
                        }
                        break;
                    }
                    case 5: {
                        // 複合單位 (密度或速度拆解)
                        const isDensity = Math.random() < 0.5;
                        if (isDensity) {
                            const isForward = Math.random() < 0.5;
                            const densities = [
                                { name: "純水", g: 1, kg: 1000 },
                                { name: "酒精", g: 0.8, kg: 800 },
                                { name: "金屬鋁", g: 2.7, kg: 2700 },
                                { name: "金屬鐵", g: 7.8, kg: 7800 },
                                { name: "水銀", g: 13.6, kg: 13600 }
                            ];
                            const item = densities[Math.floor(Math.random() * densities.length)];
                            if (isForward) {
                                questionText = `${item.g} g/cm<sup>3</sup> = ? kg/m<sup>3</sup>`;
                                correctAnswer = item.kg.toString();
                                explanationHighlight = "密度換算：分子與分母獨立拆開！";
                                explanationText = `<b>g/cm<sup>3</sup> 換算為 kg/m<sup>3</sup> 時，數值會放大 1,000 倍。</b><br>
                                拆解原理分析：<br>
                                分子：1 g = 0.001 kg<br>
                                分母：1 cm<sup>3</sup> = 0.000001 m<sup>3</sup><br>
                                相除得到：0.001 ÷ 0.000001 = 1,000 倍。<br><br>
                                算式：${item.g} × 1,000 = ${correctAnswer} kg/m<sup>3</sup> （這代表${item.name}的密度）`;
                            } else {
                                questionText = `${item.kg} kg/m<sup>3</sup> = ? g/cm<sup>3</sup>`;
                                correctAnswer = item.g.toString();
                                explanationHighlight = "逆向換算：kg/m<sup>3</sup> 到 g/cm<sup>3</sup>";
                                explanationText = `<b>從公制大單位 kg/m<sup>3</sup> 換算回實驗室單位 g/cm<sup>3</sup> 時，數值縮小 1,000 倍（除以 1,000）。</b><br>
                                算式：${item.kg} ÷ 1,000 = ${correctAnswer} g/cm<sup>3</sup> （這代表${item.name}的密度）`;
                            }
                        } else {
                            // 速度 (km/h <-> m/s)
                            const isForward = Math.random() < 0.5;
                            const speeds = [
                                { kmh: 36, ms: 10 },
                                { kmh: 54, ms: 15 },
                                { kmh: 72, ms: 20 },
                                { kmh: 90, ms: 25 },
                                { kmh: 108, ms: 30 }
                            ];
                            const item = speeds[Math.floor(Math.random() * speeds.length)];
                            if (isForward) {
                                questionText = `${item.kmh} km/hr = ? m/s`;
                                correctAnswer = item.ms.toString();
                                explanationHighlight = "速度換算：分子與分母各自獨立拆！";
                                explanationText = `<b>km/hr 換算為 m/s 時，必須除以 3.6。</b><br>
                                拆解過程：<br>
                                分子：${item.kmh}公里 = ${item.kmh * 1000}公尺<br>
                                分母：1小時 = 3,600秒<br>
                                兩者相除：${item.kmh * 1000} ÷ 3,600 = ${correctAnswer} m/s。<br>
                                記住公式：分子分母拆開算，分數帶著單位一起算！`;
                            } else {
                                questionText = `${item.ms} m/s = ? km/hr`;
                                correctAnswer = item.kmh.toString();
                                explanationHighlight = "逆向速度：m/s 換算回 km/hr";
                                explanationText = `<b>m/s 換算為 km/hr 時，必須乘以 3.6。</b><br>
                                拆解過程：每秒跑 ${item.ms} 公尺，一小時（3600秒）會跑 ${item.ms} × 3,600 = ${item.ms * 3600} 公尺 = ${item.kmh} 公里。<br><br>
                                算式：${item.ms} × 3.6 = ${correctAnswer} km/hr`;
                            }
                        }
                        break;
                    }
                }

                return {
                    questionText,
                    correctAnswer,
                    explanationHighlight,
                    explanationText
                };
            },

            // ------------------ 【加載隨機題目流】 ------------------
            loadNewQuestion() {
                // 1. 隱藏答對時的下一題覆蓋面板
                document.getElementById('success-overlay').style.display = 'none';
                
                // 2. 清空輸入框
                document.getElementById('player-input').value = "";
                
                // 3. 確保卡片正面向前
                if (this.isFlipped) {
                    this.flipToA();
                }

                // 4. 調用隨機演算法庫產生符合當前關卡的新題目
                this.currentQuestion = this.generateRandomQuestion(this.currentLevel);

                // 5. 渲染題目至 A 狀態（解題畫面）
                document.getElementById('question-text').innerHTML = this.currentQuestion.questionText;

                // 6. 即時將詳盡解析注入到 B 狀態（原理說明卡背面），確保說明完全與當前隨機題對應！
                document.getElementById('explanation-highlight').innerHTML = this.currentQuestion.explanationHighlight;
                document.getElementById('explanation-body').innerHTML = this.currentQuestion.explanationText;

                this.logToRemote(`載入新題目 (關卡: LV.${this.currentLevel})，正確解答為: ${this.currentQuestion.correctAnswer}`);
            },

            // 關卡切換並重啟
            changeLevelAndRestart(level) {
                this.currentLevel = level;
                
                // 更新資訊列與主題徽章配色
                document.getElementById('display-level').innerText = `挑戰關卡：LV.${level}`;
                
                const colors = {
                    1: '#FFF0F0', // 櫻花淡粉紅
                    2: '#FFF9E6', // 香蕉淡黃
                    3: '#E6FFFA', // 薄荷淡藍綠
                    4: '#F0E6FF', // 薰衣草淡紫
                    5: '#FFF0E6'  // 甜橙淡粉
                };
                document.getElementById('game-viewport').style.backgroundColor = colors[level] || '#FDFBF7';
                
                // 重新載入對應關卡的題目
                this.loadNewQuestion();
            },

            // ------------------ 【自製鍵盤與手動輸入】 ------------------
            pressKey(keyValue) {
                const inputEl = document.getElementById('player-input');
                let currentVal = inputEl.value;

                if (keyValue === 'C') {
                    inputEl.value = '';
                } else if (keyValue === '⌫') {
                    inputEl.value = currentVal.substring(0, currentVal.length - 1);
                } else if (keyValue === '.') {
                    // 防呆：禁止輸入多重小數點
                    if (currentVal.includes('.')) return;
                    if (currentVal === '') {
                        inputEl.value = '0.';
                    } else {
                        inputEl.value = currentVal + '.';
                    }
                } else {
                    if (currentVal.length < 9) {
                        inputEl.value = currentVal + keyValue;
                    }
                }
                inputEl.focus();
            },

            // ------------------ 【狀態 A <--> 狀態 B 翻轉邏輯】 ------------------
            flipToB(triggerType = 'hint') {
                if (this.isFlipped) return;
                
                this.isFlipped = true;
                const cardFlow = document.getElementById('main-card-flow');
                const sourceEl = document.getElementById('explanation-source');

                if (triggerType === 'hint') {
                    sourceEl.innerText = "💡 查看提示";
                } else if (triggerType === 'incorrect') {
                    sourceEl.innerText = "❌ 答錯了！別氣餒";
                } else {
                    sourceEl.innerText = "⚙️ 測試遙控器翻面";
                }

                cardFlow.classList.add('flipped');
                this.logToRemote(`卡片翻面：狀態 B (來源: ${triggerType})`);
            },

            flipToA() {
                if (!this.isFlipped) return;
                
                this.isFlipped = false;
                const cardFlow = document.getElementById('main-card-flow');
                cardFlow.classList.remove('flipped');
                
                setTimeout(() => {
                    document.getElementById('player-input').focus();
                }, 400);

                this.logToRemote('卡片翻面：狀態 A (返回解題)');
            },

            // ------------------ 【答題賽局邏輯驗證】 ------------------
            submitAnswer() {
                const inputEl = document.getElementById('player-input');
                const answer = inputEl.value.trim();

                if (answer === "") {
                    this.logToRemote('警告：請輸入數值再送出');
                    this.flashFrontEffect('error-shake');
                    return;
                }

                // 步驟三精確匹配演算法生成的隨機正確解答
                if (answer === this.currentQuestion.correctAnswer) {
                    this.handleCorrect();
                } else {
                    this.handleIncorrect();
                }
            },

            handleCorrect() {
                this.combo++;
                document.getElementById('display-combo').innerText = this.combo;
                this.flashFrontEffect('correct-flash');
                
                // 動態產生高質感遮罩，告知玩家答對並引導按下一題
                setTimeout(() => {
                    const descEl = document.getElementById('success-overlay-desc');
                    descEl.innerHTML = `恭喜解答正確！當前連擊次數：<b style="color:#C62828; font-size:24px;">${this.combo} Combo</b>`;
                    document.getElementById('success-overlay').style.display = 'flex';
                }, 400);

                this.logToRemote(`答對了！當前 Combo 累計：${this.combo}`);
            },

            handleIncorrect() {
                this.combo = 0;
                this.hearts = Math.max(0, this.hearts - 1);
                
                document.getElementById('display-combo').innerText = this.combo;
                document.getElementById('display-hearts').innerText = this.hearts;
                
                this.flashFrontEffect('error-shake');
                this.logToRemote(`答錯了！扣除 1 點生命值，剩餘：${this.hearts}`);

                // 答錯 0.8 秒後自動翻轉到 B 面看詳細解析
                setTimeout(() => {
                    this.flipToB('incorrect');
                }, 800);
            },

            flashFrontEffect(effectClass) {
                const frontFace = document.getElementById('card-front-face');
                frontFace.classList.remove('correct-flash', 'error-shake');
                void frontFace.offsetWidth; 
                frontFace.classList.add(effectClass);
            },

            // ------------------ 【遙控器專用調試方法】 ------------------
            showCheatAnswer() {
                this.logToRemote(`當前題目解答為: ${this.currentQuestion.correctAnswer}`);
                document.getElementById('player-input').value = this.currentQuestion.correctAnswer;
            },

            simulateCorrect() {
                document.getElementById('player-input').value = this.currentQuestion.correctAnswer;
                this.submitAnswer();
            },

            simulateIncorrect() {
                document.getElementById('player-input').value = "99.9";
                this.submitAnswer();
            },

            simulateReset() {
                this.hearts = 3;
                this.combo = 0;
                document.getElementById('display-hearts').innerText = this.hearts;
                document.getElementById('display-combo').innerText = this.combo;
                this.logToRemote('重置狀態：生命值與 Combo 已恢復');
            },

            logToRemote(message) {
                const logBox = document.getElementById('remote-log');
                if (logBox) {
                    const time = new Date().toLocaleTimeString();
                    logBox.innerHTML = `[${time}] ${message}<br>` + logBox.innerHTML;
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            GameModule.init();
        });
    </script>
</body>
</html>
