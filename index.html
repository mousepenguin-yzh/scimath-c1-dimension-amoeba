<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>挑戰一：空間維度與單位變形蟲 - 步驟四優化版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 基礎重設 */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #F0F4F8;
            font-family: 'Kosugi Maru', 'Noto Sans TC', sans-serif;
        }

        /* 16:9 核心視口容器 (1280x720) */
        #app-viewport {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1280px;
            height: 720px;
            background: radial-gradient(circle at center, #FFFFFF 0%, #E8F0F8 100%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transform-origin: center center;
            transform: translate(-50%, -50%) scale(1);
            transition: box-shadow 0.3s ease;
            z-index: 1;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        /* 數學與控制排版混合層 */
        #dom-ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .interactive-overlay {
            position: absolute;
            pointer-events: auto;
        }

        /* 頂部標題與目前進度卡片 (極致放大行動端規格) */
        #status-header {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 14px 40px;
            border-radius: 50px;
            border: 3px solid #BEE3F8;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            font-size: 26px;
            font-weight: bold;
            color: #2B6CB0;
            text-align: center;
        }

        /* 答題算式卡片 (實機清晰放大版) */
        #math-display-card {
            top: 140px;
            right: 50px;
            background: rgba(255, 255, 255, 0.98);
            border: 4px solid #BEE3F8;
            border-radius: 24px;
            padding: 28px 40px;
            box-shadow: 0 15px 35px rgba(49, 130, 206, 0.18);
            color: #2D3748;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            min-width: 480px;
            max-width: 550px;
        }

        #math-display-card.success-pulse {
            border-color: #48BB78;
            background-color: #F0FFF4;
            transform: scale(1.03);
            box-shadow: 0 20px 45px rgba(72, 187, 120, 0.3);
        }

        .card-title {
            font-size: 22px;
            color: #718096;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .formula-text {
            font-size: 34px;
            font-weight: bold;
            color: #2B6CB0;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }

        .formula-text sup {
            font-size: 24px;
            color: #E53E3E;
            margin-left: 3px;
        }

        /* 底部控制大面板 */
        #control-panel-bottom {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.96);
            border: 3px solid #BEE3F8;
            border-radius: 30px;
            padding: 16px 36px;
            width: 80%;
            max-width: 960px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 24px;
        }

        /* 播放/暫停與重設按鈕 */
        .ctrl-btn {
            background-color: #3182CE;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 20px;
            font-family: inherit;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0px #2B6CB0;
            transition: all 0.05s ease;
            white-space: nowrap;
        }

        .ctrl-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0px #2B6CB0;
        }

        .ctrl-btn.reset-style {
            background-color: #ED64A6;
            box-shadow: 0 4px 0px #B83280;
        }

        /* 時間軸拖拉軌道 */
        .scrubber-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            gap: 6px;
        }

        .scrubber-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            color: #4A5568;
            font-weight: bold;
        }

        /* 滑桿美化 */
        .timeline-scrubber {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            border-radius: 6px;
            background: #E2E8F0;
            outline: none;
            cursor: pointer;
        }

        .timeline-scrubber::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #3182CE;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .timeline-scrubber::-webkit-slider-thumb:active {
            transform: scale(1.25);
        }

        /* 偵錯面板 */
        #debug-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 999;
            background: rgba(255, 255, 255, 0.98);
            border: 2px solid #BEE3F8;
            border-radius: 14px;
            width: 260px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            max-height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
        }

        #debug-panel.collapsed {
            width: 180px;
            height: 44px;
        }

        #btn-toggle-debug {
            width: 100%;
            height: 44px;
            background: #2B6CB0;
            color: white;
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
        }

        .debug-body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .debug-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #4A5568;
        }

        .debug-value {
            font-weight: bold;
            color: #2D3748;
        }
    </style>
</head>
<body>

    <!-- 16:9 遊戲主視口 -->
    <div id="app-viewport">
        <canvas id="game-canvas"></canvas>

        <div id="dom-ui-layer">
            <!-- 頂部動態狀態卡 -->
            <div id="status-header" class="interactive-overlay">
                LV.2 三維體積：「百萬大分裂」空間理解
            </div>

            <!-- 動態算式字卡 -->
            <div id="math-display-card" class="interactive-overlay">
                <div class="card-title" id="math-card-title">1 m³ 巨大分裂關係</div>
                <div class="formula-text" id="math-formula">
                    <span>1 m<sup>3</sup></span>
                    <span>=</span>
                    <span>1000 個 10 cm 立方體</span>
                </div>
            </div>

            <!-- 底部控制大面板 -->
            <div id="control-panel-bottom" class="interactive-overlay">
                <button class="ctrl-btn" id="btn-play">暫停</button>
                <button class="ctrl-btn reset-style" id="btn-reset">重置</button>
                
                <div class="scrubber-container">
                    <div class="scrubber-label-row">
                        <span id="txt-animation-phase" style="color: #3182CE;">1. 正在分裂為 1000 個中型方塊</span>
                        <span>進度：<span id="txt-timeline-percent">0</span>%</span>
                    </div>
                    <input type="range" class="timeline-scrubber" id="slider-timeline" min="0" max="100" step="0.1" value="0">
                </div>
            </div>
        </div>
    </div>

    <!-- 開發者偵錯面板 -->
    <div id="debug-panel" class="collapsed">
        <button id="btn-toggle-debug">⚙️ 展開/收折偵錯面板</button>
        <div class="debug-body">
            <div class="debug-row">
                <span>時間軸進度:</span>
                <span id="val-progress" class="debug-value">0.00</span>
            </div>
            <div class="debug-row">
                <span>繪製方塊數:</span>
                <span id="val-draw-count" class="debug-value">0</span>
            </div>
            <div class="debug-row">
                <span>聚焦方塊 Alpha:</span>
                <span id="val-focus-alpha" class="debug-value">1.00</span>
            </div>
            <div class="debug-row">
                <span>背景方塊 Alpha:</span>
                <span id="val-back-alpha" class="debug-value">1.00</span>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 核心畫布與解析度設定 ---
        const BASE_WIDTH = 1280;
        const BASE_HEIGHT = 720;
        
        const viewport = document.getElementById('app-viewport');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        let currentScale = 1;

        // 動態系統狀態
        let progress = 0; // 全域時間軸進度 (0 到 100)
        let isPlaying = true; // 預設自動播放
        const confettiList = [];
        let hasConfettiTriggered = false; // 防範二次重複觸發碎紙花

        function updateLayout() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            const scaleX = windowWidth / BASE_WIDTH;
            const scaleY = windowHeight / BASE_HEIGHT;
            currentScale = Math.min(scaleX, scaleY);

            viewport.style.transform = `translate(-50%, -50%) scale(${currentScale})`;
        }

        // --- 2. 物理碎紙花粒子系統 ---
        class ConfettiParticle {
            constructor(startX, startY) {
                this.x = startX;
                this.y = startY;
                const angle = Math.random() * Math.PI * 2;
                const speed = 7 + Math.random() * 15;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 8;
                this.width = 12 + Math.random() * 10;
                this.height = 6 + Math.random() * 6;
                this.rotation = Math.random() * Math.PI;
                this.rotationSpeed = -0.12 + Math.random() * 0.24;
                this.gravity = 0.35;
                this.resistance = 0.96;
                const colors = ['#FFADAD', '#FFD6A5', '#FDFFB6', '#CAFFBF', '#9BF6FF', '#BDB2FF', '#FFC6FF'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 1;
                this.decay = 0.008 + Math.random() * 0.012;
            }

            update() {
                this.vx *= this.resistance;
                this.vy *= this.resistance;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                this.alpha -= this.decay;
            }

            draw(context) {
                if (this.alpha <= 0) return;
                context.save();
                context.translate(this.x, this.y);
                context.rotate(this.rotation);
                context.globalAlpha = this.alpha;
                context.fillStyle = this.color;
                context.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                context.restore();
            }
        }

        function triggerConfetti(x, y) {
            for (let i = 0; i < 150; i++) {
                confettiList.push(new ConfettiParticle(x, y));
            }
            const card = document.getElementById('math-display-card');
            card.classList.add('success-pulse');
            setTimeout(() => card.classList.remove('success-pulse'), 600);
        }

        // --- 3. 非對稱二等角投影幾何計算 ---
        const radLeft = 22 * Math.PI / 180;
        const radRight = 38 * Math.PI / 180;

        function getIsoPoint(x, y, z, originX, originY) {
            return {
                x: originX + x * Math.cos(radRight) - y * Math.cos(radLeft),
                y: originY + x * Math.sin(radRight) + y * Math.sin(radLeft) - z
            };
        }

        // 繪製 100% 封閉、實心、具前後遮擋關係的 3D 立方體
        function drawCube(context, x, y, z, size, originX, originY, baseAlpha, isTarget = false) {
            const pts = {
                B: getIsoPoint(x + size, y, z, originX, originY),
                C: getIsoPoint(x + size, y + size, z, originX, originY),
                D: getIsoPoint(x, y + size, z, originX, originY),
                E: getIsoPoint(x, y, z + size, originX, originY),
                F: getIsoPoint(x + size, y, z + size, originX, originY),
                G: getIsoPoint(x + size, y + size, z + size, originX, originY),
                H: getIsoPoint(x, y + size, z + size, originX, originY)
            };

            let colorTop, colorLeft, colorRight, strokeStyle;
            if (isTarget) {
                colorTop = `rgba(252, 234, 222, ${baseAlpha})`;    
                colorLeft = `rgba(255, 173, 173, ${baseAlpha})`;   
                colorRight = `rgba(255, 198, 255, ${baseAlpha})`;  
                strokeStyle = `rgba(229, 62, 62, ${baseAlpha * 0.85})`; 
            } else {
                colorTop = `rgba(232, 240, 248, ${baseAlpha})`;    
                colorLeft = `rgba(144, 205, 244, ${baseAlpha})`;   
                colorRight = `rgba(66, 153, 225, ${baseAlpha})`;   
                strokeStyle = `rgba(43, 108, 176, ${baseAlpha * 0.55})`; 
            }

            context.lineWidth = isTarget ? 3.0 : 1.0;
            context.lineCap = 'round';
            context.lineJoin = 'round';

            // 1. 左前側面：D -> C -> G -> H
            context.fillStyle = colorLeft;
            context.beginPath();
            context.moveTo(pts.D.x, pts.D.y);
            context.lineTo(pts.C.x, pts.C.y);
            context.lineTo(pts.G.x, pts.G.y);
            context.lineTo(pts.H.x, pts.H.y);
            context.closePath();
            context.fill();
            context.strokeStyle = strokeStyle;
            context.stroke();

            // 2. 右前側面：B -> C -> G -> F
            context.fillStyle = colorRight;
            context.beginPath();
            context.moveTo(pts.B.x, pts.B.y);
            context.lineTo(pts.C.x, pts.C.y);
            context.lineTo(pts.G.x, pts.G.y);
            context.lineTo(pts.F.x, pts.F.y);
            context.closePath();
            context.fill();
            context.stroke();

            // 3. 頂部面：E -> F -> G -> H
            context.fillStyle = colorTop;
            context.beginPath();
            context.moveTo(pts.E.x, pts.E.y);
            context.lineTo(pts.F.x, pts.F.y);
            context.lineTo(pts.G.x, pts.G.y);
            context.lineTo(pts.H.x, pts.H.y);
            context.closePath();
            context.fill();
            context.stroke();
        }

        // 在指定的四邊形面上繪製 3D 立體表面網格線
        function drawFaceGrid(context, p1, p2, p3, p4, linesCount, alpha) {
            context.strokeStyle = `rgba(229, 62, 62, ${alpha * 0.45})`; 
            context.lineWidth = 1.5;
            for (let i = 1; i < linesCount; i++) {
                const ratio = i / linesCount;
                const start1 = {
                    x: p1.x + (p2.x - p1.x) * ratio,
                    y: p1.y + (p2.y - p1.y) * ratio
                };
                const end1 = {
                    x: p4.x + (p3.x - p4.x) * ratio,
                    y: p4.y + (p3.y - p4.y) * ratio
                };
                context.beginPath();
                context.moveTo(start1.x, start1.y);
                context.lineTo(end1.x, end1.y);
                context.stroke();

                const start2 = {
                    x: p1.x + (p4.x - p1.x) * ratio,
                    y: p1.y + (p4.y - p1.y) * ratio
                };
                const end2 = {
                    x: p2.x + (p3.x - p2.x) * ratio,
                    y: p2.y + (p3.y - p2.y) * ratio
                };
                context.beginPath();
                context.moveTo(start2.x, start2.y);
                context.lineTo(end2.x, end2.y);
                context.stroke();
            }
        }

        // --- 4. 核心二階段嵌套放大主算法 (重構版) ---
        let renderCubeCount = 0;

        function renderMultiStageVolume() {
            renderCubeCount = 0;

            const gridOriginX = 420;
            const gridOriginY = 480;
            const cubeSize = 20;
            const maxGap = 7.5;

            // 計算目標提取方塊 (x=9, y=9, z=9) 在階段 B 結束滑出時的「螢幕精確位置」
            const finalSlideFactor = 140;
            const px_end = 9 * (cubeSize + maxGap) + finalSlideFactor;
            const py_end = px_end;
            const pz_end = px_end;
            const targetScreenPos = getIsoPoint(px_end, py_end, pz_end, gridOriginX, gridOriginY);

            // ----------------------------------------------------
            // 階段 A (0% 到 25%)：1m³ 立方體解體，分裂成 1000 個中型 10cm 方塊
            // ----------------------------------------------------
            if (progress <= 25) {
                const t = progress / 25;
                const gap = t * maxGap; 

                for (let z = 0; z < 10; z++) {
                    for (let y = 0; y < 10; y++) {
                        for (let x = 0; x < 10; x++) {
                            const px = x * (cubeSize + gap);
                            const py = y * (cubeSize + gap);
                            const pz = z * (cubeSize + gap);
                            const isTarget = (x === 9 && y === 9 && z === 9);
                            
                            drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, 1.0, isTarget);
                            renderCubeCount++;
                        }
                    }
                }
                document.getElementById('val-focus-alpha').textContent = "1.00";
                document.getElementById('val-back-alpha').textContent = "1.00";
            }
            // ----------------------------------------------------
            // 階段 B (25% 到 45%)：提取目標 10cm 方塊，其餘 999 個方塊漸進淡出
            // ----------------------------------------------------
            else if (progress > 25 && progress <= 45) {
                const t = (progress - 25) / 20; 
                const fadeAlpha = 1 - t; 
                const slideFactor = t * finalSlideFactor; 

                for (let z = 0; z < 10; z++) {
                    for (let y = 0; y < 10; y++) {
                        for (let x = 0; x < 10; x++) {
                            const isTarget = (x === 9 && y === 9 && z === 9);
                            let px = x * (cubeSize + maxGap);
                            let py = y * (cubeSize + maxGap);
                            let pz = z * (cubeSize + maxGap);

                            if (isTarget) {
                                px += slideFactor;
                                py += slideFactor;
                                pz += slideFactor;
                                drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, 1.0, true);
                            } else {
                                if (fadeAlpha > 0.02) {
                                    drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, fadeAlpha, false);
                                }
                            }
                            renderCubeCount++;
                        }
                    }
                }
                document.getElementById('val-focus-alpha').textContent = "1.00";
                document.getElementById('val-back-alpha').textContent = fadeAlpha.toFixed(2);
            }
            // ----------------------------------------------------
            // 階段 C (45% 到 65%)：在「原位」平滑放大 10cm 立方體
            // ----------------------------------------------------
            else if (progress > 45 && progress <= 65) {
                const t = (progress - 45) / 20; 
                const currentSize = cubeSize + (240 - cubeSize) * t;

                const currentOriginX = targetScreenPos.x;
                const currentOriginY = targetScreenPos.y;

                drawCube(ctx, 0, 0, 0, currentSize, currentOriginX, currentOriginY, 1.0, true);
                renderCubeCount = 1;

                document.getElementById('val-focus-alpha').textContent = "1.00";
                document.getElementById('val-back-alpha').textContent = "0.00";
            }
            // ----------------------------------------------------
            // 階段 D (65% 到 80%)：放大方塊上細緻渲染 10x10 格線，展示內含 1000 個 1cm³ 小格子
            // ----------------------------------------------------
            else if (progress > 65 && progress <= 80) {
                const t = (progress - 65) / 15; // 格線淡入係數
                const size = 240;
                
                const currentOriginX = targetScreenPos.x;
                const currentOriginY = targetScreenPos.y;

                drawCube(ctx, 0, 0, 0, size, currentOriginX, currentOriginY, 1.0, true);
                renderCubeCount = 1;

                const pts = {
                    B: getIsoPoint(size, 0, 0, currentOriginX, currentOriginY),
                    C: getIsoPoint(size, size, 0, currentOriginX, currentOriginY),
                    D: getIsoPoint(0, size, 0, currentOriginX, currentOriginY),
                    E: getIsoPoint(0, 0, size, currentOriginX, currentOriginY),
                    F: getIsoPoint(size, 0, size, currentOriginX, currentOriginY),
                    G: getIsoPoint(size, size, size, currentOriginX, currentOriginY),
                    H: getIsoPoint(0, size, size, currentOriginX, currentOriginY)
                };

                const linesCount = 10;
                drawFaceGrid(ctx, pts.D, pts.C, pts.G, pts.H, linesCount, t);
                drawFaceGrid(ctx, pts.B, pts.C, pts.G, pts.F, linesCount, t);
                drawFaceGrid(ctx, pts.E, pts.F, pts.G, pts.H, linesCount, t);
                
                document.getElementById('val-focus-alpha').textContent = "1.00";
                document.getElementById('val-back-alpha').textContent = "0.00";
            }
            // ----------------------------------------------------
            // 【全新優化】階段 E (80% 到 92%)：中方塊「原位縮小」並將 999 顆中方塊「淡入復原」
            // ----------------------------------------------------
            else if (progress > 80 && progress <= 92) {
                const t = (progress - 80) / 12; // 0 ~ 1 區間
                const currentSize = 240 + (cubeSize - 240) * t; // 從 240 縮小至 20
                const backAlpha = t * 0.7; // 背景方塊半透明淡入

                // 1. 繪製半透明的背景 999 顆方塊 (Z-Sorting)
                for (let z = 0; z < 10; z++) {
                    for (let y = 0; y < 10; y++) {
                        for (let x = 0; x < 10; x++) {
                            const isTarget = (x === 9 && y === 9 && z === 9);
                            if (isTarget) continue; // 先不畫目標方塊，保持 Z-order

                            const px = x * (cubeSize + maxGap);
                            const py = y * (cubeSize + maxGap);
                            const pz = z * (cubeSize + maxGap);

                            drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, backAlpha, false);
                            renderCubeCount++;
                        }
                    }
                }

                // 2. 繪製正在原位縮小的格線目標方塊 (疊加於最前排)
                const currentOriginX = targetScreenPos.x;
                const currentOriginY = targetScreenPos.y;
                drawCube(ctx, 0, 0, 0, currentSize, currentOriginX, currentOriginY, 1.0, true);
                renderCubeCount++;

                // 計算縮小中的格線頂點
                const pts = {
                    B: getIsoPoint(currentSize, 0, 0, currentOriginX, currentOriginY),
                    C: getIsoPoint(currentSize, currentSize, 0, currentOriginX, currentOriginY),
                    D: getIsoPoint(0, currentSize, 0, currentOriginX, currentOriginY),
                    E: getIsoPoint(0, 0, currentSize, currentOriginX, currentOriginY),
                    F: getIsoPoint(currentSize, 0, currentSize, currentOriginX, currentOriginY),
                    G: getIsoPoint(currentSize, currentSize, currentSize, currentOriginX, currentOriginY),
                    H: getIsoPoint(0, currentSize, currentSize, currentOriginX, currentOriginY)
                };
                // 格線縮小但保持 100% 不透明，向孩子明示這是剛才切滿格子的那塊！
                drawFaceGrid(ctx, pts.D, pts.C, pts.G, pts.H, 10, 1.0);
                drawFaceGrid(ctx, pts.B, pts.C, pts.G, pts.F, 10, 1.0);
                drawFaceGrid(ctx, pts.E, pts.F, pts.G, pts.H, 10, 1.0);

                // 3. 繪製精美引導標註線 (Leader Line Callout)，拉近孩子視覺對比
                drawCallout(ctx, targetScreenPos.x, targetScreenPos.y, t);

                document.getElementById('val-focus-alpha').textContent = "1.00";
                document.getElementById('val-back-alpha').textContent = backAlpha.toFixed(2);
            }
            // ----------------------------------------------------
            // 【全新優化】階段 F (92% 到 100%)：全體歸位，最終百萬倍算式揭曉與粒子慶祝
            // ----------------------------------------------------
            else if (progress > 92) {
                const backAlpha = 0.75;

                // 1. 繪製背景 999 顆方塊
                for (let z = 0; z < 10; z++) {
                    for (let y = 0; y < 10; y++) {
                        for (let x = 0; x < 10; x++) {
                            const isTarget = (x === 9 && y === 9 && z === 9);
                            if (isTarget) continue;

                            const px = x * (cubeSize + maxGap);
                            const py = y * (cubeSize + maxGap);
                            const pz = z * (cubeSize + maxGap);

                            drawCube(ctx, px, py, pz, cubeSize, gridOriginX, gridOriginY, backAlpha, false);
                            renderCubeCount++;
                        }
                    }
                }

                // 2. 繪製歸位後、依然清晰刻滿紅色格線的角落中方塊 (x=9,y=9,z=9)
                const currentOriginX = targetScreenPos.x;
                const currentOriginY = targetScreenPos.y;
                drawCube(ctx, 0, 0, 0, cubeSize, currentOriginX, currentOriginY, 1.0, true);
                renderCubeCount++;

                const pts = {
                    B: getIsoPoint(cubeSize, 0, 0, currentOriginX, currentOriginY),
                    C: getIsoPoint(cubeSize, cubeSize, 0, currentOriginX, currentOriginY),
                    D: getIsoPoint(0, cubeSize, 0, currentOriginX, currentOriginY),
                    E: getIsoPoint(0, 0, cubeSize, currentOriginX, currentOriginY),
                    F: getIsoPoint(cubeSize, 0, cubeSize, currentOriginX, currentOriginY),
                    G: getIsoPoint(cubeSize, cubeSize, cubeSize, currentOriginX, currentOriginY),
                    H: getIsoPoint(0, cubeSize, cubeSize, currentOriginX, currentOriginY)
                };
                drawFaceGrid(ctx, pts.D, pts.C, pts.G, pts.H, 10, 1.0);
                drawFaceGrid(ctx, pts.B, pts.C, pts.G, pts.F, 10, 1.0);
                drawFaceGrid(ctx, pts.E, pts.F, pts.G, pts.H, 10, 1.0);

                // 3. 常駐顯示呼應標註線
                drawCallout(ctx, targetScreenPos.x, targetScreenPos.y, 1.0);

                // 4. 觸發彩紙噴發 (僅限一次)
                if (!hasConfettiTriggered) {
                    triggerConfetti(targetScreenPos.x - 50, targetScreenPos.y - 100);
                    hasConfettiTriggered = true;
                }
                
                document.getElementById('val-focus-alpha').textContent = "1.00";
                document.getElementById('val-back-alpha').textContent = backAlpha.toFixed(2);
            }
        }

        // 繪製精緻的紅色呼應標註氣泡與導引線，幫助學生把「單個切割」與「大群體」直觀連結
        function drawCallout(context, tx, ty, alpha) {
            context.save();
            context.globalAlpha = alpha;

            // 導引線起點：目標格線方塊旁
            const startX = tx - 30;
            const startY = ty + 10;
            // 導引線折點與終點
            const midX = startX - 80;
            const midY = startY + 60;
            const endX = midX - 120;

            // 1. 繪製氣泡導引折線
            context.strokeStyle = '#E53E3E';
            context.lineWidth = 3;
            context.beginPath();
            context.moveTo(startX, startY);
            context.lineTo(midX, midY);
            context.lineTo(endX, midY);
            context.stroke();

            // 導航點特效
            context.fillStyle = '#E53E3E';
            context.beginPath();
            context.arc(startX, startY, 5, 0, Math.PI * 2);
            context.fill();

            // 2. 繪製親切的馬卡龍粉紅提示氣泡框
            const bubbleW = 340;
            const bubbleH = 80;
            const bx = endX - bubbleW;
            const by = midY - bubbleH / 2;

            context.fillStyle = '#FFF5F5';
            context.strokeStyle = '#FEB2B2';
            context.lineWidth = 3;
            
            // 圓角矩形
            context.beginPath();
            context.roundRect(bx, by, bubbleW, bubbleH, 12);
            context.fill();
            context.stroke();

            // 3. 填充解釋文字 (針對孩子口語化：把 1 個和 1000 個緊密扣連)
            context.fillStyle = '#C53030';
            context.font = 'bold 18px "Noto Sans TC", sans-serif';
            context.textAlign = 'left';
            context.fillText('這顆切滿格子的中方塊，', bx + 15, by + 32);
            context.fillText('只是這 1000 個中方塊裡的 1 個！', bx + 15, by + 58);

            context.restore();
        }

        // --- 5. 實時 UI 與數學算式排版同步 (徹底消滅 dm，使用 10 cm 橋樑，消滅跳躍段落) ---
        const labelPhase = document.getElementById('txt-animation-phase');
        const txtPercent = document.getElementById('txt-timeline-percent');
        const slider = document.getElementById('slider-timeline');
        
        const cardTitle = document.getElementById('math-card-title');
        const formulaContainer = document.getElementById('math-formula');

        function updateDOMUIByProgress() {
            txtPercent.textContent = progress.toFixed(1);
            slider.value = progress;

            if (progress <= 25) {
                labelPhase.textContent = '1. 正在將 1 m³ 切割為 1000 個 10 cm 立方體';
                labelPhase.style.color = '#3182CE';
                
                cardTitle.textContent = '第一步：大方塊拆成 1000 份';
                formulaContainer.innerHTML = `
                    <span>1 m<sup>3</sup> 巨大體積</span>
                    <span>=</span>
                    <span style="color: #3182CE;">1000 個 10 cm 中方塊</span>
                `;
                hasConfettiTriggered = false; 
            } 
            else if (progress > 25 && progress <= 45) {
                labelPhase.textContent = '2. 抽出其中 1 個邊長 10 cm 的中立方體';
                labelPhase.style.color = '#ED64A6';
                
                cardTitle.textContent = '第二步：抽出其中 1 份觀察';
                formulaContainer.innerHTML = `
                    <span>仔細看 1000 個裡的這 1 個：</span>
                    <br>
                    <span style="font-size: 24px; color: #ED64A6;">邊長 = 10 公分 (cm)</span>
                `;
            } 
            else if (progress > 45 && progress <= 65) {
                labelPhase.textContent = '3. 在原位放大這顆 10 cm 的中型立方體';
                labelPhase.style.color = '#D69E2E';
                
                cardTitle.textContent = '準備看中方塊的秘密...';
                formulaContainer.innerHTML = `
                    <span>10 cm 的中方塊</span>
                    <br>
                    <span style="font-size: 24px; color: #D69E2E;">放大中，看它身上能切幾格？</span>
                `;
            } 
            else if (progress > 65 && progress <= 80) {
                labelPhase.textContent = '4. 看到了！這 1 個中方塊劃分出 1000 個小格子';
                labelPhase.style.color = '#E53E3E';
                
                cardTitle.textContent = '第三步：原來 1 個中方塊有 1000 格！';
                formulaContainer.innerHTML = `
                    <span>1 個中方塊</span>
                    <span>=</span>
                    <span>10 cm × 10 cm × 10 cm</span>
                    <span>=</span>
                    <span style="color: #E53E3E;">1000 個 1 cm<sup>3</sup> 小格子</span>
                `;
                hasConfettiTriggered = false;
            } 
            // 【核心修正】：新增第五階段視覺重整合說明，把單一立方體與1000個群體對齊
            else if (progress > 80 && progress <= 92) {
                labelPhase.textContent = '5. 縮小歸位對照：原本有 1000 個這樣的中方塊！';
                labelPhase.style.color = '#D69E2E';
                
                cardTitle.textContent = '第四步：放回群體，驚人對照！';
                formulaContainer.innerHTML = `
                    <span>1 個中方塊 = 1000 個小格子</span>
                    <br>
                    <span style="font-size: 22px; color: #2B6CB0;">而這整疊大方塊有 1000 個中方塊！</span>
                `;
                hasConfettiTriggered = false;
            }
            else {
                labelPhase.textContent = '🎉 大功告成！百萬倍二階段分裂完工！';
                labelPhase.style.color = '#38A169';
                
                cardTitle.textContent = '第五步：1000 個中方塊各自切 1000 格！';
                formulaContainer.innerHTML = `
                    <span style="font-size: 26px; color: #4A5568;">1000 (中方塊) × 1000 (每個有 1000 格) =</span>
                    <br>
                    <span style="color: #48BB78; font-size: 44px; font-weight: 900;">1,000,000 cm<sup>3</sup></span>
                `;
            }

            document.getElementById('val-progress').textContent = progress.toFixed(2);
            document.getElementById('val-draw-count').textContent = renderCubeCount;
        }

        // --- 6. 畫面更新與時間軸主迴圈 (60FPS Frame Loop) ---
        function mainLoop() {
            ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

            // A. 繪製精緻的馬卡龍格線背景
            ctx.strokeStyle = 'rgba(190, 227, 248, 0.35)';
            ctx.lineWidth = 2;
            for (let i = 0; i < BASE_WIDTH; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, BASE_HEIGHT); ctx.stroke();
            }
            for (let j = 0; j < BASE_HEIGHT; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(BASE_WIDTH, j); ctx.stroke();
            }

            // B. 渲染幾何主體
            renderMultiStageVolume();

            // C. 物理碎紙花粒子更新
            for (let i = confettiList.length - 1; i >= 0; i--) {
                const particle = confettiList[i];
                particle.update();
                particle.draw(ctx);
                if (particle.alpha <= 0) {
                    confettiList.splice(i, 1);
                }
            }

            // D. 自動增量時間軸
            if (isPlaying) {
                progress += 0.12; 
                if (progress >= 100) {
                    progress = 0; 
                }
                updateDOMUIByProgress();
            }

            requestAnimationFrame(mainLoop);
        }

        // --- 7. 手勢、拖動與播放控制器綁定 ---
        const playBtn = document.getElementById('btn-play');
        const resetBtn = document.getElementById('btn-reset');

        slider.addEventListener('input', (e) => {
            progress = parseFloat(e.target.value);
            isPlaying = false; 
            playBtn.textContent = '播放';
            updateDOMUIByProgress();
        });

        const togglePlay = (e) => {
            e.preventDefault();
            isPlaying = !isPlaying;
            playBtn.textContent = isPlaying ? '暫停' : '播放';
        };
        playBtn.addEventListener('touchstart', togglePlay);
        playBtn.addEventListener('click', togglePlay);

        const resetTimeline = (e) => {
            e.preventDefault();
            progress = 0;
            isPlaying = true;
            playBtn.textContent = '暫停';
            confettiList.length = 0; 
            hasConfettiTriggered = false;
            updateDOMUIByProgress();
        };
        resetBtn.addEventListener('reset-style', resetTimeline);
        resetBtn.addEventListener('click', resetTimeline);

        document.getElementById('btn-toggle-debug').addEventListener('click', (e) => {
            document.getElementById('debug-panel').classList.toggle('collapsed');
        });

        // 初始化
        window.addEventListener('resize', updateLayout);
        canvas.width = BASE_WIDTH;
        canvas.height = BASE_HEIGHT;
        updateLayout();
        updateDOMUIByProgress();
        mainLoop();

    </script>
</body>
</html>
