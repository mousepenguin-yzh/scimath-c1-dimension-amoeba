                    ctx.lineTo(290, 200);
                    ctx.stroke();

                    GameModule.drawIsoCube(ctx, 350, 150, 75, 1, 1, 1, {
                        drawGrid: true,
                        gridSegments: 10,
                        topColor: "#ffeaa7",
                        leftColor: "#ffb8b8",
                        rightColor: "#81ecec"
                    });

                    GameModule.drawMathText(ctx, "10 cm", 275, 175, 14, "#2d3436");
                    GameModule.drawMathText(ctx, "10 cm", 395, 175, 14, "#2d3436");
                    GameModule.drawMathText(ctx, "10 cm", 295, 105, 14, "#2d3436");

                    GameModule.drawMathText(ctx, `${questValue} * 1,000,000 = ${GameModule.state.currentQuest.answer} cm^3`, 70, 280, 20, "#2d3436");
                    ctx.restore();

                } else if (GameModule.state.currentLevel === 3) {
                    ctx.save();
                    GameModule.drawIsoCube(ctx, 90, 145, 45, 1, 1, 1, {
                        topColor: "#ff9f9f",
                        leftColor: "#ffeaa7",
                        rightColor: "#81ecec"
                    });

                    ctx.fillStyle = "#fdcb6e";
                    ctx.shadowColor = "rgba(253, 203, 110, 0.4)";
                    ctx.shadowBlur = 8;
                    ctx.fillRect(150, 120, 20, 5);
                    ctx.fillRect(150, 130, 20, 5);
                    ctx.shadowBlur = 0; 

                    const cx = 240;
                    const cy = 160;
                    const sc = 70;
                    const mb0 = GameModule.getIsoPoint(0.4, 0, 0, cx, cy, sc);     
                    const mb1 = GameModule.getIsoPoint(0.4, 0.4, 0, cx, cy, sc);   
                    const mb2 = GameModule.getIsoPoint(0, 0.4, 0, cx, cy, sc);     
                    const mt0 = GameModule.getIsoPoint(0.4, 0, 0.7, cx, cy, sc);   
                    const mt1 = GameModule.getIsoPoint(0.4, 0.4, 0.7, cx, cy, sc); 
                    const mt2 = GameModule.getIsoPoint(0, 0.4, 0.7, cx, cy, sc);   
                    const mr0 = GameModule.getIsoPoint(0.2, 0, 0.95, cx, cy, sc);  
                    const mr1 = GameModule.getIsoPoint(0.2, 0.4, 0.95, cx, cy, sc); 

                    ctx.fillStyle = "#f1f2f6";
                    ctx.beginPath(); ctx.moveTo(mb2.x, mb2.y); ctx.lineTo(mb1.x, mb1.y); ctx.lineTo(mt1.x, mt1.y); ctx.lineTo(mt2.x, mt2.y); ctx.closePath(); ctx.fill();
                    ctx.strokeStyle = "#2d3436"; ctx.lineWidth = 2; ctx.stroke();

                    ctx.fillStyle = "#dfe4ea";
                    ctx.beginPath(); ctx.moveTo(mb0.x, mb0.y); ctx.lineTo(mb1.x, mb1.y); ctx.lineTo(mt1.x, mt1.y); ctx.lineTo(mt0.x, mt0.y); ctx.closePath(); ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = "#ff7675";
                    ctx.beginPath(); ctx.moveTo(mt2.x, mt2.y); ctx.lineTo(mt1.x, mt1.y); ctx.lineTo(mr1.x, mr1.y); ctx.lineTo(mr0.x, mr0.y); ctx.closePath(); ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = "#d63031";
                    ctx.beginPath(); ctx.moveTo(mt0.x, mt0.y); ctx.lineTo(mt1.x, mt1.y); ctx.lineTo(mr1.x, mr1.y); ctx.closePath(); ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = "#fdcb6e";
                    ctx.shadowColor = "rgba(253, 203, 110, 0.4)";
                    ctx.shadowBlur = 8;
                    ctx.fillRect(310, 120, 20, 5);
                    ctx.fillRect(310, 130, 20, 5);
                    ctx.shadowBlur = 0;

                    const cyX = 390;
                    ctx.strokeStyle = "#74b9ff";
                    ctx.lineWidth = 3;
                    ctx.fillStyle = "rgba(116, 185, 255, 0.1)";
                    ctx.beginPath();
                    ctx.ellipse(cyX, 170, 18, 6, 0, 0, Math.PI * 2);
                    ctx.fill(); ctx.stroke();

                    ctx.fillStyle = "rgba(129, 236, 236, 0.6)";
                    ctx.beginPath();
                    ctx.rect(cyX - 18, 85, 36, 85);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(cyX, 85, 18, 6, 0, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.moveTo(cyX - 18, 170); ctx.lineTo(cyX - 18, 60);
                    ctx.moveTo(cyX + 18, 170); ctx.lineTo(cyX + 18, 60);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.ellipse(cyX, 60, 18, 6, 0, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.strokeStyle = "#2d3436";
                    ctx.lineWidth = 1.5;
                    for (let h = 95; h < 170; h += 15) {
                        ctx.beginPath(); ctx.moveTo(cyX - 18, h); ctx.lineTo(cyX - 6, h); ctx.stroke();
                    }
                    ctx.strokeStyle = "#ff7675";
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(cyX - 18, 85); ctx.lineTo(cyX + 5, 85); ctx.stroke();
                    GameModule.drawMathText(ctx, `${questValue * 1000} mL`, 412, 90, 13, "#d63031");

                    GameModule.drawMathText(ctx, `${questValue * 1000} cm^3`, 32, 218, 15, "#2d3436");
                    GameModule.drawMathText(ctx, `牛奶盒：${questValue} L`, 190, 218, 15, "#d63031");
                    GameModule.drawMathText(ctx, `量筒：${questValue * 1000} mL`, 335, 218, 15, "#0984e3");

                    ctx.fillStyle = "#ffeaa7";
                    ctx.strokeStyle = "#fdcb6e";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    GameModule.drawRoundRect(ctx, 110, 245, 260, 40, 10, "#ffeaa7", "#fdcb6e", 3);
                    GameModule.drawMathText(ctx, "核心金律：1 mL = 1 cm^3", 130, 271, 17, "#2d3436");
                    
                    ctx.restore();

                } else if (GameModule.state.currentLevel === 4) {
                    ctx.save();
                    const ox = 40, oy = 95;
                    GameModule.drawStairBlock(ctx, ox, oy, 85, 140, "#ffb8b8", "#ffa8a8", "#ff9898", "mm");
                    GameModule.drawStairBlock(ctx, ox + 110, oy + 40, 85, 100, "#ffeaa7", "#ffdca7", "#ffcc87", "μm");
                    GameModule.drawStairBlock(ctx, ox + 220, oy + 80, 85, 60, "#81ecec", "#71e2e2", "#51d2d2", "nm");

                    drawCurvedArrow(ctx, 110, 115, 165, 155, 55, "#fd79a8");
                    drawCurvedArrow(ctx, 220, 160, 275, 195, 55, "#fd79a8");

                    drawPillBadge(ctx, 137, 65, "× 1000");
                    drawPillBadge(ctx, 247, 110, "× 1000");

                    const mx = 390, my = 125;
                    const gradient = ctx.createRadialGradient(mx - 8, my - 10, 5, mx, my, 35);
                    gradient.addColorStop(0, "#ffeaa7");
                    gradient.addColorStop(0.3, "#ff7675");
                    gradient.addColorStop(1, "#d63031");
                    ctx.fillStyle = gradient;
                    ctx.strokeStyle = "#2d3436";
                    ctx.lineWidth = 3.5;

                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        let angle = (i * 2 * Math.PI) / 5 - Math.PI / 2;
                        let tx = mx + Math.cos(angle) * 32;
                        let ty = my + Math.sin(angle) * 32;
                        let nextAngle = angle + Math.PI / 5;
                        let bx = mx + Math.cos(nextAngle) * 23;
                        let by = my + Math.sin(nextAngle) * 23;
                        
                        if (i === 0) ctx.moveTo(tx, ty);
                        else ctx.lineTo(tx, ty);
                        ctx.lineTo(bx, by);
                    }
                    ctx.closePath();
                    ctx.fill(); ctx.stroke();

                    ctx.fillStyle = "#ffd32a";
                    ctx.beginPath();
                    ctx.moveTo(mx - 10, my - 29);
                    ctx.lineTo(mx - 14, my - 40);
                    ctx.lineTo(mx, my - 34);
                    ctx.lineTo(mx + 14, my - 40);
                    ctx.lineTo(mx + 10, my - 29);
                    ctx.closePath(); ctx.fill(); ctx.stroke();

                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath(); ctx.arc(mx - 10, my, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(mx + 10, my, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    
                    ctx.fillStyle = "#2d3436";
                    ctx.beginPath(); ctx.arc(mx - 8, my, 4.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(mx + 8, my, 4.5, 0, Math.PI*2); ctx.fill();
                    
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath(); ctx.arc(mx - 9, my - 2, 1.8, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(mx + 7, my - 2, 1.8, 0, Math.PI*2); ctx.fill();

                    ctx.fillStyle = "rgba(255, 120, 120, 0.7)";
                    ctx.beginPath(); ctx.ellipse(mx - 14, my + 8, 5, 2.5, 0, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.ellipse(mx + 14, my + 8, 5, 2.5, 0, 0, Math.PI*2); ctx.fill();

                    ctx.strokeStyle = "#2d3436";
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.arc(mx, my + 5, 4, 0, Math.PI, false);
                    ctx.stroke();

                    ctx.fillStyle = "#ffeaa7";
                    ctx.strokeStyle = "#2d3436";
                    ctx.lineWidth = 3;
                    GameModule.drawRoundRect(ctx, 290, 20, 180, 42, 12, "#ffeaa7", "#2d3436", 3);
                    ctx.beginPath();
                    ctx.moveTo(375, 62); ctx.lineTo(382, 77); ctx.lineTo(390, 62);
                    ctx.closePath(); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = "#2d3436";
                    ctx.font = "bold 13px 'Kosugi Maru', sans-serif";
                    ctx.fillText("每下一步，就乘以 1000！", 300, 46);

                    GameModule.drawMathText(ctx, `${questValue} mm = ${GameModule.state.currentQuest.answer} μm`, 110, 275, 18, "#2d3436");
                    ctx.restore();

                } else if (GameModule.state.currentLevel === 5) {
                    // LV.5 右側 (等號已徹底移除，整體分數與除線實施 100% 完美的水平與垂直對稱置中)
                    ctx.save();
                    
                    const boxX = 25;
                    const boxY = 25; 
                    const boxW = 240;

                    // 1. 分子轉換卡
                    GameModule.drawRoundRect(ctx, boxX, boxY, boxW, 55, 12, "#ffb8b8", "#e84118", 3);
                    
                    ctx.fillStyle = "#2d3436";
                    ctx.font = "bold 16px 'Kosugi Maru'";
                    ctx.fillText(`分子：${questValue} km`, boxX + 18, boxY + 33);
                    ctx.font = "bold 20px 'Kosugi Maru'";
                    ctx.fillText("➔", boxX + 118, boxY + 36);
                    GameModule.drawMathText(ctx, `${(questValue * 1000).toLocaleString()} m`, boxX + 145, boxY + 38, 16, "#d63031");

                    // 分數橫線
                    ctx.strokeStyle = "#2d3436";
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(boxX - 5, boxY + 75);
                    ctx.lineTo(boxX + boxW + 5, boxY + 75);
                    ctx.stroke();

                    // 2. 分母轉換卡
                    GameModule.drawRoundRect(ctx, boxX, boxY + 95, boxW, 55, 12, "#81ecec", "#00ced1", 3);

                    ctx.fillStyle = "#2d3436";
                    ctx.font = "bold 16px 'Kosugi Maru'";
                    ctx.fillText("分母：1 hr", boxX + 18, boxY + 128);
                    ctx.font = "bold 20px 'Kosugi Maru'";
                    ctx.fillText("➔", boxX + 118, boxY + 131);
                    GameModule.drawMathText(ctx, "3,600 s", boxX + 145, boxY + 133, 16, "#0984e3");

                    // 3. 指向右側大箭頭
                    ctx.strokeStyle = "#55efc4";
                    ctx.fillStyle = "#55efc4";
                    ctx.lineWidth = 8;
                    ctx.beginPath();
                    ctx.moveTo(280, boxY + 75);
                    ctx.lineTo(310, boxY + 75);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(303, boxY + 63); ctx.lineTo(318, boxY + 75); ctx.lineTo(303, boxY + 87);
                    ctx.closePath(); ctx.fill();

                    // 4. 黃色計算卡片「帶著單位一起除！」
                    const resX = 325, resY = boxY + 10, resW = 140, resH = 110;
                    GameModule.drawRoundRect(ctx, resX, resY, resW, resH, 15, "#ffeaa7", "#fdcb6e", 3);

                    // 關鍵修正：等號徹底移除。分子、分母及除數橫線實施完美的物理水平置中
                    const numText = `${(questValue * 1000).toLocaleString()} m`;
                    ctx.font = "bold 14px 'Kosugi Maru', sans-serif";
                    const numWidth = ctx.measureText(numText).width;
                    const numX = resX + (resW - numWidth) / 2; // 計算完美的分子居中 X 坐標
                    GameModule.drawMathText(ctx, numText, numX, resY + 38, 14, "#d63031");
                    
                    // 分數線 (水平置中)
                    ctx.strokeStyle = "#2d3436";
                    ctx.lineWidth = 2.5;
                    ctx.beginPath(); 
                    ctx.moveTo(resX + 15, resY + 55); 
                    ctx.lineTo(resX + resW - 15, resY + 55); 
                    ctx.stroke();
                    
                    const denText = "3,600 s";
                    ctx.font = "bold 14px 'Kosugi Maru', sans-serif";
                    const denWidth = ctx.measureText(denText).width;
                    const denX = resX + (resW - denWidth) / 2; // 計算完美的分母居中 X 坐標
                    GameModule.drawMathText(ctx, denText, denX, resY + 77, 14, "#0984e3");
                    ctx.restore();

                    // 5. 💡 教學提示小膠囊 (關鍵修正：往下調整至 Y = 196)
                    GameModule.drawRoundRect(ctx, boxX, 196, 430, 28, 6, "#55efc4");
                    ctx.fillStyle = "#2d3436";
                    ctx.font = "bold 13px 'Kosugi Maru'";
                    ctx.textAlign = "left"; 
                    ctx.textBaseline = "middle";
                    ctx.fillText("💡 數字與單位一起除，就自然導出 m/s 囉！", boxX + 40, 196 + 14); 

                    // 6. 最終換算導出大牌匾 (關鍵修正：往下調整至 Y = 236)
                    GameModule.drawRoundRect(ctx, 65, 236, 350, 42, 10, "#55efc4", "#2db385", 3);
                    GameModule.drawMathText(ctx, `換算導出：${GameModule.state.currentQuest.answer} m/s`, 140, 267, 19, "#2d3436");
                    ctx.restore();
                }
            },

            /**
             * 測試排版引擎極限
             */
            testMathTypography() {
                const ctx = GameModule.canvas.ctxLeft;
                ctx.clearRect(0, 0, GameModule.canvas.left.width, GameModule.canvas.left.height);
                ctx.fillStyle = "#fafbfc";
                ctx.fillRect(0, 0, GameModule.canvas.left.width, GameModule.canvas.left.height);

                ctx.save();
                ctx.fillStyle = "#2d3436";
                ctx.font = "bold 20px 'Kosugi Maru'";
                ctx.fillText("📐 排版引擎極限複雜運算式測試：", 30, 50);

                GameModule.drawMathText(ctx, "面積單位：1 m^2 = 10,000 cm^2 = 1,000,000 mm^2", 30, 110, 18, "#2980b9");
                GameModule.drawMathText(ctx, "體積與容積：1 m^3 = 1,000,000 cm^3", 30, 160, 18, "#27ae60");
                GameModule.drawMathText(ctx, "複合單位：1.5 g/cm^3 = 1500 kg/m^3", 30, 210, 18, "#e74c3c");
                GameModule.drawMathText(ctx, "化學與代數式：H^2O 和 X^2 + Y^3 = Z^5", 30, 260, 18, "#8e44ad");
                ctx.restore();

                GameModule.log("排版引擎測試完成！已在左畫布渲染複雜上下標組合運算式。", "system");
            },

            postToParent(data) {
                parent.postMessage(data, '*');
                GameModule.log(`[發送 ↗] ${JSON.stringify(data)}`, 'out');
            },

            handleIncomingMessage(e) {
                const data = e.data;
                if (!data) return;

                GameModule.log(`[接收 ↙] ${JSON.stringify(data)}`, 'in');
                if (data.type === 'START_GAME') {
                    const requestedLevel = data.config?.level || 1;
                    GameModule.transitionToLevel(requestedLevel);
                }
            },

            mockReceiveStartGame(level) {
                window.postMessage({
                    type: 'START_GAME',
                    config: { level: level }
                }, '*');
            },

            log(msg, direction) {
                const logger = document.getElementById('sandbox-logger');
                if (!logger) return;

                const timeStr = new Date().toLocaleTimeString();
                let dirClass = '';
                let prefix = '';

                if (direction === 'in') {
                    dirClass = 'log-dir-in';
                    prefix = '📥 ';
                } else if (direction === 'out') {
                    dirClass = 'log-dir-out';
                    prefix = '📤 ';
                } else {
                    prefix = '⚙️ ';
                }

                logger.innerHTML += `
                    <div class="log-entry">
                        <span class="log-time">[${timeStr}]</span> 
                        <span class="${dirClass}">${prefix}${msg}</span>
                    </div>
                `;
                logger.scrollTop = logger.scrollHeight;
            },

            clearLogs() {
                const logger = document.getElementById('sandbox-logger');
                if (logger) logger.innerHTML = '';
            },

            resizeGame() {
                const container = document.getElementById('game-container');
                const viewport = document.getElementById('game-viewport');
                const overlay = document.getElementById('orientation-overlay');

                if (!container || !viewport) return;

                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;

                const scaleX = windowWidth / GameModule.config.baseWidth;
                const scaleY = windowHeight / GameModule.config.baseHeight;
                let scale = Math.min(scaleX, scaleY);

                // 核心硬化：防禦 NaN 與極端 0 值縮放
                if (isNaN(scale) || scale <= 0 || !isFinite(scale)) {
                    scale = 1;
                }

                viewport.style.transform = `translate(-50%, -50%) scale(${scale})`;

                const isPortrait = windowHeight > windowWidth;

                if (overlay) {
                    if (isPortrait) {
                        overlay.style.display = 'flex';
                        viewport.style.opacity = '0';
                        viewport.style.pointerEvents = 'none';
                    } else {
                        overlay.style.display = 'none';
                        viewport.style.opacity = '1';
                        viewport.style.pointerEvents = 'auto';
                    }
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            GameModule.init();
        });
    </script>
