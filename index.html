<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>空間維度與單位變形蟲 - 步驟一</title>
    <!-- 引入 Google Fonts 親和力開源日系圓體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    
    <style>
        /* 1. 馬卡龍與原神風格設計語彙 */
        :root {
            --bg-dark-plate: #1e272e; /* 外部深色底板，用以突顯遊戲 16:9 邊界 */
            --bg-game: #f5f6fa;       /* 遊戲本體乾淨背景 */
            --macaron-pink: #ffb8b8;  /* 粉紅馬卡龍 */
            --macaron-blue: #81ecec;  /* 湖水綠藍 */
            --macaron-yellow: #ffeaa7;/* 警示亮黃 */
            --text-main: #2d3436;     /* 深碳色文字 */
            --panel-white: #ffffff;   /* 亮白控制卡片 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark-plate);
            font-family: 'Kosugi Maru', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. 核心遊戲沙盒容器 (確保 100% 滿版隔離) */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 3. 嚴格鎖定 16:9 的視區 (Base Size: 1280x720) */
        #game-viewport {
            position: absolute;
            width: 1280px;
            height: 720px;
            background-color: var(--bg-game);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            transform-origin: center center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: opacity 0.2s ease;
        }

        /* 步驟一：展示排版骨架 */
        #viewport-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        /* 頂部標題 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px dashed #dcdde1;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--text-main);
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .level-badge {
            background-color: var(--macaron-pink);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 16px;
        }

        /* 雙欄對比佈局草稿 */
        .split-container {
            flex: 1;
            display: flex;
            gap: 25px;
        }

        .split-panel {
            flex: 1;
            background-color: var(--panel-white);
            border-radius: 24px;
            padding: 30px;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 16px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .panel-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 22px;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .panel-desc {
            font-size: 16px;
            color: #7f8c8d;
            line-height: 1.5;
        }

        /* 馬卡龍按鈕 */
        .macaron-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            font-family: 'Kosugi Maru', sans-serif;
            font-weight: bold;
            color: var(--text-main);
            background-color: var(--macaron-blue);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #00ced1;
            transition: all 0.05s ease;
        }

        .macaron-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #00ced1;
        }

        /* 4. 內建即時偵測可視化面板 (僅步驟一與步驟二偵測用，不影響主遊戲) */
        #test-overlay {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background-color: rgba(45, 52, 54, 0.95);
            color: #55efc4;
            padding: 10px 18px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 15px;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid #55efc4;
            pointer-events: none;
        }

        /* 5. 直螢幕強行防制警告遮罩 */
        #orientation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--macaron-yellow);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 40px;
        }

        .phone-icon-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
        }

        /* 手機旋轉動畫 */
        .phone-icon {
            font-size: 80px;
            display: inline-block;
            animation: rotatePhone 2.5s infinite ease-in-out;
        }

        .warning-title {
            font-size: 28px;
            color: var(--text-main);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .warning-sub {
            font-size: 18px;
            color: #636e72;
            line-height: 1.6;
        }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            35% { transform: rotate(-90deg); }
            70% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 遊戲本體 -->
        <div id="game-viewport">
            <div id="viewport-content">
                <header>
                    <h1>空間維度與單位變形蟲 <span class="level-badge">LV.1 測試</span></h1>
                    <div style="font-size: 18px; color: var(--text-main);">分數：000</div>
                </header>

                <div class="split-container">
                    <!-- 左半部 -->
                    <div class="split-panel" style="border-top: 6px solid var(--macaron-pink);">
                        <div class="panel-icon">📐</div>
                        <div class="panel-title">原始二維面積</div>
                        <div class="panel-desc">長 1 公尺，寬 1 公尺。在這裡，我們將在下一個步驟繪製基本的 Canvas 立方。</div>
                        <button class="macaron-btn">點擊測試反饋</button>
                    </div>

                    <!-- 右半部 -->
                    <div class="split-panel" style="border-top: 6px solid var(--macaron-blue);">
                        <div class="panel-icon">💡</div>
                        <div class="panel-title">切分對比與提示</div>
                        <div class="panel-desc">點擊左側提示按鈕時，此處將同步載入切分網格。</div>
                        <button class="macaron-btn" style="background-color: var(--macaron-pink); box-shadow: 0 6px 0 #e84118; color: white;">提示按鈕測試</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 畫角可視化調試資訊 -->
        <div id="test-overlay">
            <span id="test-label">[偵測狀態：正在載入...]</span>
        </div>
    </div>

    <!-- 直螢幕強制攔截層 -->
    <div id="orientation-overlay">
        <div class="phone-icon-wrapper">
            <span class="phone-icon">📱</span>
        </div>
        <div class="warning-title">請旋轉您的行動裝置</div>
        <div class="warning-sub">本數理挑戰專為【橫螢幕 16:9】設計，<br>請開啟螢幕自動旋轉，並將手機橫放以獲得最佳體驗！</div>
    </div>

    <script>
        // 設定基準解析度
        const BASE_WIDTH = 1280;
        const BASE_HEIGHT = 720;

        /**
         * 第一性原理：透過視區動態矩陣運算，維持完美的 16:9 比例與動態置中
         */
        function resizeGame() {
            const container = document.getElementById('game-container');
            const viewport = document.getElementById('game-viewport');
            const testLabel = document.getElementById('test-label');
            const overlay = document.getElementById('orientation-overlay');

            if (!container || !viewport) return;

            // 取得當前瀏覽器視口尺寸
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            // 1. 計算縮放比例
            const scaleX = windowWidth / BASE_WIDTH;
            const scaleY = windowHeight / BASE_HEIGHT;
            
            // 取最小縮放係數，確保畫面完全容納於瀏覽器視窗中而不被切邊
            const scale = Math.min(scaleX, scaleY);

            // 2. 利用 translate 修正置中，並執行 scale 縮放
            viewport.style.transform = `translate(-50%, -50%) scale(${scale})`;

            // 3. 判斷直橫螢幕狀態 (直螢幕：高度大於寬度)
            const isPortrait = windowHeight > windowWidth;
            const statusText = isPortrait ? '直螢幕 (已封鎖)' : '橫螢幕 16:9';

            // 4. 即時更新角落測試 UI (免 F12)
            if (testLabel) {
                testLabel.textContent = `[狀態：${statusText} / 縮放比：${scale.toFixed(2)}]`;
            }

            // 5. 控制直螢幕遮罩的顯示與隱藏
            if (overlay) {
                if (isPortrait) {
                    overlay.style.display = 'flex';
                    viewport.style.opacity = '0'; // 隱藏遊戲本體
                    viewport.style.pointerEvents = 'none';
                } else {
                    overlay.style.display = 'none';
                    viewport.style.opacity = '1';  // 顯現遊戲本體
                    viewport.style.pointerEvents = 'auto';
                }
            }
        }

        // 綁定事件監聽器，即時應對各種螢幕動態與旋轉動作
        window.addEventListener('resize', resizeGame);
        window.addEventListener('orientationchange', resizeGame);
        
        // 初始載入時立即執行一次，確保初始排版正確
        window.addEventListener('DOMContentLoaded', resizeGame);
        
        // 保險起見，防止部分手機瀏覽器載入未完成
        setTimeout(resizeGame, 100);
    </script>
</body>
</html>
