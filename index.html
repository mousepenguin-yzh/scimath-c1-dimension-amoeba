<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動介面修復版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; color: white; overflow: hidden; font-family: sans-serif; }
        #canvas-container { display: flex; width: 100vw; height: 100vh; }
        canvas { flex: 1; border: 1px solid #333; }
        
        /* 強制顯示的浮動按鈕 */
        #debug-btn {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            padding: 15px 25px; background: #ff4757; color: white; border: none;
            border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<button id="debug-btn">🛠️ 測試控制台</button>
<div id="canvas-container">
    <canvas id="left-canvas"></canvas>
    <canvas id="right-canvas"></canvas>
</div>

<script>
    // 使用 try-catch 確保執行過程中不會因為單一錯誤導致全白
    function init() {
        try {
            const leftCanvas = document.getElementById('left-canvas');
            const rightCanvas = document.getElementById('right-canvas');
            const btn = document.getElementById('debug-btn');

            if (!leftCanvas || !rightCanvas) {
                console.error("畫布元件未找到");
                return;
            }

            // 初始化邏輯
            console.log("系統初始化成功");
            
            btn.onclick = () => {
                alert("控制台已開啟：目前系統正常運作中！");
            };

            // 繪製簡單的幾何測試以確認渲染正常
            const ctxL = leftCanvas.getContext('2d');
            ctxL.fillStyle = '#ff4757';
            ctxL.fillRect(50, 50, 100, 100);

            const ctxR = rightCanvas.getContext('2d');
            ctxR.fillStyle = '#2ed573';
            ctxR.fillRect(50, 50, 100, 100);
            
            // 修正了先前可能導致崩潰的 stroke 呼叫
            ctxR.strokeStyle = 'white';
            ctxR.lineWidth = 5;
            ctxR.strokeRect(50, 50, 100, 100);
            
            console.log("繪製測試完畢");
        } catch (e) {
            document.body.innerHTML = `<div style="padding: 50px; color: red;">發生錯誤: ${e.message}</div>`;
        }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
